<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "PUT YOUR API KEY",
  authDomain: "PUT YOUR DOMAIN",
  databaseURL: "PUT YOUR DB URL",
  projectId: "PUT YOUR PROJECT ID",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// قراءة عدد الزوار
onValue(ref(db, "visits"), (snapshot) => {
  const data = snapshot.val();
  const count = data ? Object.keys(data).length : 0;
  document.getElementById("visits").innerText = count;
});
</script>

</head>

<body style="font-family:Cairo;padding:20px">

<h2>📊 لوحة التحكم</h2>

<h3>عدد الزوار: <span id="visits">0</span></h3>

</body>
</html>
