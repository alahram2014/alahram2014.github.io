
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alahram Co B2B</title>
  <meta name="theme-color" content="#1f3a5f" />
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#102033;
      --muted:#64748b;
      --line:#e5eaf1;
      --primary:#1f3a5f;
      --primary2:#245a91;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow:0 14px 40px rgba(16,32,51,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 26%, var(--bg) 100%);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding-bottom:92px;
    }
    button,input,select,textarea{font:inherit}
    button{border:0;background:none}
    a{text-decoration:none;color:inherit}
    .app{max-width:1300px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:40;
      backdrop-filter:blur(12px);
      background:rgba(246,248,251,.86);
      border-bottom:1px solid rgba(229,234,241,.8);
    }
    .topbar-inner{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:14px 14px 12px;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(135deg,var(--primary),#345f98);
      color:#fff;display:grid;place-items:center;
      font-weight:900;box-shadow:var(--shadow);
      flex:0 0 auto;
    }
    .brand h1{margin:0;font-size:16px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .top-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .chip-btn,.icon-btn,.pill{
      display:inline-flex;align-items:center;justify-content:center;
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:999px;padding:10px 14px;min-height:42px;
      box-shadow:0 6px 18px rgba(16,32,51,.05);cursor:pointer;
      transition:.18s ease transform,.18s ease background,.18s ease border-color;
      gap:8px;
    }
    .chip-btn:hover,.icon-btn:hover,.pill:hover{transform:translateY(-1px)}
    .chip-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .chip-btn.good{background:var(--good);color:#fff;border-color:var(--good)}
    .chip-btn.ghost{background:#fff}
    .page{padding:14px}
    .hero{
      display:grid;gap:12px;
      grid-template-columns:repeat(12,1fr);
      margin-top:6px;
    }
    .hero-card{
      grid-column:span 12;
      background:linear-gradient(135deg,#102033,#1f3a5f 45%,#245a91);
      color:#fff;border-radius:26px;padding:18px;
      box-shadow:var(--shadow);position:relative;overflow:hidden;
    }
    .hero-card:before{
      content:"";position:absolute;inset:auto -70px -70px auto;width:190px;height:190px;border-radius:50%;
      background:rgba(255,255,255,.08);
    }
    .hero-title{margin:0 0 8px;font-size:22px}
    .hero-sub{margin:0;color:rgba(255,255,255,.82);max-width:62ch;line-height:1.7;font-size:13px}
    .hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .hero-actions .chip-btn{border:0}
    .search-wrap{
      grid-column:span 12;
      background:#fff;border:1px solid var(--line);border-radius:24px;
      padding:12px;box-shadow:var(--shadow)
    }
    .search-row{display:flex;gap:10px;align-items:center}
    .search-input{
      flex:1;min-width:0;border:0;outline:0;background:transparent;
      font-size:15px;padding:8px 4px;
    }
    .search-clear{
      width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
      display:grid;place-items:center;cursor:pointer;background:#fff;color:var(--muted);
    }
    .suggestions{
      margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;
      display:none;gap:8px;flex-direction:column;
      max-height:320px;overflow:auto;
    }
    .suggestions.show{display:flex}
    .suggest-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px;border-radius:18px;background:#f8fbff;border:1px solid #e8eef8;cursor:pointer;
    }
    .suggest-item strong{display:block;font-size:14px}
    .suggest-item span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
    .grid-3{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;
      margin-top:10px;
    }
    .action-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;
      min-height:82px;padding:14px;box-shadow:var(--shadow);
      display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;
      transition:.18s ease transform,.18s ease box-shadow;
    }
    .action-card:hover{transform:translateY(-1px)}
    .action-card .label{font-weight:800;font-size:15px}
    .action-card .desc{font-size:12px;color:var(--muted);line-height:1.5}
    .section-head{
      margin:18px 0 10px;display:flex;align-items:end;justify-content:space-between;gap:12px;
    }
    .section-head h2{margin:0;font-size:17px}
    .section-head p{margin:0;color:var(--muted);font-size:12px}
    .companies{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;
    }
    .company{
      background:#fff;border:1px solid var(--line);border-radius:20px;padding:10px;
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
      min-height:102px;
    }
    .company.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .company img,.company .logo{
      width:48px;height:48px;border-radius:16px;object-fit:cover;background:#edf2f7;
      display:grid;place-items:center;font-weight:800;color:var(--primary);
    }
    .company .name{font-size:12px;font-weight:700;text-align:center;line-height:1.35}
    .company .count{font-size:11px;color:var(--muted)}
    .toolbar{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
      margin-top:12px;
    }
    .toolbar .pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .catalog{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-top:12px;
    }
    .card{
      background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);
      display:flex;flex-direction:column;min-height:100%;
    }
    .card .img{
      aspect-ratio:1/1;background:#eef3fb;position:relative;overflow:hidden;
    }
    .card .img img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .badge{
      position:absolute;top:10px;left:10px;background:rgba(16,32,51,.78);color:#fff;
      padding:6px 10px;border-radius:999px;font-size:11px;backdrop-filter:blur(6px)
    }
    .card .body{padding:12px;display:flex;flex-direction:column;gap:10px;flex:1}
    .card .title{font-weight:800;font-size:14px;line-height:1.45;min-height:40px}
    .subline{font-size:12px;color:var(--muted);line-height:1.6}
    .unit-tabs{display:flex;gap:6px;flex-wrap:wrap}
    .unit-tab{
      border:1px solid var(--line);background:#f8fbff;border-radius:999px;padding:7px 10px;
      font-size:12px;cursor:pointer;min-width:58px;text-align:center;
    }
    .unit-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .price-box{
      display:flex;flex-direction:column;gap:2px;align-items:flex-start;
      border-top:1px dashed var(--line);padding-top:8px;
    }
    .old-price{font-size:12px;color:var(--muted);text-decoration:line-through}
    .new-price{font-size:20px;font-weight:900;color:#0f172a;line-height:1.2}
    .qty-row{display:flex;gap:8px;align-items:center}
    .stepper{
      display:flex;align-items:center;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;
      min-width:106px;
    }
    .stepper button{
      width:36px;height:36px;cursor:pointer;font-size:18px;background:#f8fbff;color:var(--text)
    }
    .stepper span{min-width:34px;text-align:center;font-weight:800}
    .add-btn{
      width:100%;height:56px;border-radius:18px;font-size:16px;font-weight:900;
      background:var(--primary);color:#fff;cursor:pointer;box-shadow:0 10px 24px rgba(31,58,95,.22);
      transition:.2s ease transform,.2s ease filter,.2s ease background;
    }
    .add-btn.remove{background:var(--bad)}
    .add-btn:active{transform:scale(.98)}
    .card.flash{border-color:#f7c948}
    .card.offer{border-color:#9e77ed}
    .card.pulse{animation:pulse .45s ease}
    @keyframes pulse{0%{transform:scale(1)}45%{transform:scale(1.015)}100%{transform:scale(1)}}
    .drawer{
      position:fixed;inset:0 auto 0 0;z-index:60;width:min(420px,100%);
      background:#fff;border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(0,0,0,.10);
      transform:translateX(-102%);transition:.24s ease transform;display:flex;flex-direction:column;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-head{
      padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;
    }
    .drawer-head h3{margin:0;font-size:17px}
    .drawer-body{padding:14px;overflow:auto;flex:1}
    .cart-item{
      border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px;background:#fbfdff
    }
    .cart-item .row{display:flex;justify-content:space-between;gap:10px}
    .cart-item .name{font-weight:800;font-size:13px;line-height:1.45}
    .cart-item .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .cart-item .foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}
    .cart-footer{
      padding:14px;border-top:1px solid var(--line);background:#fff;position:sticky;bottom:0
    }
    .form-grid{display:grid;gap:10px}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;outline:0;
    }
    .submit-btn{
      width:100%;height:56px;border-radius:18px;background:var(--good);color:#fff;font-weight:900;font-size:16px;cursor:pointer;
    }
    .muted{color:var(--muted)}
    .overlay{
      position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:70;display:none;align-items:center;justify-content:center;padding:16px;
    }
    .overlay.show{display:flex}
    .modal{
      width:min(520px,100%);background:#fff;border-radius:24px;box-shadow:var(--shadow);overflow:hidden;
    }
    .modal .head{
      padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;
    }
    .modal .body{padding:16px}
    .modal h3{margin:0;font-size:18px}
    .tiers-grid{
      display:grid;gap:10px;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    }
    .tier-card{
      border:1px solid var(--line);border-radius:22px;padding:14px;background:#fff;box-shadow:var(--shadow);cursor:pointer;
    }
    .tier-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .tier-card .title{font-weight:900}
    .tier-card .min{font-size:13px;color:var(--muted);margin-top:6px}
    .empty{
      padding:24px;border:1px dashed var(--line);border-radius:22px;background:#fff;text-align:center;color:var(--muted)
    }
    .toast-zone{
      position:fixed;left:14px;bottom:104px;z-index:80;display:flex;flex-direction:column;gap:8px;
      max-width:min(360px,calc(100vw - 28px));
    }
    .toast{
      background:#0f172a;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;line-height:1.55;
      opacity:0;transform:translateY(10px);animation:toastIn .22s ease forwards;
    }
    .toast.good{background:#146c43}
    .toast.warn{background:#8a5a00}
    .toast.bad{background:#7f1d1d}
    .toast.info{background:#173a84}
    @keyframes toastIn{to{opacity:1;transform:translateY(0)}}
    .bottom-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:55;
      background:rgba(255,255,255,.86);backdrop-filter:blur(12px);
      border-top:1px solid rgba(229,234,241,.95);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    }
    .bottom-inner{
      max-width:1300px;margin:0 auto;display:flex;gap:10px;align-items:center;justify-content:space-between;
    }
    .smart-tier{
      flex:1;height:56px;border-radius:18px;background:#fff;border:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px;cursor:pointer;
      box-shadow:var(--shadow);
    }
    .smart-tier.ok{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:#16a34a;color:#fff}
    .smart-tier .main{font-weight:900}
    .smart-tier .sub{font-size:12px;color:inherit;opacity:.82}
    .small-btn{
      width:56px;height:56px;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);
      display:grid;place-items:center;cursor:pointer;font-size:18px
    }
    .skeleton{
      border-radius:18px;
      background:linear-gradient(90deg,#eef3fb 25%,#f7fafc 37%,#eef3fb 63%);
      background-size:400% 100%;
      animation:shimmer 1.1s ease infinite;
      min-height:18px;
    }
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
    .hidden{display:none !important}
    @media (max-width: 900px){
      .hero{grid-template-columns:1fr}
      .grid-3{grid-template-columns:1fr}
      .catalog{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
    }
    @media (max-width: 520px){
      .topbar-inner{padding:12px 12px 10px}
      .page{padding:12px}
      .brand h1{font-size:15px}
      .brand p{font-size:11px}
      .catalog{grid-template-columns:repeat(2,minmax(0,1fr))}
      .companies{grid-template-columns:repeat(3,minmax(0,1fr))}
      .toast-zone{left:10px;right:10px;bottom:108px;max-width:none}
      .drawer{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" id="homeBtn" role="button">
          <div class="brand-badge">A</div>
          <div>
            <h1>Alahram Co</h1>
            <p id="brandSub">نظام بيع ذكي لتجارة الجملة</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="chip-btn ghost" id="repBtn">دخول مندوب</button>
          <button class="icon-btn" id="cartBtn">🛒 <span id="cartCount">0</span></button>
        </div>
      </div>
    </header>

    <main id="main" class="page">
      <div class="empty">جارٍ تحميل البيانات…</div>
    </main>
  </div>

  <div id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3>السلة</h3>
        <div class="muted" id="cartSummary">0 صنف</div>
      </div>
      <button class="icon-btn" id="closeCartBtn">✕</button>
    </div>
    <div class="drawer-body">
      <div id="cartList"></div>

      <div class="section-head">
        <div>
          <h2>بيانات الطلب</h2>
          <p>يحفظ على الشيت عند التأكيد</p>
        </div>
      </div>

      <div class="form-grid">
        <input class="input" id="custName" placeholder="اسم العميل" />
        <input class="input" id="custPhone" placeholder="رقم الهاتف" />
        <textarea class="input" id="custAddress" rows="3" placeholder="العنوان"></textarea>
      </div>
    </div>
    <div class="cart-footer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>الإجمالي</strong>
        <strong id="cartTotal">0</strong>
      </div>
      <button class="submit-btn" id="checkoutBtn">تأكيد الطلب</button>
    </div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="modalTitle">عنوان</h3>
        <button class="icon-btn" id="modalCloseBtn">✕</button>
      </div>
      <div class="body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast-zone" id="toastZone"></div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <button class="smart-tier" id="tierBtn">
        <div>
          <div class="main" id="tierBtnMain">اختار شريحتك</div>
          <div class="sub" id="tierBtnSub">اضغط هنا لفتح الشرائح</div>
        </div>
        <div id="tierBtnRight" style="font-weight:900">→</div>
      </button>
      <button class="small-btn" id="offersBtn">🏷️</button>
      <button class="small-btn" id="flashBtn">⚡</button>
    </div>
  </div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbwb85VFG_4n48CLq6yAB9dFaCrFIb5egSUqFTyF0DP3mT_jt8Ggpk_uV2PDTekG1m9Ejw/exec';
const UNIT_ORDER = ['carton', 'pack', 'piece'];
const UNIT_LABELS = { carton: 'كرتونة', pack: 'دستة', piece: 'قطعة' };
const PAGE_LIMIT = 20;
const DEBUG = true;

const state = {
  view: 'home',
  settings: {},
  tiers: [],
  companies: [],
  products: [],
  productIndex: new Map(),
  currentPage: 1,
  hasMore: true,
  loading: false,
  loadingProducts: false,
  selectedTier: loadJSON('alahram_selected_tier', null),
  rep: loadJSON('alahram_rep_session', null),
  cart: loadJSON('alahram_cart', []),
  searchMode: false,
  searchQuery: '',
  companyFilter: '',
  offers: [],
  flashOffers: [],
  productsError: null,
  flashTimer: null,
  suggestionTimer: null,
  suggestionItems: [],
  productsObserver: null
};

const el = (id) => document.getElementById(id);

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function formatMoney(n) {
  const value = Number(n || 0);
  return new Intl.NumberFormat('ar-EG').format(Math.round(value));
}
function escapeHtml(str) {
  return String(str === null || str === undefined ? '' : str)
    .replace(/[&<>"']/g, s => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s]));
}
function escapeAttr(str) { return escapeHtml(str).replace(/`/g, '&#96;'); }
function toast(message, type = 'info') {
  const zone = el('toastZone');
  const node = document.createElement('div');
  node.className = `toast ${type}`;
  node.textContent = message;
  zone.appendChild(node);
  setTimeout(() => {
    node.style.opacity = '0';
    node.style.transform = 'translateY(10px)';
    setTimeout(() => node.remove(), 250);
  }, 2500);
}
function setThemeColor(color) {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', color);
}
setThemeColor('#1f3a5f');

async function apiRequest(endpoint, params = {}, method = 'GET', body = null) {
  const url = new URL(API_BASE);
  url.searchParams.set('endpoint', endpoint);
  Object.entries(params || {}).forEach(([k, v]) => {
    if (v !== undefined && v !== null && String(v).length) url.searchParams.set(k, String(v));
  });

  console.log('[API]', method, endpoint, params);

  const options = { method, headers: {} };
  if (body !== null) {
    options.headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(body);
  }

  let res;
  try {
    res = await fetch(url.toString(), options);
  } catch (err) {
    console.error('[API FETCH ERROR]', endpoint, err);
    throw new Error('Failed to fetch: ' + endpoint);
  }

  const text = await res.text();
  console.log('[API RAW]', endpoint, 'status=', res.status, text.slice(0, 500));

  let json;
  try {
    json = JSON.parse(text);
  } catch (err) {
    console.error('[API NON JSON]', endpoint, text);
    throw new Error('API response is not JSON for ' + endpoint + ': ' + text.slice(0, 300));
  }

  if (!res.ok || json.success === false) {
    const msg = json.error || ('HTTP ' + res.status);
    throw new Error(msg);
  }

  return json.data;
}

function currentTierSlug() {
  return state.selectedTier ? String(state.selectedTier.tier_name || '').toLowerCase() : '';
}

function basePrices(product) {
  return (product && product.base_prices) ? product.base_prices : { carton: 0, pack: 0, piece: 0 };
}

function resolvePrice(product, unit, tierSlug = currentTierSlug()) {
  const base = basePrices(product);
  const basePrice = Number(base[unit] || 0);
  let current = basePrice;
  let tierPrice = 0;
  let changed = false;

  if (tierSlug && product && product.tier_prices && product.tier_prices[tierSlug]) {
    tierPrice = Number((product.tier_prices[tierSlug] || {})[unit] || 0);
    if (tierPrice > 0) {
      current = tierPrice;
      changed = (tierPrice !== basePrice);
    }
  }

  return { base: basePrice, current, tierPrice, changed };
}

function getSelectedUnit(productId) {
  const key = 'alahram_unit_' + productId;
  return localStorage.getItem(key) || 'carton';
}
function setSelectedUnit(productId, unit) {
  localStorage.setItem('alahram_unit_' + productId, unit);
  renderProductsList();
}
function productCartKey(productId, unit) {
  return `${productId}::${unit}`;
}

function loadCart() {
  return state.cart || [];
}
function saveCart() {
  saveJSON('alahram_cart', state.cart);
}
function cartItemByKey(key) {
  return state.cart.find(x => productCartKey(x.id, x.unit) === key);
}
function setCartQtyByIndex(idx, qty) {
  if (!state.cart[idx]) return;
  state.cart[idx].qty = Math.max(1, Number(qty || 1));
  saveCart();
  updateCartUI();
  renderCurrentView();
}
function removeCartIndex(idx) {
  state.cart.splice(idx, 1);
  saveCart();
  updateCartUI();
  renderCurrentView();
}
function cartTotals() {
  let total = 0;
  let eligible = 0;
  let offers = 0;

  for (const item of state.cart) {
    const line = itemLinePrice(item);
    total += line * Number(item.qty || 0);
    if (item.type === 'product') eligible += line * Number(item.qty || 0);
    else offers += line * Number(item.qty || 0);
  }
  return { total, eligible, offers };
}
function itemLinePrice(item) {
  if (item.type !== 'product') return Number(item.price || 0);
  const unit = item.unit || 'carton';
  const tierSlug = currentTierSlug();
  const pr = resolvePrice(item.product_snapshot || item, unit, tierSlug);
  return Number(pr.current || 0);
}

function validateAuthFromStorage() {
  const token = state.rep && state.rep.token ? state.rep.token : localStorage.getItem('alahram_rep_token');
  if (!token) {
    state.rep = null;
    saveJSON('alahram_rep_session', null);
    updateRepUI();
    return;
  }
  apiRequest('auth', { token }, 'GET')
    .then(data => {
      if (data && data.valid !== false && data.session) {
        state.rep = data.session;
        saveJSON('alahram_rep_session', data.session);
        updateRepUI();
      } else {
        state.rep = null;
        localStorage.removeItem('alahram_rep_token');
        saveJSON('alahram_rep_session', null);
        updateRepUI();
      }
    })
    .catch(() => {
      state.rep = null;
      localStorage.removeItem('alahram_rep_token');
      saveJSON('alahram_rep_session', null);
      updateRepUI();
    });
}

function setupProductsObserver() {
  const target = document.createElement('div');
  target.id = 'productsSentinel';
  target.style.height = '1px';
  target.style.width = '100%';
  state.productsSentinel = target;

  if (state.productsObserver) {
    try { state.productsObserver.disconnect(); } catch (e) {}
  }

  state.productsObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        loadMoreProductsIfNeeded();
      }
    });
  }, { rootMargin: '600px 0px 800px 0px' });
}

async function loadProducts(reset = false) {
  if (state.loadingProducts) return;
  state.loadingProducts = true;
  if (reset) {
    state.currentPage = 1;
    state.hasMore = true;
    state.products = [];
    state.productIndex = new Map();
    state.productsError = null;
  }

  try {
    const params = {
      page: state.currentPage,
      limit: PAGE_LIMIT,
      q: state.searchMode ? state.searchQuery : '',
      company: state.companyFilter || ''
    };
    const data = await apiRequest('products', params);
    const items = (data && data.items) ? data.items : [];
    if (reset) {
      state.products = items;
    } else {
      state.products = state.products.concat(items);
    }
    for (const item of items) {
      state.productIndex.set(String(item.id), item);
    }
    state.hasMore = !!(data && data.hasMore);
    state.currentPage += 1;
  } catch (err) {
    console.error('[LOAD PRODUCTS ERROR]', err);
    toast(err.message || 'فشل تحميل المنتجات', 'bad');
    state.hasMore = false;
    state.productsError = err.message || String(err);
    if (reset) {
      state.products = [];
    }
  } finally {
    state.loadingProducts = false;
  }
}


function retryProducts() {
  state.productsError = null;
  loadProducts(true).then(() => renderProductsList(true));
}

function loadMoreProductsIfNeeded() {
  if (state.view !== 'products') return;
  if (!state.hasMore || state.loadingProducts) return;
  loadProducts(false).then(() => {
    renderProductsList();
  });
}

function searchProductsSuggest(q) {
  clearTimeout(state.suggestionTimer);
  state.suggestionTimer = setTimeout(async () => {
    if (!q || q.trim().length < 2) {
      state.suggestionItems = [];
      renderSearchSuggestions();
      return;
    }
    try {
      const data = await apiRequest('products/search', { q: q.trim(), page: 1, limit: 8 });
      state.suggestionItems = (data && data.items) ? data.items : [];
      renderSearchSuggestions();
    } catch (err) {
      console.warn('search suggestions failed', err);
    }
  }, 250);
}

function startSearch(q) {
  state.searchMode = !!(q && q.trim());
  state.searchQuery = q.trim();
  state.view = 'products';
  renderProductsList(true);
  if (state.searchMode) {
    loadProducts(true).then(() => renderProductsList());
  } else {
    loadProducts(true).then(() => renderProductsList());
  }
}
function clearSearch() {
  state.searchMode = false;
  state.searchQuery = '';
  state.suggestionItems = [];
  renderProductsList(true);
  loadProducts(true).then(() => renderProductsList());
}

   CART
========================= */
function toggleProductToCart(productId, unit) {
  const product = state.productIndex.get(String(productId)) || state.products.find(p => String(p.id) === String(productId));
  if (!product) return toast('الصنف غير متاح الآن', 'bad');

  const key = productCartKey(String(productId), unit);
  const idx = state.cart.findIndex(x => x.type === 'product' && productCartKey(String(x.id), String(x.unit)) === key);

  if (idx >= 0) {
    state.cart.splice(idx, 1);
    saveCart();
    toast('تمت الإزالة من السلة', 'bad');
  } else {
    state.cart.push({
      type: 'product',
      id: String(product.id),
      name: product.name,
      company: product.company,
      image: product.image,
      company_logo: product.company_logo || '',
      unit: unit,
      qty: 1,
      base_prices: product.base_prices,
      tier_prices: product.tier_prices || {},
      units_per_carton: product.units_per_carton || ''
    });
    saveCart();
    toastSmart('add', product.name);
  }
  updateCartUI();
  renderCurrentView();
}

function stepQty(productId, unit, delta) {
  const key = productCartKey(String(productId), unit);
  const idx = state.cart.findIndex(x => x.type === 'product' && productCartKey(String(x.id), String(x.unit)) === key);
  if (idx >= 0) {
    const next = Math.max(1, Number(state.cart[idx].qty || 1) + delta);
    state.cart[idx].qty = next;
    saveCart();
    updateCartUI();
    renderCurrentView();
    return;
  }
  if (delta > 0) toggleProductToCart(productId, unit);
}

function addOfferToCart(id, name, price, sourceType) {
  const existingIdx = state.cart.findIndex(x => x.type === sourceType && String(x.id) === String(id));
  if (existingIdx >= 0) {
    state.cart[existingIdx].qty = Number(state.cart[existingIdx].qty || 1) + 1;
  } else {
    state.cart.push({
      type: sourceType,
      id: String(id),
      name: name,
      price: Number(price || 0),
      qty: 1,
      unit: sourceType,
      company: sourceType === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'
    });
  }
  saveCart();
  updateCartUI();
  toast('العرض ده مش هيتحسب ضمن الشريحة', 'warn');
  renderCurrentView();
}

function updateCartUI() {
  const count = state.cart.reduce((sum, x) => sum + Number(x.qty || 0), 0);
  el('cartCount').textContent = String(count);

  const totals = cartTotals();
  el('cartTotal').textContent = formatMoney(totals.total) + ' ج.م';
  el('cartSummary').textContent = `${count} قطعة / ${state.cart.length} أصناف`;

  const list = el('cartList');
  if (!list) return;

  if (!state.cart.length) {
    list.innerHTML = '<div class="empty">السلة فارغة الآن.</div>';
  } else {
    list.innerHTML = state.cart.map((item, idx) => {
      const price = item.type === 'product' ? itemLinePrice(item) : Number(item.price || 0);
      return `
        <div class="cart-item">
          <div class="row">
            <div>
              <div class="name">${escapeHtml(item.name)}</div>
              <div class="meta">${escapeHtml(item.company || '')}${item.type === 'product' ? ` • ${escapeHtml(item.unit)}` : ''} • ${formatMoney(price)} ج.م</div>
            </div>
            <button class="icon-btn" onclick="removeCartIndex(${idx})">✕</button>
          </div>
          <div class="foot">
            <div class="stepper">
              <button onclick="cartQtyStep(${idx},-1)">−</button>
              <span>${item.qty}</span>
              <button onclick="cartQtyStep(${idx},1)">+</button>
            </div>
            <strong>${formatMoney(Number(item.qty || 0) * price)} ج.م</strong>
          </div>
        </div>
      `;
    }).join('');
  }

  updateTierFooter();
}

function cartQtyStep(idx, delta) {
  const item = state.cart[idx];
  if (!item) return;
  if (delta < 0 && Number(item.qty || 1) <= 1) {
    removeCartIndex(idx);
    return;
  }
  item.qty = Math.max(1, Number(item.qty || 1) + delta);
  saveCart();
  updateCartUI();
  renderCurrentView();
}

function openCart() {
  el('drawer').classList.add('open');
  el('drawer').setAttribute('aria-hidden', 'false');
}
function closeCart() {
  el('drawer').classList.remove('open');
  el('drawer').setAttribute('aria-hidden', 'true');
}
function clearCart() {
  state.cart = [];
  saveCart();
  updateCartUI();
  renderCurrentView();
}

function itemLinePrice(item) {
  if (!item) return 0;
  if (item.type !== 'product') return Number(item.price || 0);
  return resolvePrice(item.product_snapshot || item, item.unit).current;
}

function pickTier(slug) {
  const tier = state.tiers.find(t => String(t.tier_name).toLowerCase() === String(slug).toLowerCase() || String(t.visible_label).toLowerCase() === String(slug).toLowerCase());
  if (!tier) return;

  if (tier.tier_password) {
    showOverlay('الشريحة مقفلة', `

        <div class="muted">أدخل الرقم السري للوصول إلى هذه الشريحة.</div>

          <button class="chip-btn ghost" onclick="closeOverlay()">إلغاء</button>
        </div>
      </div>
    `);
    return;
  }

  applyTier(tier);
}
function confirmTierPassword(slug) {
  const input = document.getElementById('tierPasswordInput');
  if (!input) return;
  const tier = state.tiers.find(t => String(t.tier_name).toLowerCase() === String(slug).toLowerCase());
  if (!tier) return;
  if (String(input.value || '').trim() !== String(tier.tier_password || '').trim()) {
    toast('كلمة السر غير صحيحة', 'bad');
    return;
  }
  closeOverlay();
  applyTier(tier);
}
function applyTier(tier) {
  state.selectedTier = tier;
  saveJSON('alahram_selected_tier', tier);
  toast(`تم اختيار ${tier.visible_label || tier.tier_name}`, 'good');
  updateTierFooter();
  updateCartUI();
  renderCurrentView();
  goCompanies();
}

function updateTierFooter() {
  const btn = el('tierBtn');
  const main = el('tierBtnMain');
  const sub = el('tierBtnSub');
  const right = el('tierBtnRight');
  if (!btn || !main || !sub || !right) return;

  if (!state.selectedTier) {
    btn.classList.remove('ok');
    main.textContent = state.settings.tier_welcome || 'اختار شريحتك';
    sub.textContent = state.settings.tier_terms || 'اضغط هنا لفتح الشرائح';
    right.textContent = '→';
    return;
  }

  const need = Number(state.selectedTier.tier_min || 0);
  const used = cartTotals().eligible;
  const remaining = Math.max(0, need - used);
  main.textContent = state.selectedTier.visible_label || state.selectedTier.tier_name;
  if (remaining <= 0) {
    btn.classList.add('ok');
    sub.textContent = 'تم تحقيق الشريحة';
    right.textContent = '✓';
  } else {
    btn.classList.remove('ok');
    sub.textContent = `المتبقي ${formatMoney(remaining)} ج.م`;
    right.textContent = '→';
  }
}

  el('modalBody').innerHTML = html;

}

  el('overlay').classList.remove('show');

async function submitRepLogin() {
  try {
    const rep_id = document.getElementById('repIdInput').value.trim();
    const password = document.getElementById('repPassInput').value.trim();
    const data = await apiRequest('reps/login', {}, 'POST', { rep_id, password });
    if (data && data.valid) {
      state.rep = data.session;
      saveJSON('alahram_rep_session', data.session);
      localStorage.setItem('alahram_rep_token', data.token);
      updateRepUI();
      closeOverlay();
      toast('تم تسجيل الدخول بنجاح', 'good');
    } else {
      toast((data && data.error) || 'بيانات غير صحيحة', 'bad');
    }
  } catch (err) {
    toast(err.message || 'فشل تسجيل الدخول', 'bad');
  }
}

/* =========================
   CHECKOUT
========================= */
async function checkout() {
  if (!state.cart.length) {
    toast('السلة فارغة', 'warn');
    return;
  }

  const customer_name = el('custName').value.trim();
  const phone = el('custPhone').value.trim();
  const address = el('custAddress').value.trim();

  if (!customer_name || !phone) {
    toast('اسم العميل ورقم الهاتف مطلوبان', 'bad');
    return;
  }

  try {
    const payload = {
      customer_name,
      phone,
      address,
      total: cartTotals().total,
      tier: state.selectedTier ? state.selectedTier.tier_name : '',
      rep_token: localStorage.getItem('alahram_rep_token') || '',
      items: state.cart.map(item => {
        if (item.type === 'product') {
          return {
            type: 'product',
            id: item.id,
            name: item.name,
            unit: item.unit,
            qty: item.qty,
            base_prices: item.base_prices,
            tier_prices: item.tier_prices
          };
        }
        return {
          type: item.type,
          id: item.id,
          name: item.name,
          unit: item.unit,
          qty: item.qty,
          price: item.price
        };
      })
    };

    const data = await apiRequest('orders', {}, 'POST', payload);
    toast('تم حفظ الطلب بنجاح #' + data.order_id, 'good');
    state.cart = [];
    saveCart();
    updateCartUI();
    closeCart();
  } catch (err) {
    toast(err.message || 'فشل حفظ الطلب', 'bad');
  }
}

========================= */
function flashCountdownText(endIso) {
  if (!endIso) return '';
  const end = new Date(endIso);
  const diff = Math.max(0, end.getTime() - Date.now());
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `ينتهي خلال ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function startFlashTimer() {
  if (state.flashTimer) clearInterval(state.flashTimer);
  state.flashTimer = setInterval(() => {
    if (state.view !== 'flash') return;
    (state.flashOffers || []).forEach(o => {
      const box = document.getElementById('countdown_' + String(o.id));
      if (box) box.textContent = flashCountdownText(o.end_datetime);
    });
  }, 1000);
}

    state.companyFilter = r.companyFilter || '';

    state.searchQuery = r.searchQuery || '';

      const found = (state.tiers || []).find(t =>
        norm(t.tier_name) === wanted ||
        norm(t.visible_label) === wanted ||
        String(t.tier_id || '') === String(r.selectedTierName)

    } else if (state.view === 'offers') {
      if (typeof original.renderOffers === 'function') original.renderOffers();
    } else if (state.view === 'flash') {
      if (typeof original.renderFlashOffers === 'function') original.renderFlashOffers();
    } else {
      window.renderProductsList(true);
    }

    updateCartUI();
    updateTierFooter();
  }

  function pushRoute(view, replace = false) {
    const snapshot = currentRouteSnapshot(view);
    const url = location.pathname + location.search + location.hash;
    if (replace) history.replaceState(snapshot, '', url);
    else history.pushState(snapshot, '', url);

  function getVisibleProducts() {
    let items = Array.isArray(state.products) ? state.products.slice() : [];

    if (state.companyFilter) {
      const target = norm(state.companyFilter);
      items = items.filter(p => norm(p.company) === target);
    }

    if (state.searchMode && state.searchQuery) {
      const q = norm(state.searchQuery);
      items = items.filter(p => norm([p.id, p.name, p.company].join(' ')).includes(q));
    }

    return items;
  }

      </div>

        ${state.loadingProducts && state.products.length === 0
          ? renderSkeletonCards(8)

              : (state.productsError
                  ? `<div class="empty"><strong>تعذر تحميل المنتجات</strong><div style="margin-top:8px" class="muted">${escapeHtml(state.productsError)}</div><div style="margin-top:12px"><button class="chip-btn primary" onclick="retryProducts()">إعادة المحاولة</button></div></div>`
                  : '<div class="empty">لا توجد منتجات مطابقة الآن.</div>'))}
      </div>

      <div id="productsSentinel" style="height:1px"></div>

      try { state.productsObserver.disconnect(); } catch (e) {}
    }

      try { state.productsObserver.observe(sentinel); } catch (e) {}
    }

  function updateCartUIPatched() {
    if (typeof original.updateCartUI === 'function') original.updateCartUI();
    updateFooterTotal();
  }

  function updateTierFooterPatched() {
    if (typeof original.updateTierFooter === 'function') original.updateTierFooter();
    updateFooterTotal();

  function renderCurrentViewPatched() {
    if (state.view === 'home') {

    } else if (state.view === 'offers') {
      if (typeof original.renderOffers === 'function') original.renderOffers();
    } else if (state.view === 'flash') {
      if (typeof original.renderFlashOffers === 'function') original.renderFlashOffers();
    }
    updateCartUIPatched();
    updateTierFooterPatched();
  }

  function goHomePatched() {
    state.companyFilter = '';
    state.searchMode = false;
    state.searchQuery = '';
    state.view = 'home';
    pushRoute('home');
    if (typeof original.renderHome === 'function') original.renderHome();
  }

  function goTiersPatched() {
    state.view = 'tiers';
    pushRoute('tiers');
    if (typeof original.renderTiers === 'function') original.renderTiers();
  }

  function goCompaniesPatched() {
    state.view = 'companies';
    pushRoute('companies');
    if (typeof original.renderCompanies === 'function') original.renderCompanies();
  }

  function goProductsPatched(company = '') {
    state.companyFilter = company || '';
    state.searchMode = false;
    state.searchQuery = '';
    state.view = 'products';
    pushRoute('products');
    renderProductsListPatched(true);
  }

  function goOffersPatched() {
    state.view = 'offers';
    pushRoute('offers');
    if (typeof original.renderOffers === 'function') original.renderOffers();
  }

  function goFlashPatched() {
    state.view = 'flash';
    pushRoute('flash');
    if (typeof original.renderFlashOffers === 'function') original.renderFlashOffers();
  }

  function setCompanyFilterPatched(company = '') {
    state.companyFilter = company || '';
    state.searchMode = false;
    state.searchQuery = '';
    state.view = 'products';
    pushRoute('products');
    renderProductsListPatched(true);
  }

  function startSearchPatched(q) {
    state.searchMode = !!(q && q.trim());
    state.searchQuery = String(q || '').trim();
    state.view = 'products';
    pushRoute('products');
    renderProductsListPatched(true);
  }

  function clearSearchPatched() {
    state.searchMode = false;
    state.searchQuery = '';
    state.view = 'products';
    pushRoute('products');
    renderProductsListPatched(true);
  }

  function selectSearchSuggestionPatched(id) {
    const item = state.productIndex.get(String(id)) || (state.products || []).find(p => String(p.id) === String(id));
    if (!item) return;
    state.searchQuery = item.name || '';
    state.searchMode = true;
    state.companyFilter = item.company || '';
    state.view = 'products';
    pushRoute('products');
    renderProductsListPatched(true);
    toast('تم اختيار الصنف', 'good');
  }

  function toggleProductToCartPatched(productId, unit) {
    const product = state.productIndex.get(String(productId)) || (state.products || []).find(p => String(p.id) === String(productId));
    if (!product) return toast('الصنف غير متاح الآن', 'bad');

    const key = productCartKey(String(productId), unit);
    const idx = state.cart.findIndex(x => x.type === 'product' && productCartKey(String(x.id), String(x.unit)) === key);

    if (idx >= 0) {
      state.cart.splice(idx, 1);
      saveCart();
      toast('تمت الإزالة من السلة', 'bad');
    } else {
      state.cart.push({
        type: 'product',
        id: String(product.id),
        name: product.name,
        company: product.company,
        image: product.image,
        company_logo: product.company_logo || '',
        unit: unit,
        qty: 1,
        base_prices: product.base_prices,
        tier_prices: product.tier_prices || {},
        units_per_carton: product.units_per_carton || ''
      });
      saveCart();
      toastSmart('add', product.name);
    }

    updateCartUIPatched();
    renderCurrentViewPatched();
  }

  function stepQtyPatched(productId, unit, delta) {
    const key = productCartKey(String(productId), unit);
    const idx = state.cart.findIndex(x => x.type === 'product' && productCartKey(String(x.id), String(x.unit)) === key);
    if (idx >= 0) {
      const next = Math.max(1, Number(state.cart[idx].qty || 1) + delta);
      state.cart[idx].qty = next;
      saveCart();
      updateCartUIPatched();
      renderCurrentViewPatched();
      return;
    }
    if (delta > 0) toggleProductToCartPatched(productId, unit);
  }

  function addOfferToCartPatched(id, name, price, sourceType) {
    const existingIdx = state.cart.findIndex(x => x.type === sourceType && String(x.id) === String(id));
    if (existingIdx >= 0) {
      state.cart[existingIdx].qty = Number(state.cart[existingIdx].qty || 1) + 1;
    } else {
      state.cart.push({
        type: sourceType,
        id: String(id),
        name: name,
        price: Number(price || 0),
        qty: 1,
        unit: sourceType,
        company: sourceType === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'
      });
    }
    saveCart();
    updateCartUIPatched();
    toast('العرض ده مش هيتحسب ضمن الشريحة', 'warn');
    renderCurrentViewPatched();
  }

  function removeCartIndexPatched(idx) {
    state.cart.splice(idx, 1);
    saveCart();
    updateCartUIPatched();
    renderCurrentViewPatched();
  }

  function cartQtyStepPatched(idx, delta) {
    const item = state.cart[idx];
    if (!item) return;
    if (delta < 0 && Number(item.qty || 1) <= 1) {
      removeCartIndexPatched(idx);
      return;
    }
    item.qty = Math.max(1, Number(item.qty || 1) + delta);
    saveCart();
    updateCartUIPatched();
    renderCurrentViewPatched();
  }

  function openCartPatched() {
    const drawer = document.getElementById('drawer');
    if (!drawer) return;
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
  }

  function closeCartPatched() {
    const drawer = document.getElementById('drawer');
    if (!drawer) return;
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
  }

  function installFooterCheckoutHandler() {
    const btn = document.getElementById('checkoutFooterBtn');
    if (btn) btn.onclick = () => openCartPatched();
  }

  function bindHistory() {
    if (!history.state) history.replaceState(currentRouteSnapshot(state.view), '', location.href);
    window.onpopstate = (ev) => {
      applyRouteSnapshot(ev.state || { view: 'home' });
    };
  }

  function install() {
    injectStyles();
    patchFooter();
    installFooterCheckoutHandler();
    bindHistory();
    updateCartUIPatched();
    updateTierFooterPatched();
  }

  // expose patched functions
  window.updateCartUI = updateCartUIPatched;
  window.updateTierFooter = updateTierFooterPatched;
  window.renderCurrentView = renderCurrentViewPatched;
  window.renderProductsList = renderProductsListPatched;
  window.goHome = goHomePatched;
  window.goTiers = goTiersPatched;
  window.goCompanies = goCompaniesPatched;
  window.goProducts = goProductsPatched;
  window.goOffers = goOffersPatched;
  window.goFlash = goFlashPatched;
  window.setCompanyFilter = setCompanyFilterPatched;
  window.startSearch = startSearchPatched;
  window.clearSearch = clearSearchPatched;
  window.selectSearchSuggestion = selectSearchSuggestionPatched;
  window.toggleProductToCart = toggleProductToCartPatched;
  window.stepQty = stepQtyPatched;
  window.addOfferToCart = addOfferToCartPatched;
  window.removeCartIndex = removeCartIndexPatched;
  window.cartQtyStep = cartQtyStepPatched;
  window.openCart = openCartPatched;
  window.closeCart = closeCartPatched;

  document.addEventListener('DOMContentLoaded', install);
})();
</script>

      const be = new Date(b.end_datetime || (b.end_date && b.end_time ? `${b.end_date}T${b.end_time}` : 0)).getTime() || 0;

      }
      .drawer{width:min(420px,100%) !important;}
      .bottom-bar{padding:10px 12px calc(10px + env(safe-area-inset-bottom)) !important;}
      .bottom-inner{gap:8px !important;}
      .smart-tier{
        min-width:0 !important;
        height:60px !important;
        padding:0 12px !important;
        align-items:center !important;
      }
      .smart-tier .main{
        font-size:10px !important;
        line-height:1.1 !important;
        opacity:.88;
      }
      .smart-tier .sub{
        font-size:15px !important;
        line-height:1.1 !important;
        font-weight:900 !important;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        max-width:100%;
      }
      .footer-total,.footer-checkout{
        height:60px !important;
        border-radius:18px !important;
        min-width:0 !important;
        padding:0 10px !important;
      }
      .footer-total{
        background:#fff !important;
        color:var(--primary) !important;
        border:1px solid var(--line) !important;
        font-weight:900 !important;
      }
      .footer-checkout{
        background:linear-gradient(135deg,var(--good),#22c55e) !important;
        color:#fff !important;
        border:1px solid var(--good) !important;
        font-weight:900 !important;
      }
      .footer-checkout span{display:block;font-size:13px}
      .footer-total span{display:block;font-size:13px}
      .tiers-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr)) !important;}
      .tier-card{border-radius:20px !important;padding:12px !important}
      .tier-card .title{font-size:14px !important}
      .tier-card .min{font-size:12px !important}
      .rep-section{
        margin-top:14px;
        border:1px solid var(--line);
        border-radius:20px;
        padding:14px;
        background:#fff;
        box-shadow:var(--shadow);
      }
      .rep-section .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
      .rep-badge{
        font-size:12px;
        color:var(--muted);
      }
      @media (max-width: 520px){
        .topbar-inner{padding:7px 10px 5px !important;}
        .header-nav{padding:0 10px 8px !important;gap:6px !important;}
        .nav-btn{min-height:52px !important;padding:8px 8px 7px !important;}
        .nav-btn strong{font-size:13px !important}
        .nav-btn small{font-size:9px !important}
        .catalog{grid-template-columns:repeat(2,minmax(0,1fr)) !important;}
        .companies{grid-template-columns:repeat(3,minmax(0,1fr)) !important;}
      }
    `;
    document.head.appendChild(style);
  }

  function ensureHeaderNav() {
    let nav = document.getElementById('headerNav');
    if (nav) return nav;
    nav = document.createElement('div');
    nav.id = 'headerNav';
    nav.className = 'header-nav';
    const topbar = document.querySelector('.topbar');
    if (topbar) topbar.insertAdjacentElement('afterend', nav);
    return nav;
  }

  function renderHeaderNav() {
    const nav = ensureHeaderNav();
    const flash = getLiveFlashOffer();
    const flashLabel = flash ? countdownText(flash.end_datetime || (flash.end_date && flash.end_time ? `${flash.end_date}T${flash.end_time}` : '')) : 'لا يوجد عرض نشط';
    const tierLabel = state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name || 'الشريحة') : 'اختار شريحتك';

    nav.innerHTML = `
      <button class="nav-btn ${state.view === 'tiers' ? 'active' : ''}" id="navTierBtn" type="button">
        <strong>اختار شريحتك</strong>
        <small>${esc(tierLabel)}</small>
      </button>
      <button class="nav-btn ${state.view === 'offers' ? 'active' : ''}" id="navOffersBtn" type="button">
        <strong>صفقة اليوم</strong>
        <small>عرض سريع</small>
      </button>
      <button class="nav-btn ${state.view === 'flash' ? 'active flash-live' : 'flash-live'}" id="navFlashBtn" type="button">
        <strong>عرض الساعة</strong>
        <small id="navFlashCountdown">${esc(flashLabel)}</small>
      </button>
    `;

    const tierBtn = nav.querySelector('#navTierBtn');
    const offersBtn = nav.querySelector('#navOffersBtn');
    const flashBtn = nav.querySelector('#navFlashBtn');
    if (tierBtn) tierBtn.onclick = () => goTiersFinal();
    if (offersBtn) offersBtn.onclick = () => goOffersFinal();
    if (flashBtn) flashBtn.onclick = () => goFlashFinal();
  }

  function updateHeaderNav() {
    renderHeaderNav();
  }

  function updateTierFooterFinal() {
    const btn = document.getElementById('tierBtn');
    const main = document.getElementById('tierBtnMain');
    const sub = document.getElementById('tierBtnSub');
    const right = document.getElementById('tierBtnRight');
    if (!btn || !main || !sub || !right) return;

    if (!state.selectedTier) {
      btn.classList.remove('ok');
      main.textContent = 'اختار شريحتك';
      sub.textContent = 'اضغط هنا لفتح الشرائح';
      right.textContent = '→';
      updateHeaderNav();
      return;
    }

    const need = Number(state.selectedTier.tier_min || 0);
    const used = (typeof cartTotals === 'function') ? cartTotals().eligible : 0;
    const remaining = Math.max(0, need - used);

    btn.classList.toggle('ok', remaining <= 0);
    main.textContent = 'المتبقي';
    sub.textContent = `${formatMoney(remaining)} ج.م`;
    right.textContent = remaining <= 0 ? '✓' : '→';
    updateHeaderNav();
  }

  function renderHomeFinal() {
    const heroText = state.settings && state.settings.tier_welcome
      ? state.settings.tier_welcome
      : 'سرعة قرار. أقل تفكير. متوسط فاتورة أعلى.';
    const companies = Array.isArray(state.companies) ? state.companies : [];

    const main = document.getElementById('main');
    if (!main) return;

    main.innerHTML = `
      <section class="hero">
        <div class="hero-card">
          <h2 class="hero-title">${esc(heroText)}</h2>
          <p class="hero-sub">
            واجهة مبيعات سريعة، واضحة، ولحظية. اختر الشريحة، تصفح الشركات، وابدأ الإضافة مباشرة بدون إعادة تحميل.
          </p>
        </div>

        <div class="search-wrap">
          <div class="search-row">
            <input id="searchInput" class="search-input" placeholder="ابحث بالاسم أو الكود أو الشركة..." value="${esc(state.searchQuery || '')}" />
            <button class="search-clear" id="searchClearBtn" type="button">✕</button>
          </div>
          <div id="suggestions" class="suggestions"></div>
        </div>
      </section>

      <div class="section-head">
        <div>
          <h2>الشركات</h2>
          <p>اضغط على الشركة لفتح منتجاتها فورًا</p>
        </div>
        <button class="pill ${state.companyFilter ? '' : 'active'}" onclick="goCompanies()">الكل</button>
      </div>

      <div class="companies">
        ${(companies.length ? companies : []).slice(0, 60).map(c => `
          <div class="company ${norm(state.companyFilter) === norm(c.name) ? 'active' : ''}" onclick="goProducts('${esc(c.name)}')">
            ${c.logo ? `<img src="${esc(c.logo)}" alt="${esc(c.name)}">` : `<div class="logo">${esc((String(c.name || 'A').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase() || 'A'))}</div>`}
            <div class="name">${esc(c.name)}</div>
            <div class="count">${Number(c.count || 0)} صنف</div>
          </div>
        `).join('')}
      </div>
    `;

    if (typeof initSearchBox === 'function') initSearchBox();
    updateHeaderNav();
  }

  function renderTiersFinal() {
    const main = document.getElementById('main');
    if (!main) return;

    main.innerHTML = `
      <div class="section-head">
        <div>
          <h2>اختيار الشريحة</h2>
          <p>تغيير الشريحة لا يمسح السلة ويعيد التسعير تلقائيًا</p>
        </div>
        <button class="pill" onclick="goHome()">رجوع</button>
      </div>

      <div class="tiers-grid">
        ${(state.tiers || []).map(t => `
          <div class="tier-card ${state.selectedTier && String(state.selectedTier.tier_name) === String(t.tier_name) ? 'active' : ''}" onclick="pickTier('${esc(t.tier_name)}')">
            <div class="title">${esc(t.visible_label || t.tier_name || 'شريحة')}</div>
            <div class="min">الحد الأدنى: ${formatMoney(t.tier_min)} ج.م</div>
            <div class="min">${esc(t.tier_description || '')}</div>
          </div>
        `).join('')}
      </div>

      <div class="rep-section">
        <div class="row">
          <div>
            <strong>${state.rep && state.rep.rep && state.rep.rep.rep_name ? esc(state.rep.rep.rep_name) : 'دخول مندوب'}</strong>
            <div class="rep-badge">${state.rep && state.rep.rep ? 'البيانات محفوظة للجلسة الحالية' : 'اضغط للدخول بحساب المندوب'}</div>
          </div>
          <button class="chip-btn primary" type="button" onclick="handleRepButton()">دخول مندوب</button>
        </div>
      </div>
    `;
    updateHeaderNav();
  }

  function renderProductCardFinal(p) {
    const unit = (typeof getSelectedUnit === 'function') ? getSelectedUnit(p.id) : 'carton';
    const pr = (typeof resolvePrice === 'function') ? resolvePrice(p, unit) : { base: 0, current: 0, changed: false };
    const selected = (typeof cartItemByKey === 'function') ? cartItemByKey(`${p.id}::${unit}`) : null;

    const unitButtons = ['carton', 'pack', 'piece']
      .filter(u => Number((p.base_prices || {})[u] || 0) > 0)
      .map(u => `
        <button class="unit-tab ${unit === u ? 'active' : ''}" onclick="setSelectedUnit('${esc(String(p.id))}','${u}')">${u === 'carton' ? 'كرتونة' : u === 'pack' ? 'دستة' : 'قطعة'}</button>
      `).join('');

    const oldPriceHtml = (state.selectedTier && pr.changed) ? `<div class="old-price">${formatMoney(pr.base)} ج.م</div>` : '';
    const priceHtml = `<div class="new-price">${formatMoney(pr.current)} ج.م</div>`;
    const btnText = selected ? 'إزالة' : 'شراء';

    return `
      <article class="card ${pr.changed ? 'offer' : ''}">
        <div class="img">
          <img src="${esc(p.image || fallbackImage())}" alt="${esc(p.name)}" loading="lazy" />
          <div class="badge">${esc(p.company || '')}</div>
        </div>
        <div class="body">
          <div class="title">${esc(p.name)}</div>
          <div class="subline">الكود: ${esc(String(p.id))}</div>
          <div class="unit-tabs">${unitButtons}</div>
          <div class="price-box">
            ${oldPriceHtml}
            ${priceHtml}
          </div>
          <div class="qty-row">
            <div class="stepper">
              <button onclick="stepQty('${esc(String(p.id))}','${unit}',-1)">−</button>
              <span>${selected ? selected.qty : 1}</span>
              <button onclick="stepQty('${esc(String(p.id))}','${unit}',1)">+</button>
            </div>
            <button class="add-btn ${selected ? 'remove' : ''}" onclick="toggleProductToCart('${esc(String(p.id))}','${unit}')">${btnText}</button>
          </div>
        </div>
      </article>
    `;
  }

  function goHomeFinal() {
    state.view = 'home';
    state.companyFilter = '';
    state.searchMode = false;
    state.searchQuery = '';
    pushRoute('home');
    renderHomeFinal();
    updateHeaderNav();
  }

  function goTiersFinal() {
    state.view = 'tiers';
    pushRoute('tiers');
    renderTiersFinal();
    updateHeaderNav();
  }

  function goCompaniesFinal() {
    state.view = 'companies';
    pushRoute('companies');
    if (typeof OLD.renderCompanies === 'function') OLD.renderCompanies();
    updateHeaderNav();
  }

  function goOffersFinal() {
    state.view = 'offers';
    pushRoute('offers');
    if (typeof OLD.renderOffers === 'function') OLD.renderOffers();
    updateHeaderNav();
  }

  function goFlashFinal() {
    state.view = 'flash';
    pushRoute('flash');
    if (typeof OLD.renderFlashOffers === 'function') OLD.renderFlashOffers();
    updateHeaderNav();
  }

  function renderCurrentViewFinal() {
    if (state.view === 'home') return renderHomeFinal();
    if (state.view === 'tiers') return renderTiersFinal();
    if (state.view === 'companies') return (typeof OLD.renderCompanies === 'function' ? OLD.renderCompanies() : renderHomeFinal());
    if (state.view === 'offers') return (typeof OLD.renderOffers === 'function' ? OLD.renderOffers() : renderHomeFinal());
    if (state.view === 'flash') return (typeof OLD.renderFlashOffers === 'function' ? OLD.renderFlashOffers() : renderHomeFinal());
    return (typeof OLD.renderProductsList === 'function' ? OLD.renderProductsList(true) : renderHomeFinal());
  }

  function goProductsFinal(company = '') {
    state.companyFilter = String(company || '').trim();
    state.searchMode = false;
    state.searchQuery = '';
    state.view = 'products';
    state.currentPage = 1;
    state.hasMore = true;
    state.products = [];
    state.productsError = null;
    pushRoute('products');
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    const pending = loadProducts(true);
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    pending.then(() => {
      if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
      updateHeaderNav();
    }).catch(() => {});
  }

  function setCompanyFilterFinal(company = '') {
    return goProductsFinal(company);
  }

  function startSearchFinal(q) {
    const query = String(q || '').trim();
    state.view = 'products';
    state.searchMode = !!query;
    state.searchQuery = query;
    state.companyFilter = '';
    state.currentPage = 1;
    state.hasMore = true;
    state.products = [];
    state.productsError = null;
    pushRoute('products');
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    const pending = loadProducts(true);
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    pending.then(() => {
      if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
      updateHeaderNav();
    }).catch(() => {});
  }

  function clearSearchFinal() {
    state.searchMode = false;
    state.searchQuery = '';
    state.companyFilter = '';
    state.currentPage = 1;
    state.hasMore = true;
    state.products = [];
    state.productsError = null;
    pushRoute('products');
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    const pending = loadProducts(true);
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    pending.then(() => {
      if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
      updateHeaderNav();
    }).catch(() => {});
  }

  function selectSearchSuggestionFinal(id) {
    const item = (state.productIndex && state.productIndex.get(String(id))) || (state.products || []).find(p => String(p.id) === String(id));
    if (!item) return;
    state.searchMode = true;
    state.searchQuery = item.name || '';
    state.companyFilter = item.company || '';
    state.view = 'products';
    state.currentPage = 1;
    state.hasMore = true;
    state.products = [];
    state.productsError = null;
    pushRoute('products');
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    const pending = loadProducts(true);
    if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
    pending.then(() => {
      if (typeof OLD.renderProductsList === 'function') OLD.renderProductsList(true);
      toast('تم اختيار الصنف', 'good');
      updateHeaderNav();
    }).catch(() => {});
  }

  function submitRepLoginFinal() {
    const idEl = document.getElementById('repIdInput');
    const passEl = document.getElementById('repPassInput');
    const rep_id = String(idEl ? idEl.value : '').trim();
    const password = String(passEl ? passEl.value : '').trim();

    if (!rep_id || !password) {
      toast('أدخل كود المندوب وكلمة السر', 'warn');
      return;
    }

    apiRequest('reps/login', {}, 'POST', { rep_id, password })
      .then(data => {
        if (data && data.valid) {
          state.rep = data.session;
          saveJSON('alahram_rep_session', data.session);
          localStorage.setItem('alahram_rep_token', data.token);
          if (typeof updateRepUI === 'function') updateRepUI();
          if (typeof closeOverlay === 'function') closeOverlay();
          toast('تم تسجيل الدخول بنجاح', 'good');
        } else {
          toast((data && data.error) ? data.error : 'بيانات غير صحيحة', 'bad');
        }
      })
      .catch(() => {
        toast('تعذر التحقق من دخول المندوب الآن', 'bad');
      });
  }

  function updateHeaderNavLoop() {
    const nav = document.getElementById('headerNav');
    if (!nav) return;
    const flash = getLiveFlashOffer();
    const flashCountdown = flash ? countdownText(flash.end_datetime || (flash.end_date && flash.end_time ? `${flash.end_date}T${flash.end_time}` : '')) : 'لا يوجد عرض نشط';
    const flashBtn = nav.querySelector('#navFlashBtn small');
    if (flashBtn) flashBtn.textContent = flashCountdown;

    const tierBtn = nav.querySelector('#navTierBtn small');
    if (tierBtn) tierBtn.textContent = state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name || 'الشريحة') : 'اضغط لفتح الشرائح';

    nav.querySelector('#navTierBtn')?.classList.toggle('active', state.view === 'tiers');
    nav.querySelector('#navOffersBtn')?.classList.toggle('active', state.view === 'offers');
    nav.querySelector('#navFlashBtn')?.classList.toggle('active', state.view === 'flash');
    nav.querySelector('#navFlashBtn')?.classList.toggle('flash-live', !!flash);
  }

  function updateHeaderNavFinal() {
    renderHeaderNav();
    updateHeaderNavLoop();
  }

  function updateTierFooterFinalWrapper() {
    updateTierFooterFinal();
    updateHeaderNavLoop();
  }

  function install() {
    injectStyles();

    // expose final functions
    window.renderHome = renderHomeFinal;
    window.renderTiers = renderTiersFinal;
    window.renderProductCard = renderProductCardFinal;
    window.goHome = goHomeFinal;
    window.goTiers = goTiersFinal;
    window.goCompanies = goCompaniesFinal;
    window.goOffers = goOffersFinal;
    window.goFlash = goFlashFinal;
    window.goProducts = goProductsFinal;
    window.setCompanyFilter = setCompanyFilterFinal;
    window.startSearch = startSearchFinal;
    window.clearSearch = clearSearchFinal;
    window.selectSearchSuggestion = selectSearchSuggestionFinal;
    window.submitRepLogin = submitRepLoginFinal;
    window.renderCurrentView = renderCurrentViewFinal;
    window.updateTierFooter = updateTierFooterFinalWrapper;

    // keep cart refresh instant with footer/header sync
    if (typeof OLD.updateCartUI === 'function') {
      window.updateCartUI = function () {
        try { OLD.updateCartUI(); } catch (e) {}
        updateHeaderNavLoop();
      };
    }

    // history / back navigation
    if (!history.state) history.replaceState(routeSnapshot(state.view), '', location.href);
    window.onpopstate = (ev) => {
      applyRoute(ev.state || { view: 'home' });
    };

    // refresh header/nav and footer based on current data
    renderHeaderNav();
    updateHeaderNavLoop();
    updateTierFooterFinalWrapper();

    // whenever current view is entered after prior bootstrap rendering, ensure header nav stays in sync
    setInterval(updateHeaderNavLoop, 1000);

    // expose utilities used inline
    window.updateHeaderNavFinal = updateHeaderNavFinal;
    window.__finalPushRoute = pushRoute;
    window.__finalApplyRoute = applyRoute;
  }

  document.addEventListener('DOMContentLoaded', install);
})();
</script>

</body>
</html>
