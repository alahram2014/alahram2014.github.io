<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alahram Co B2B</title>
  <meta name="theme-color" content="#1f3a5f" />
  <style>
    :root{
      --bg:#f6f9ff;
      --card:#ffffff;
      --text:#102033;
      --muted:#64748b;
      --line:#e6ebf2;
      --primary:#1f3a5f;
      --primary2:#245a91;
      --good:#16a34a;
      --bad:#ef4444;
      --warn:#f59e0b;
      --gold:#f7c948;
      --shadow:0 14px 36px rgba(16,32,51,.10);
      --shadow-soft:0 10px 24px rgba(16,32,51,.08);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 18%, var(--bg) 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding-bottom:92px;
      overflow-x:hidden;
    }
    button,input,textarea{font:inherit}
    button{border:0;background:none;cursor:pointer}
    a{color:inherit;text-decoration:none}
    img{max-width:100%}
    .app{max-width:1320px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(246,248,251,.92);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(230,235,242,.9);
      max-height:20vh;
      overflow:hidden;
    }
    .topbar-inner{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:8px 12px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;min-width:0;cursor:pointer;direction:rtl;justify-content:flex-end;
    }
    .brand-badge{
      width:38px;height:38px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;font-weight:900;box-shadow:var(--shadow);flex:0 0 auto;
      font-size:16px;
    }
    .brand-text{min-width:0;text-align:right}
    .brand-text h1{
      margin:0;font-size:17px;line-height:1.1;font-family:"Noto Naskh Arabic","Amiri",serif;font-weight:700;
      letter-spacing:0;
    }
    .brand-text p{margin:3px 0 0;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}

    .topbar-inner{gap:8px}
    .rep-chip{
      display:flex;align-items:center;gap:10px;
      min-width:0;max-width:48vw;
      padding:9px 12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      color:var(--text);
      text-align:right;
      flex:0 0 auto;
    }
    .rep-chip .dot{
      width:10px;height:10px;border-radius:999px;background:var(--bad);flex:0 0 auto;
      box-shadow:0 0 0 4px rgba(239,68,68,.10);
    }
    .rep-chip.active .dot{
      background:var(--good);
      box-shadow:0 0 0 4px rgba(22,163,74,.12);
    }
    .rep-chip .meta{min-width:0;display:flex;flex-direction:column;align-items:flex-start;line-height:1.15}
    .rep-chip .meta strong{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw}
    .rep-chip .meta span{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:34vw;margin-top:3px}
    .rep-modal-grid{display:grid;gap:12px}
    .rep-status{
      border-radius:18px;padding:12px 14px;border:1px solid var(--line);background:#f8fbff;
      display:flex;align-items:center;justify-content:space-between;gap:10px
    }
    .rep-status strong{font-size:14px}
    .rep-status.good{background:rgba(22,163,74,.08);border-color:rgba(22,163,74,.18)}
    .rep-status.bad{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.18)}
    .rep-card{
      border:1px solid var(--line);border-radius:20px;background:#fff;box-shadow:var(--shadow-soft);padding:14px;display:grid;gap:10px
    }
    .rep-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .rep-submit{
      height:48px;border-radius:16px;background:var(--primary);color:#fff;font-weight:900;font-size:15px;
      width:100%
    }
    .rep-submit.logout{background:var(--bad)}
    .rep-note{font-size:12px;color:var(--muted);line-height:1.6}
    .rep-readonly{
      border:1px solid var(--line);background:#f8fbff;border-radius:16px;padding:12px 14px;font-size:14px;min-height:46px
    }
    .page{padding:10px 12px 320px}
    .panel{
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow-soft);
      border-radius:24px;
    }
    .search-wrap{
      border-radius:20px;padding:10px 10px 8px;margin:8px 0 10px;
    }
    .search-row{display:flex;align-items:center;gap:8px}
    .search-input{
      flex:1;min-width:0;border:0;outline:0;background:transparent;
      padding:7px 2px;font-size:13px;color:var(--text)
    }
    .search-clear{
      width:34px;height:34px;border-radius:12px;border:1px solid var(--line);background:#fff;
      color:var(--muted);display:grid;place-items:center;flex:0 0 auto;
    }
    .search-suggest{margin-top:8px;display:none;flex-direction:column;gap:8px;max-height:320px;overflow:auto}
    .search-suggest.show{display:flex}
    .suggest-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:10px 12px;border-radius:16px;background:#f8fbff;border:1px solid #e8eef8;text-align:right
    }
    .suggest-item strong{display:block;font-size:13px}
    .suggest-item span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    .shortcut-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .chip{
      border:1px solid var(--line);
      border-radius:18px;padding:12px 10px;display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:800;color:var(--text);min-height:54px;text-align:center;background:#fff;box-shadow:var(--shadow-soft)
    }
    .chip.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:var(--primary)}
    .chip.good{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border-color:#16a34a}
    .chip.gold{background:linear-gradient(135deg,#f7c948,#f59e0b);color:#111827;border-color:#e7b72f}
    .chip.live{
      background:linear-gradient(135deg,#7f1d1d,#f97316);color:#fff;border-color:#f97316;
      box-shadow:0 0 0 1px rgba(255,255,255,.18),0 16px 30px rgba(249,115,22,.25);animation:flashGlow 1.6s ease-in-out infinite
    }
    .chip.live small{color:rgba(255,255,255,.92)}
    @keyframes flashGlow{0%,100%{filter:saturate(1)}50%{filter:saturate(1.25);transform:translateY(-1px)}}
    .section-head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:16px 0 10px}
    .section-head h2{margin:0;font-size:17px}
    .section-head p{margin:2px 0 0;font-size:12px;color:var(--muted)}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
    .companies{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}
    .company-card{
      border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft);border-radius:20px;padding:10px;min-height:104px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;
      transform:translateZ(0);transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease
    }
    .company-card:hover{transform:scale(1.02);box-shadow:0 16px 40px rgba(16,32,51,.12)}
    .company-card:active{transform:scale(.985)}
    .company-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .company-logo,.company-img{
      width:52px;height:52px;border-radius:18px;object-fit:cover;background:#edf2f7;
      display:grid;place-items:center;font-weight:900;color:var(--primary)
    }
    .company-name{font-size:13px;line-height:1.35;font-weight:900;color:#0f172a}
    .catalog{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:8px}
    .card{
      border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft);border-radius:18px;overflow:hidden;
      display:flex;flex-direction:column;min-height:100%
    }
    .card .img{
      aspect-ratio:1/1;background:#f1f5fb;position:relative;overflow:hidden;display:grid;place-items:center
    }
    .card .img img{width:100%;height:100%;object-fit:contain;display:block;padding:6px}
    .card .body{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
    .title-btn{padding:0;text-align:right;width:100%}
    .card .title{
      font-size:12px;line-height:1.35;font-weight:900;min-height:32px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
    }
    .card .meta{font-size:10px;color:var(--muted);line-height:1.35}
    .units{display:flex;flex-wrap:wrap;gap:4px}
    .unit-btn{
      border:1px solid var(--line);background:#f8fbff;border-radius:999px;padding:5px 7px;font-size:10px;
      min-width:44px;text-align:center;color:var(--text)
    }
    .unit-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .price{border-top:1px dashed var(--line);padding-top:6px}
    .price .old{font-size:11px;color:var(--muted);text-decoration:line-through}
    .price .now{font-size:15px;font-weight:900;color:#0f172a;line-height:1.1}
    .buy-btn{
      width:100%;height:38px;border-radius:12px;font-weight:900;font-size:13px;
      background:var(--primary);color:#fff
    }
    .buy-btn.remove{background:var(--bad)}
    .action-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
    .action-card,
    .tier-card{
      border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft);border-radius:18px;padding:14px;min-height:86px;
      display:flex;flex-direction:column;justify-content:space-between;gap:8px;text-align:right
    }
    .action-card .label,.tier-card .label{font-size:15px;font-weight:900}
    .action-card .desc,.tier-card .desc{font-size:12px;color:var(--muted);line-height:1.45}
    .tier-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .empty{border:1px dashed var(--line);border-radius:20px;background:#fff;padding:24px;text-align:center;color:var(--muted);box-shadow:var(--shadow-soft)}
    .skeleton{border-radius:18px;background:linear-gradient(90deg,#eef3fb 25%,#f7fafc 37%,#eef3fb 63%);background-size:400% 100%;animation:shimmer 1.1s ease infinite}
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
    .skeleton-line{height:12px;width:100%}
    .skeleton-box{height:100%}
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:90;display:none;align-items:center;justify-content:center;padding:16px}
    .overlay.show{display:flex}
    .modal{width:min(560px,100%);border-radius:24px;overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
    .modal.fullscreen{width:min(100vw,100%);height:100vh;border-radius:0;display:flex;flex-direction:column}
    .modal .head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff}
    .modal .body{padding:16px;overflow:auto;flex:1}
    .modal h3{margin:0;font-size:17px}
    .form-grid{display:grid;gap:10px}
    .input{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;outline:0}
    .msg{font-size:12px;color:var(--muted);line-height:1.55;margin-top:2px}
    .cart-drawer{
      position:fixed;inset:0 auto 0 0;z-index:80;width:min(420px,100%);
      transform:translateX(-102%);transition:.24s ease transform;display:flex;flex-direction:column;background:#fff;border-left:1px solid var(--line)
    }
    .cart-drawer.open{transform:translateX(0)}
    .drawer-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
    .drawer-head h3{margin:0;font-size:17px}
    .drawer-body{padding:14px;overflow:auto;flex:1}
    .cart-top-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
    .stat-pill{border:1px solid var(--line);background:#f8fbff;border-radius:16px;padding:10px 8px;text-align:center;box-shadow:var(--shadow-soft)}
    .stat-pill strong{display:block;font-size:16px;line-height:1.1}
    .stat-pill span{display:block;font-size:11px;color:var(--muted);margin-top:4px}
    .cart-item{border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft);border-radius:18px;padding:12px;margin-bottom:10px}
    .cart-item .row{display:flex;align-items:start;justify-content:space-between;gap:10px}
    .cart-item .name{font-weight:900;font-size:13px;line-height:1.45}
    .cart-item .meta{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
    .cart-item .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}
    .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;min-width:106px}
    .stepper button{width:34px;height:34px;background:#f8fbff}
    .stepper span{min-width:34px;text-align:center;font-weight:900}
    .drawer-footer{padding:14px;border-top:1px solid var(--line);background:#fff}
    .drawer-footer .total{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .submit-btn{width:100%;height:50px;border-radius:16px;background:var(--good);color:#fff;font-weight:900;font-size:15px}
    .checkout-grid{display:grid;gap:10px}
    .checkout-summary{padding:12px;border:1px solid var(--line);border-radius:18px;background:#f8fbff;display:grid;gap:8px}
    .checkout-field-error{font-size:11px;line-height:1.4;color:var(--bad);display:none}
    .checkout-field-error.show{display:block}
    .checkout-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .checkout-location{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .checkout-location small{color:var(--muted);font-size:11px;line-height:1.4}
    .toast-zone{
      position:fixed;left:12px;right:12px;top:12px;z-index:120;display:flex;flex-direction:column;gap:8px;
      max-width:min(420px,calc(100vw - 24px));pointer-events:none;align-items:flex-start
    }
    .toast{
      background:rgba(15,23,42,.96);color:#fff;border-radius:14px;padding:10px 12px;box-shadow:var(--shadow);font-size:12px;line-height:1.45;
      opacity:0;transform:translateY(-8px);animation:toastIn .24s ease forwards;backdrop-filter:blur(10px)
    }
    .toast.good{background:#146c43}
    .toast.bad{background:#7f1d1d}
    .toast.warn{background:#8a5a00}
    .toast.info{background:#173a84}
    @keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .bottom-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
      border-top:1px solid rgba(230,235,242,.95);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom))
    }
    .bottom-inner{max-width:1320px;margin:0 auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;align-items:stretch}
    .bottom-tier,.bottom-total{
      min-height:58px;border-radius:18px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;
      border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft)
    }
    .bottom-tier .left,.bottom-total .left{min-width:0;text-align:right}
    .bottom-tier .main,.bottom-total .main{font-size:clamp(13px,3.5vw,18px);font-weight:900;line-height:1.1}
    .bottom-tier .sub,.bottom-total .sub{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bottom-tier.ok{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:#16a34a;color:#fff}
    .bottom-tier.ok .sub{color:rgba(255,255,255,.92)}
    .bottom-total{justify-content:center;text-align:center}
    .bottom-total .main{display:flex;align-items:center;gap:8px}
    .bottom-total .sub{margin-top:0}
    .bottom-total .icon{font-size:18px}
    .bottom-total .copy{display:flex;flex-direction:column;align-items:flex-start}
    .page-footer{margin-top:16px;padding-top:8px}
    .back-row{display:flex;justify-content:center}
    .back-btn{min-width:122px;height:44px;border-radius:999px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);font-weight:900;color:var(--text)}
    .contact-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px}
    .contact-link{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-soft);display:grid;place-items:center;font-size:18px}
    .signature{text-align:center;margin-top:8px;font-size:12px;color:var(--muted)}
    .hidden{display:none !important}
    .sticky-search{position:sticky;top:58px;z-index:20}
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .filter-chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;box-shadow:var(--shadow-soft)}
    .filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .hero-spacer{height:2px}
    @media (max-width: 900px){
      .shortcut-row,.action-row{grid-template-columns:1fr 1fr}
      .catalog{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
      .bottom-inner{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 520px){
      .topbar-inner{padding:8px 10px}
      .page{padding:8px 10px 18px}
      .brand-text h1{font-size:15px}
      .brand-text p{font-size:10px;max-width:55vw}
      .catalog{grid-template-columns:repeat(2,minmax(0,1fr))}
      .companies{grid-template-columns:repeat(3,minmax(0,1fr))}
      .toast-zone{left:8px;right:8px;top:8px;max-width:none}
      .cart-drawer{width:100%}
      .search-input{font-size:12px}
      .chip{min-height:50px;padding:11px 8px}
      .bottom-inner{gap:8px}
      .bottom-tier,.bottom-total{padding:9px 11px}
      .cart-top-stats{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" id="homeBtn" role="button" aria-label="الصفحة الرئيسية">
          <div class="brand-badge">A</div>
          <div class="brand-text">
            <h1>الأهرام للتجارة والتوزيع</h1>
            <p id="brandSub">نظام بيع ذكي لتجارة الجملة</p>
          </div>
        </div>
        <button id="repHeaderBtn" class="rep-chip" type="button" aria-label="دخول المندوب">
          <span class="dot"></span>
          <span class="meta">
            <strong id="repHeaderName">دخول المندوب</strong>
            <span id="repHeaderSub">اضغط لتسجيل الدخول</span>
          </span>
        </button>
      </div>
    </header>

    <main id="main" class="page">
      <div class="empty">جارٍ تحميل البيانات…</div>
    </main>
  </div>

  <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3>السلة</h3>
        <div class="msg" id="cartSummary">0 قطعة</div>
      </div>
      <button class="search-clear" id="closeCartBtn" type="button">✕</button>
    </div>
    <div class="drawer-body">
      <div class="cart-top-stats">
        <div class="stat-pill"><strong id="cartPiecesCount">0</strong><span>قطع</span></div>
        <div class="stat-pill"><strong id="cartCartonsCount">0</strong><span>كراتين</span></div>
        <button class="stat-pill" id="clearCartBtn" type="button"><strong>↻</strong><span>تصفير</span></button>
      </div>
      <div id="cartList"></div>
    </div>
    <div class="drawer-footer">
      <div class="total">
        <strong>الإجمالي</strong>
        <strong id="cartTotal">0 ج.م</strong>
      </div>
      <button class="submit-btn" id="checkoutBtn" type="button">إتمام الطلب</button>
    </div>
  </aside>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal" id="genericModal">
      <div class="head">
        <h3 id="modalTitle">عنوان</h3>
        <button class="search-clear" id="closeOverlayBtn" type="button">✕</button>
      </div>
      <div class="body" id="modalBody"></div>
    </div>
  </div>

  const options = { method, headers: {} };

  if (now - prev.ts > 7000) prev.count = 0;
  if (prev.count >= 2) return;
  prev.count += 1;
  prev.ts = now;
  toastRepeatGuard.set(signature, prev);

  };

function getCartAnalysis(cart = state.cart) {
  const companiesMap = {};
  let total = 0;
  let eligible = 0;
  for (const item of cart || []) {
    const line = itemLinePrice(item);
    const sum = Number(item.qty || 1) * line;
    total += sum;
    if (item.type === 'product') {
      eligible += sum;
      const company = String(item.company || 'غير معروف').trim();
      companiesMap[company] = (companiesMap[company] || 0) + sum;
    }
  }
  return { total, eligible, companiesMap, companiesCount: Object.keys(companiesMap).length };
}
function itemLinePrice(item) {
  if (!item) return 0;
  if (item.type !== 'product') return Number(item.price || 0);
  return resolvePrice(item.product_snapshot || item, item.unit).current;
}
function findCartIndex(key) {

function canSetProductQty(product, unit, newQty, excludeIdx = -1) {
  if (!state.selectedTier) return { ok: true };
  const tierMax = Number(state.selectedTier.tier_min || 0) * 0.25;
  const price = resolvePrice(product, unit).current;
  const company = String(product.company || '').trim();
  let currentCompanyTotal = 0;
  for (let i = 0; i < state.cart.length; i++) {
    if (i === excludeIdx) continue;
    const item = state.cart[i];
    if (item.type !== 'product') continue;
    if (String(item.company || '').trim() !== company) continue;
    currentCompanyTotal += Number(item.qty || 1) * itemLinePrice(item);
  }
  const projected = currentCompanyTotal + (Number(newQty || 1) * price);
  if (projected > tierMax) return { ok: false, max: tierMax, projected };
  return { ok: true };
}
function toggleProductToCartFromModal(productId, unit) {
  const product = state.products.find(p => String(p.id) === String(productId)) || state.productModalItem?.product;
  if (!product) return;
  toggleProductToCart(productId, unit, product);
}
function toggleProductToCart(productId, unit, directProduct = null) {
  const product = directProduct || state.products.find(p => String(p.id) === String(productId)) || state.productModalItem?.product;
  if (!product) {
    toast('الصنف غير متاح الآن', 'bad');
    return;
  }
  const key = cartKey(String(productId), unit);
  const idx = findCartIndex(key);
  if (idx >= 0) {
    state.cart.splice(idx, 1);
    saveCart();
    updateCartUI();
    renderCurrentView();
    popSmartToast('remove');
    return;
  }
  const qty = qtyTextToNumber(getDraftQtyText(productId, unit));
  if (qty <= 0) {
    toast('اكتب كمية صحيحة الأول', 'warn');
    return;
  }
  const allowed = canSetProductQty(product, unit, qty, -1);
  if (!allowed.ok) {
    toast('الكمية دي أكبر من الحد المناسب للشريحة', 'bad');
    return;
  }
  state.cart.push({
    type: 'product',
    id: String(product.id),
    name: product.name,
    company: product.company,
    image: product.image,
    unit,
    qty,
    base_prices: product.base_prices,
    tier_prices: product.tier_prices || {},
    product_snapshot: product
  });
  saveCart();
  updateCartUI();
  renderCurrentView();
  if (state.selectedTier && getCartAnalysis().companiesCount < 5) toast('وزّع السلة على أكتر من شركة عشان الشريحة تمشي صح', 'info');
  popSmartToast('add');
}
function changeCardQty(productId, unit, delta, controlEl) {
  const product = state.products.find(p => String(p.id) === String(productId));
  if (!product) return;
  const currentIdx = findCartIndex(cartKey(String(productId), unit));
  const field = qtyFieldFromControl(controlEl);
  const currentQty = currentIdx >= 0
    ? Number(state.cart[currentIdx].qty || 1)
    : qtyTextToNumber(readQtyFromField(field, getDraftQtyText(productId, unit)));
  const next = currentIdx >= 0
    ? Math.max(1, currentQty + Number(delta || 0))
    : Math.max(0, currentQty + Number(delta || 0));
  setQtyFieldValue(field, next > 0 ? String(next) : '');
  if (currentIdx >= 0) {
    state.cart[currentIdx].qty = next;
    saveCart();
    updateCartUI();
  } else {
    setDraftQtyText(productId, unit, next > 0 ? String(next) : '');
  }
}
function setCardQtyFromInput(productId, unit, rawValue, controlEl) {
  const product = state.products.find(p => String(p.id) === String(productId));
  if (!product) return;
  const currentIdx = findCartIndex(cartKey(String(productId), unit));
  const field = qtyFieldFromControl(controlEl);
  const cleaned = String(rawValue ?? '').replace(/\D+/g, '');
  setQtyFieldValue(field, cleaned);
  if (currentIdx >= 0) {
    const next = Math.max(1, qtyTextToNumber(cleaned) || 1);
    state.cart[currentIdx].qty = next;
    saveCart();
    updateCartUI();
  } else {
    setDraftQtyText(productId, unit, cleaned);
  }
}
function setCardQtyValue(product, productId, unit, nextQty, currentIdx = -1) {

function validateCheckoutRealtime() {
  const name = document.getElementById('checkoutName');
  const phone = document.getElementById('checkoutPhone');
  const address = document.getElementById('checkoutAddress');
  const nameErr = document.getElementById('checkoutNameError');
  const phoneErr = document.getElementById('checkoutPhoneError');
  const addressErr = document.getElementById('checkoutAddressError');
  const sendBtn = document.getElementById('checkoutSendBtn');
  if (!name || !phone || !address) return false;
  const n = String(name.value || '').trim();
  const p = String(phone.value || '').trim();
  const a = String(address.value || '').trim();
  const allowOptional = repIsActive();
  const phoneOk = allowOptional ? (!p || /^01\d{9}$/.test(p.replace(/\s+/g, ''))) : /^01\d{9}$/.test(p.replace(/\s+/g, ''));
  const okName = allowOptional ? true : !!n;
  const okAddress = allowOptional ? true : !!a;
  if (nameErr) nameErr.classList.toggle('show', !okName);
  if (phoneErr) phoneErr.classList.toggle('show', !phoneOk);
  if (addressErr) addressErr.classList.toggle('show', !okAddress);
  if (sendBtn) sendBtn.disabled = !(okName && phoneOk && okAddress);
  return okName && phoneOk && okAddress;
}

    return;
  }
  toast('جارٍ جلب الموقع…', 'info');
  navigator.geolocation.getCurrentPosition(pos => {

  }, { enableHighAccuracy: true, timeout: 10000 });
