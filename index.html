
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alahram Co B2B</title>
  <meta name="theme-color" content="#1f3a5f" />
  <style>
    :root{
      --bg:#f5f8fd;
      --card:#ffffff;
      --text:#102033;
      --muted:#64748b;
      --line:#e6ebf2;
      --primary:#1f3a5f;
      --primary2:#245a91;
      --good:#16a34a;
      --bad:#ef4444;
      --warn:#f59e0b;
      --gold:#f7c948;
      --shadow:0 14px 36px rgba(16,32,51,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 18%, var(--bg) 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding-bottom:88px;
    }
    button,input,textarea{font:inherit}
    button{border:0;background:none;cursor:pointer}
    a{color:inherit;text-decoration:none}
    .app{max-width:1320px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(246,248,251,.88);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(230,235,242,.9);
    }
    .topbar-inner{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:10px 12px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;min-width:0;cursor:pointer;
    }
    .brand-badge{
      width:42px;height:42px;border-radius:15px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;font-weight:900;box-shadow:var(--shadow);flex:0 0 auto;
    }
    .brand-text{min-width:0}
    .brand-text h1{margin:0;font-size:15px;line-height:1.1}
    .brand-text p{margin:2px 0 0;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40vw}
    .top-actions{display:none !important;align-items:center;gap:8px;flex:0 0 auto}
    .pill-btn,.mini-btn,.stack-btn,.ghost-btn,.small-card-btn,.chip,.action-card,.company-card,.tier-card,.card,.cart-item,.overlay .modal,.drawer,.search-wrap,.bottom-tier{
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow);
    }
    .pill-btn{
      height:42px;border-radius:999px;padding:0 14px;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      color:var(--text);
    }
    .pill-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .pill-btn.good{background:var(--good);border-color:var(--good);color:#fff}
    .pill-btn.warn{background:var(--warn);border-color:var(--warn);color:#fff}
    .pill-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .stack-btn{
      height:44px;border-radius:16px;padding:6px 12px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;line-height:1.05;min-width:112px;
      color:var(--text);
    }
    .stack-btn strong{font-size:13px}
    .stack-btn small{font-size:10px;color:var(--muted);display:block;margin-top:2px}
    .stack-btn.live{background:linear-gradient(135deg,#fff7db,#ffffff);border-color:#f2d46b}
    .mini-btn{
      width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
      background:#fff;color:var(--text);font-size:18px;
    }
    .page{padding:12px}
    .search-wrap{
      border-radius:24px;padding:12px;margin-top:10px;
    }
    .search-row{display:flex;align-items:center;gap:10px}
    .search-input{
      flex:1;min-width:0;border:0;outline:0;background:transparent;
      padding:6px 2px;font-size:15px;color:var(--text)
    }
    .search-clear{
      width:40px;height:40px;border-radius:14px;border:1px solid var(--line);background:#fff;
      color:var(--muted);display:grid;place-items:center;flex:0 0 auto;
    }
    .search-suggest{
      margin-top:10px;display:none;flex-direction:column;gap:8px;
      max-height:300px;overflow:auto;
    }
    .search-suggest.show{display:flex}
    .suggest-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:11px 12px;border-radius:18px;background:#f8fbff;border:1px solid #e8eef8;
    }
    .suggest-item strong{display:block;font-size:13px}
    .suggest-item span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    .shortcut-row{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:0;
    }
    .chip{
      border-radius:18px;padding:12px 10px;display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:800;color:var(--text);min-height:54px;text-align:center;
    }
    .chip.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:var(--primary)}
    .chip.good{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border-color:#16a34a}
    .chip.gold{background:linear-gradient(135deg,#f7c948,#f59e0b);color:#111827;border-color:#e7b72f}
    .chip.live{background:linear-gradient(135deg,#7f1d1d,#f97316);color:#fff;border-color:#f97316;box-shadow:0 0 0 1px rgba(255,255,255,.18),0 16px 30px rgba(249,115,22,.25);animation:flashGlow 1.6s ease-in-out infinite}
    .chip.live small{color:rgba(255,255,255,.92)}
    @keyframes flashGlow{0%,100%{filter:saturate(1)}50%{filter:saturate(1.25);transform:translateY(-1px)}}
    .section-head{
      display:flex;align-items:end;justify-content:space-between;gap:12px;
      margin:16px 0 10px;
    }
    .section-head h2{margin:0;font-size:17px}
    .section-head p{margin:2px 0 0;font-size:12px;color:var(--muted)}
    .toolbar{
      display:flex;flex-wrap:wrap;gap:8px;align-items:center;
      margin-top:12px;
    }
    .companies{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px;
    }
    .company-card{
      border-radius:20px;padding:10px;min-height:104px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
      text-align:center;
    }
    .company-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .company-logo,.company-img{
      width:48px;height:48px;border-radius:16px;object-fit:cover;background:#edf2f7;
      display:grid;place-items:center;font-weight:900;color:var(--primary);
    }
    .company-name{font-size:12px;line-height:1.35;font-weight:800}
    .company-count{font-size:11px;color:var(--muted)}
    .catalog{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;
    }
    .card{
      border-radius:18px;overflow:hidden;
      display:flex;flex-direction:column;min-height:100%;
    }
    .card .img{
      aspect-ratio:1/1;background:#f1f5fb;position:relative;overflow:hidden;
      display:grid;place-items:center;
    }
    .card .img img{
      width:100%;height:100%;object-fit:contain;display:block;padding:8px;
    }
    .card .body{
      padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;
    }
    .card .title{
      font-size:13px;line-height:1.45;font-weight:900;
      min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card .meta{font-size:11px;color:var(--muted);line-height:1.5}
    .units{
      display:flex;flex-wrap:wrap;gap:6px;
    }
    .unit-btn{
      border:1px solid var(--line);background:#f8fbff;border-radius:999px;padding:6px 9px;font-size:11px;
      min-width:54px;text-align:center;color:var(--text);
    }
    .unit-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .price{
      border-top:1px dashed var(--line);padding-top:8px;
    }
    .price .old{font-size:11px;color:var(--muted);text-decoration:line-through}
    .price .now{font-size:18px;font-weight:900;color:#0f172a;line-height:1.15}
    .buy-btn{
      width:100%;height:42px;border-radius:14px;font-weight:900;font-size:15px;
      background:var(--primary);color:#fff;
    }
    .buy-btn.remove{background:var(--bad)}
    .action-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
    .action-card{
      border-radius:18px;padding:14px;min-height:86px;
      display:flex;flex-direction:column;justify-content:space-between;gap:8px;
    }
    .action-card .label{font-size:15px;font-weight:900}
    .action-card .desc{font-size:12px;color:var(--muted);line-height:1.45}
    .empty{
      border:1px dashed var(--line);border-radius:20px;background:#fff;padding:24px;text-align:center;color:var(--muted)
    }
    .skeleton{
      border-radius:18px;
      background:linear-gradient(90deg,#eef3fb 25%,#f7fafc 37%,#eef3fb 63%);
      background-size:400% 100%;
      animation:shimmer 1.1s ease infinite;
    }
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
    .skeleton-line{height:12px;width:100%}
    .skeleton-box{height:100%}
    .overlay{
      position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:90;display:none;align-items:center;justify-content:center;padding:16px
    }
    .overlay.show{display:flex}
    .modal{
      width:min(520px,100%);border-radius:24px;overflow:hidden;
    }
    .modal .head{
      padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px
    }
    .modal .body{padding:16px}
    .modal h3{margin:0;font-size:17px}
    .form-grid{display:grid;gap:10px}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;outline:0
    }
    .msg{
      font-size:12px;color:var(--muted);line-height:1.55;margin-top:2px
    }
    .cart-drawer{
      position:fixed;inset:0 auto 0 0;z-index:80;width:min(420px,100%);
      transform:translateX(-102%);
      transition:.24s ease transform;
      display:flex;flex-direction:column;background:#fff;border-left:1px solid var(--line)
    }
    .cart-drawer.open{transform:translateX(0)}
    .drawer-head{
      padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px
    }
    .drawer-head h3{margin:0;font-size:17px}
    .drawer-body{padding:14px;overflow:auto;flex:1}
    .cart-item{
      border-radius:18px;padding:12px;margin-bottom:10px;
    }
    .cart-item .row{display:flex;align-items:start;justify-content:space-between;gap:10px}
    .cart-item .name{font-weight:900;font-size:13px;line-height:1.45}
    .cart-item .meta{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
    .cart-item .foot{
      display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px
    }
    .stepper{
      display:flex;align-items:center;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;min-width:106px
    }
    .stepper button{width:34px;height:34px;background:#f8fbff}
    .stepper span{min-width:34px;text-align:center;font-weight:900}
    .drawer-footer{
      padding:14px;border-top:1px solid var(--line);background:#fff
    }
    .drawer-footer .total{
      display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px
    }
    .submit-btn{
      width:100%;height:50px;border-radius:16px;background:var(--good);color:#fff;font-weight:900;font-size:15px
    }
    .toast-zone{
      position:fixed;left:12px;bottom:98px;z-index:120;display:flex;flex-direction:column;gap:8px;
      max-width:min(360px,calc(100vw - 24px));
    }
    .toast{
      background:#0f172a;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;line-height:1.55;
      opacity:0;transform:translateY(8px);animation:toastIn .22s ease forwards;
    }
    .toast.good{background:#146c43}
    .toast.bad{background:#7f1d1d}
    .toast.warn{background:#8a5a00}
    .toast.info{background:#173a84}
    @keyframes toastIn{to{opacity:1;transform:translateY(0)}}
    .bottom-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(255,255,255,.9);backdrop-filter:blur(12px);
      border-top:1px solid rgba(230,235,242,.95);
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    }
    .bottom-inner{
      max-width:1320px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,.8fr) auto;gap:10px;align-items:stretch;
    }
    .bottom-tier{
      flex:1;min-height:58px;border-radius:18px;padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer
    }
    .bottom-tier .left{min-width:0}
    .bottom-tier .main{font-size:15px;font-weight:900;line-height:1.1}
    .bottom-tier .sub{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bottom-tier.ok{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:#16a34a;color:#fff}
    .bottom-tier.ok .sub{color:rgba(255,255,255,.9)}
    .small-action{
      min-height:58px;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;position:relative;padding:8px 10px;color:var(--text)
    }
    .small-action strong{font-size:14px;line-height:1.1}
    .small-action .mini{position:static;text-align:center;font-size:9px;line-height:1.1;color:var(--muted)}
    .footer-checkout{min-height:58px;border-radius:18px;background:linear-gradient(135deg,#1f3a5f,#245a91);border:1px solid #1f3a5f;box-shadow:var(--shadow);color:#fff;font-weight:900;padding:8px 12px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
    .footer-checkout:active,.small-action:active,.bottom-tier:active{transform:translateY(1px)}
    .page-footer{margin-top:16px;padding-top:8px}
    .page-footer .back-row{display:flex;justify-content:center}
    .back-btn{min-width:118px;height:44px;border-radius:999px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);font-weight:900;color:var(--text)}
    .contact-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px}
    .contact-link{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);display:grid;place-items:center;font-size:18px}
    .small-action .badge{
      position:absolute;top:-6px;left:-6px;background:var(--primary);color:#fff;border-radius:999px;padding:3px 6px;font-size:10px;font-weight:900
    }
    .small-action .mini{
      position:absolute;bottom:5px;left:4px;right:4px;text-align:center;font-size:9px;line-height:1.1;color:var(--muted)
    }
    .status-row{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px
    }
    .status-pill{
      height:34px;padding:0 12px;border-radius:999px;border:1px solid var(--line);background:#fff;
      display:inline-flex;align-items:center;gap:6px;font-size:12px
    }
    .status-pill strong{font-size:12px}
    .status-pill.online{border-color:#86efac;background:#f0fdf4}
    .status-pill.offline{border-color:#fecaca;background:#fef2f2}
    .hidden{display:none !important}
    .checkout-grid{display:grid;gap:10px}
    .checkout-head{display:flex;flex-direction:column;gap:8px}
    .checkout-summary{padding:12px;border:1px solid var(--line);border-radius:18px;background:#f8fbff;display:grid;gap:8px}
    .checkout-field-hint{font-size:11px;line-height:1.4;color:var(--muted)}
    .checkout-field-error{font-size:11px;line-height:1.4;color:var(--bad);display:none}
    .checkout-field-error.show{display:block}
    .checkout-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .checkout-location{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .checkout-location small{color:var(--muted);font-size:11px;line-height:1.4}
    @media (max-width: 900px){
      .shortcut-row,.action-row{grid-template-columns:1fr 1fr}
      .catalog{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
    }
    @media (max-width: 520px){
      .topbar-inner{padding:10px}
      .page{padding:10px}
      .brand-text h1{font-size:14px}
      .brand-text p{font-size:10px;max-width:50vw}
      .catalog{grid-template-columns:repeat(2,minmax(0,1fr))}
      .companies{grid-template-columns:repeat(3,minmax(0,1fr))}
      .toast-zone{left:8px;right:8px;bottom:106px;max-width:none}
      .cart-drawer{width:100%}
      .stack-btn{min-width:104px}
      .small-action{width:54px;min-width:54px;height:54px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" id="homeBtn" role="button" aria-label="الصفحة الرئيسية">
          <div class="brand-badge">A</div>
          <div class="brand-text">
            <h1>Alahram Co</h1>
            <p id="brandSub">نظام بيع ذكي لتجارة الجملة</p>
          </div>
        </div>

        <div class="top-actions">
          <button class="stack-btn" id="repStatusBtn" type="button">
            <strong id="repStatusMain">دخول مندوب</strong>
            <small id="repStatusSub">كود + باسورد</small>
          </button>

          <button class="stack-btn" id="flashTopBtn" type="button">
            <strong>عرض الساعة</strong>
            <small id="flashCountdownTop">لا يوجد عرض نشط</small>
          </button>

          <button class="mini-btn" id="cartBtn" type="button" aria-label="السلة">
            🛒
          </button>
        </div>
      </div>
    </header>

    <main id="main" class="page">
      <div class="empty">جارٍ تحميل البيانات…</div>
    </main>
  </div>

  <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3>السلة</h3>
        <div class="msg" id="cartSummary">0 صنف</div>
      </div>
      <button class="mini-btn" id="closeCartBtn" type="button">✕</button>
    </div>
    <div class="drawer-body">
      <div id="cartList"></div>
    </div>
    <div class="drawer-footer">
      <div class="total">
        <strong>الإجمالي</strong>
        <strong id="cartTotal">0 ج.م</strong>
      </div>
      <button class="submit-btn" id="checkoutBtn" type="button">تأكيد الطلب</button>
    </div>
  </aside>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal">
      <div class="head">
        <h3 id="modalTitle">عنوان</h3>
        <button class="mini-btn" id="closeOverlayBtn" type="button">✕</button>
      </div>
      <div class="body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast-zone" id="toastZone"></div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <button class="bottom-tier" id="tierBtn" type="button">
        <div class="left">
          <div class="main" id="tierBtnMain">اختار شريحتك</div>
          <div class="sub" id="tierBtnSub">اضغط هنا لفتح الشرائح</div>
        </div>
        <div id="tierBtnArrow" style="font-weight:900">→</div>
      </button>

      <button class="small-action" id="cartTotalBtn" type="button" aria-label="إجمالي السلة">
        <strong id="cartTotalMini">0</strong>
        <span class="mini">الإجمالي</span>
      </button>

      <button class="footer-checkout" id="checkoutFooterBtn" type="button">إتمام الطلب →</button>
    </div>
  </div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbxMo1xtMySOVvY8onW5Si_IOTbfUWCPP_Abql4TN_98swFl27jkPF1Eo5HWSFMs4h-NOw/exec';
const PAGE_LIMIT = 20;
const UNIT_ORDER = ['carton', 'pack', 'piece'];
const UNIT_LABELS = { carton: 'كرتونة', pack: 'دستة', piece: 'قطعة' };
const CONTACT = { phone: '01040880002', whatsapp: '01552670465', waLink: 'https://wa.me/201552670465', facebook: 'https://www.facebook.com/alahram2014' };

const state = {
  view: 'home',
  settings: {},
  tiers: [],
  companies: [],
  offers: [],
  flashOffers: [],
  rep: loadJSON('alahram_rep_session', null),
  selectedTier: loadJSON('alahram_selected_tier', null),
  cart: loadJSON('alahram_cart', []),
  selectedCompany: '',
  searchQuery: '',
  searchMode: false,
  products: [],
  productsCache: new Map(),
  productsKey: '',
  productsMeta: { page: 1, hasMore: true, loading: false, error: null },
  productsReqId: 0,

async function apiRequest(endpoint, params = {}, method = 'GET', body = null) {

    options.headers['Content-Type'] = 'application/json';
    options.body = JSON.stringify(body);
  }

  let res;
  try {
    res = await fetch(apiUrl(endpoint, params), options);
  } catch (err) {
    throw new Error('تعذر الاتصال بالخدمة الآن');
  }

  const text = await res.text();
  let json;
  try {
    json = JSON.parse(text);
  } catch (err) {
    throw new Error('استجابة غير متوقعة من الخادم');

function getCartAnalysis(cart = state.cart) {

  const tierMax = tierLimitValue();
  const price = resolvePrice(product, unit).current;
  const company = String(product.company || '').trim();
  let currentCompanyTotal = 0;
  for (let i = 0; i < state.cart.length; i++) {

function getContext() {

}
async function loadProducts({ reset = false, force = false } = {}) {
  const ctx = getContext();
  const key = makeProductsKey(ctx);
  state.productsKey = key;

  if (reset) {
    state.productsMeta = { page: 1, hasMore: true, loading: true, error: null };
    if (state.productsCache.has(key) && !force) {
      const cached = state.productsCache.get(key);
      state.products = cached.items.slice();
      state.productsMeta = { page: cached.page || 1, hasMore: !!cached.hasMore, loading: false, error: null };
      renderCurrentView();
    } else if (!state.products.length) {
      renderCurrentView();
    }
  }

  const page = reset ? 1 : Math.max(1, Number(state.productsMeta.page || 1));
  const reqId = ++state.productsReqId;
  state.productsMeta.loading = true;
  if (!state.products.length) renderCurrentView();

  try {
    const data = await apiRequest('products', {
      page,
      limit: PAGE_LIMIT,
      q: ctx.q || '',
      company: ctx.company || ''
    });

    if (reqId !== state.productsReqId) return;

    const items = (data && data.items) ? data.items : [];
    const hasMore = !!(data && data.hasMore);
    if (reset) state.products = items;
    else state.products = state.products.concat(items);

    state.productsCache.set(key, {
      items: state.products.slice(),
      page: page + 1,
      hasMore,
      loadedAt: Date.now()
    });

    state.productsMeta.page = page + 1;
    state.productsMeta.hasMore = hasMore;
    state.productsMeta.loading = false;
    state.productsMeta.error = null;
    renderCurrentView();
  } catch (err) {
    if (reqId !== state.productsReqId) return;
    state.productsMeta.loading = false;
    state.productsMeta.error = err.message || 'فشل تحميل المنتجات';
    if (reset && !state.products.length) state.products = [];
    renderCurrentView();
    toast(state.productsMeta.error, 'bad');
  }
}

  main.textContent = remaining <= 0 ? 'تم تحقيق الشريحة ✅' : `فاضلك ${formatMoney(remaining)} ج`;

  arrow.textContent = remaining <= 0 ? '✓' : '→';

  if (top) top.textContent = live.length ? flashCountdownText(live[0].end_datetime || (live[0].end_date && live[0].end_time ? `${live[0].end_date}T${live[0].end_time}` : '')) : 'لا يوجد عرض نشط';
  for (const item of live) {
    const node = document.getElementById(`flashCountdown_${item.id}`);
    if (node) {
      node.textContent = flashCountdownText(item.end_datetime || (item.end_date && item.end_time ? `${item.end_date}T${item.end_time}` : ''));
    }
  }
}

function renderProductCard(p) {
  const unit = getSelectedUnit(p.id);
  const availableUnits = UNIT_ORDER.filter(u => Number((p.base_prices || {})[u] || 0) > 0);
  const pr = resolvePrice(p, unit);
  const inCart = findCartIndex(cartKey(String(p.id), unit)) >= 0;
  const qty = getDraftQty(p.id, unit, inCart ? (state.cart.find(x => x.type === 'product' && String(x.id) === String(p.id) && String(x.unit) === String(unit))?.qty || 1) : 1);
  const unitHtml = availableUnits.map(u => `
    <button class="unit-btn ${unit === u ? 'active' : ''}" onclick='setSelectedUnit(${JSON.stringify(String(p.id))}, ${JSON.stringify(u)})'>${UNIT_LABELS[u]}</button>
  `).join('');
  return `
    <article class="card ${pr.changed ? 'offer' : ''}">
      <div class="img">
        <img src="${escapeHtml(p.image || fallbackImage())}" alt="${escapeHtml(p.name || '')}" loading="lazy" />
      </div>
      <div class="body">
        <div class="title">${escapeHtml(p.name || '')}</div>
        ${availableUnits.length ? `<div class="units">${unitHtml}</div>` : ''}
        <div class="price">
          ${pr.changed ? `<div class="old">${formatMoney(pr.base)} ج.م</div>` : ''}
          <div class="now">${formatMoney(pr.current)} ج.م</div>
        </div>
        <div class="qty-box" style="display:grid;grid-template-columns:38px 1fr 38px;gap:8px;align-items:center">
          <button class="unit-btn" type="button" onclick='changeCardQty(${JSON.stringify(String(p.id))}, ${JSON.stringify(unit)}, -1)'>−</button>
          <input class="input" style="text-align:center;padding:10px 8px;border-radius:14px" inputmode="numeric" value="${qty}" oninput='setCardQtyFromInput(${JSON.stringify(String(p.id))}, ${JSON.stringify(unit)}, this.value)' />
          <button class="unit-btn" type="button" onclick='changeCardQty(${JSON.stringify(String(p.id))}, ${JSON.stringify(unit)}, 1)'>+</button>
        </div>
        <button class="buy-btn ${inCart ? 'remove' : ''}" onclick='toggleProductToCart(${JSON.stringify(String(p.id))}, ${JSON.stringify(unit)})'>${inCart ? 'إزالة' : 'شراء'}</button>
      </div>
    </article>
  `;
}
function renderOfferCard(o) {
  return `
    <article class="card">
      <div class="img">
        <img src="${escapeHtml(o.image || fallbackImage())}" alt="${escapeHtml(o.name || '')}" loading="lazy" />
      </div>
      <div class="body">
        <div class="title">${escapeHtml(o.name || 'عرض')}</div>
        <div class="meta">${escapeHtml(o.details || '')}</div>
        <div class="price">
          <div class="now">${formatMoney(o.price || 0)} ج.م</div>
        </div>
        <button class="buy-btn" onclick='addOfferToCart(${JSON.stringify(String(o.id))}, ${JSON.stringify(o.name || '')}, ${JSON.stringify(Number(o.price || 0))}, "offer")'>شراء</button>
      </div>
    </article>
  `;
}
function renderFlashCard(o) {
  const endIso = o.end_datetime || (o.end_date && o.end_time ? `${o.end_date}T${o.end_time}` : '');
  return `
    <article class="card">
      <div class="img">
        <img src="${escapeHtml(o.image || fallbackImage())}" alt="${escapeHtml(o.display_title || o.name || '')}" loading="lazy" />
      </div>
      <div class="body">
        <div class="title">${escapeHtml(o.display_title || o.name || 'عرض الساعة')}</div>
        <div class="meta">${escapeHtml(o.display_subtitle || o.details || o.description || '')}</div>
        <div class="meta" id="flashCountdown_${escapeHtml(String(o.id))}">${escapeHtml(flashCountdownText(endIso))}</div>
        <div class="price">
          <div class="now">${formatMoney(o.price || 0)} ج.م</div>
        </div>
        <button class="buy-btn" onclick='addOfferToCart(${JSON.stringify(String(o.id))}, ${JSON.stringify(o.display_title || o.name || '')}, ${JSON.stringify(Number(o.price || 0))}, "flash")'>شراء</button>
      </div>
    </article>
  `;
}
function renderSearchOrEmptyError() {}
function renderCurrentProductStateAfterTierChange() {
  if (state.view === 'products') renderProductsList();
}
function pickTier(slug) {
  const tier = state.tiers.find(t => norm(t.tier_name) === norm(slug) || norm(t.visible_label) === norm(slug));
  if (!tier) return;
  if (tier.tier_password) {
    openOverlay('الشريحة مقفلة', `
      <div class="form-grid">
        <div class="msg">أدخل الرقم السري للوصول إلى هذه الشريحة.</div>
        <input class="input" id="tierPasswordInput" type="password" placeholder="الرقم السري للشريحة" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="pill-btn primary" type="button" onclick='confirmTierPassword(${JSON.stringify(tier.tier_name)})'>دخول</button>
          <button class="pill-btn" type="button" onclick="closeOverlay()">إلغاء</button>
        </div>
      </div>
    `);
    return;
  }
  applyTier(tier);
}
function confirmTierPassword(slug) {
  const input = document.getElementById('tierPasswordInput');
  const tier = state.tiers.find(t => norm(t.tier_name) === norm(slug) || norm(t.visible_label) === norm(slug));
  if (!tier || !input) return;
  if (String(input.value || '').trim() !== String(tier.tier_password || '').trim()) {
    toast('كلمة السر غير صحيحة', 'bad');
    return;
  }
  closeOverlay();
  applyTier(tier);
}
function applyTier(tier) {
  state.selectedTier = tier;
  saveJSON('alahram_selected_tier', tier);
  updateFooterTier();
  updateCartUI();
  updateRepStatus();
  renderCurrentView();
  goCompanies();
  toast(`تم اختيار ${tier.visible_label || tier.tier_name}`, 'good');
}
function exitTier() {
  state.selectedTier = null;
  localStorage.removeItem('alahram_selected_tier');
  updateFooterTier();
  updateCartUI();
  renderCurrentView();
  goCompanies();
  toast('تم الخروج من وضع الشريحة', 'info');
}
function toggleProductToCart(productId, unit) {
  const product = state.products.find(p => String(p.id) === String(productId));
  if (!product) {
    toast('الصنف غير متاح الآن', 'bad');
    return;
  }
  const key = cartKey(String(productId), unit);
  const idx = findCartIndex(key);
  if (idx >= 0) {
    state.cart.splice(idx, 1);
    saveCart();
    updateCartUI();
    renderCurrentView();
    toast('تمت الإزالة من السلة', 'bad');
    return;
  }
  const qty = normalizeQty(getDraftQty(productId, unit, 1));
  const allowed = canSetProductQty(product, unit, qty, -1);
  if (!allowed.ok) {
    toast('الكمية كبيرة على الشركة دي بالنسبة للشريحة', 'bad');
    return;
  }
  state.cart.push({
    type: 'product',
    id: String(product.id),
    name: product.name,
    company: product.company,
    image: product.image,
    unit,
    qty,
    base_prices: product.base_prices,
    tier_prices: product.tier_prices || {},
    product_snapshot: product
  });
  saveCart();
  updateCartUI();
  renderCurrentView();
  if (state.selectedTier) {
    const analysis = getCartAnalysis();
    if (analysis.companiesCount < 5) tierGuidanceToast();
  }
  toast('تمت الإضافة إلى السلة', 'good');
}
function changeCardQty(productId, unit, delta) {
  const product = state.products.find(p => String(p.id) === String(productId));
  if (!product) return;
  const currentIdx = findCartIndex(cartKey(String(productId), unit));
  const currentQty = currentIdx >= 0 ? Number(state.cart[currentIdx].qty || 1) : normalizeQty(getDraftQty(productId, unit, 1));
  const next = Math.max(1, currentQty + Number(delta || 0));
  setCardQtyValue(productId, unit, next, currentIdx);
}
function setCardQtyFromInput(productId, unit, rawValue) {
  const next = normalizeQty(rawValue);
  const currentIdx = findCartIndex(cartKey(String(productId), unit));
  setCardQtyValue(productId, unit, next, currentIdx);
}
function setCardQtyValue(productId, unit, nextQty, currentIdx = -1) {
  const product = state.products.find(p => String(p.id) === String(productId));
  if (!product) return;
  const allowed = canSetProductQty(product, unit, nextQty, currentIdx);
  if (!allowed.ok) {
    toast('الكمية دي تعدي 25% من قيمة الشريحة للشركة دي', 'bad');
    renderCurrentView();
    return;
  }
  if (currentIdx >= 0) {
    state.cart[currentIdx].qty = nextQty;
    saveCart();
    updateCartUI();
    renderCurrentView();
  } else {
    setDraftQty(productId, unit, nextQty);
    renderCurrentView();
  }
  if (state.selectedTier && getCartAnalysis().companiesCount < 5) {
    tierGuidanceToast();
  }
}
function stepQty(productId, unit, delta) {
  changeCardQty(productId, unit, delta);
}
function removeCartIndex(idx) {
  if (!state.cart[idx]) return;
  state.cart.splice(idx, 1);
  saveCart();
  updateCartUI();
  renderCurrentView();
}
function cartQtyStep(idx, delta) {
  const item = state.cart[idx];
  if (!item) return;
  const next = Math.max(1, Number(item.qty || 1) + Number(delta || 0));
  if (item.type === 'product') {
    const product = item.product_snapshot || state.products.find(p => String(p.id) === String(item.id));
    if (product) {
      const allowed = canSetProductQty(product, item.unit, next, idx);
      if (!allowed.ok) {
        toast('الكمية دي تعدي 25% من قيمة الشريحة للشركة دي', 'bad');
        return;
      }
    }
  }
  if (next <= 0) state.cart.splice(idx, 1);
  else item.qty = next;
  saveCart();
  updateCartUI();
  renderCurrentView();
  if (state.selectedTier && item.type === 'product' && getCartAnalysis().companiesCount < 5) tierGuidanceToast();
}
function addOfferToCart(id, name, price, type) {
  const idx = state.cart.findIndex(x => x.type === type && String(x.id) === String(id));
  if (idx >= 0) {
    state.cart[idx].qty = Number(state.cart[idx].qty || 1) + 1;
  } else {
    state.cart.push({
      type,
      id: String(id),
      name,
      price: Number(price || 0),
      qty: 1,
      unit: type,
      company: type === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'
    });
  }
  saveCart();
  updateCartUI();
  renderCurrentView();
  if (state.selectedTier) toast('تمام 👌 بس ده مش محسوب في الشريحة', 'info');
  else toast(type === 'flash' ? 'العرض أُضيف للسلة' : 'العرض أُضيف للسلة', 'good');
}
function addOfferToCart(id, name, price, type) {
  const idx = state.cart.findIndex(x => x.type === type && String(x.id) === String(id));
  if (idx >= 0) {
    state.cart[idx].qty = Number(state.cart[idx].qty || 1) + 1;
  } else {
    state.cart.push({
      type,
      id: String(id),
      name,
      price: Number(price || 0),
      qty: 1,
      unit: type,
      company: type === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'
    });
  }
  saveCart();
  updateCartUI();
  renderCurrentView();
  toast(type === 'flash' ? 'العرض أُضيف للسلة' : 'العرض أُضيف للسلة', 'good');
}
function updateCartUI() {
  const count = state.cart.reduce((sum, item) => sum + Number(item.qty || 0), 0);
  const totals = getCartAnalysis();
  el('cartTotal').textContent = `${formatMoney(totals.total)} ج.م`;
  el('cartTotalMini').textContent = formatMoney(totals.total);
  el('cartSummary').textContent = `${count} قطعة / ${state.cart.length} أصناف`;
  const list = el('cartList');
  if (!list) return;

  if (!state.cart.length) {
    list.innerHTML = '<div class="empty">السلة فارغة الآن.</div>';
  } else {
    list.innerHTML = state.cart.map((item, idx) => {
      const price = itemLinePrice(item);
      return `
        <div class="cart-item">
          <div class="row">
            <div style="min-width:0">
              <div class="name">${escapeHtml(item.name || '')}</div>
              <div class="meta">${escapeHtml(item.type === 'product' ? `[${item.id}] ` : '')}${escapeHtml(item.company || '')}${item.type === 'product' ? ` • ${escapeHtml(item.unit || '')}` : ''} • ${formatMoney(price)} ج.م</div>
            </div>
            <button class="mini-btn" type="button" onclick="removeCartIndex(${idx})">✕</button>
          </div>
          <div class="foot">
            <div class="stepper">
              <button type="button" onclick="cartQtyStep(${idx},-1)">−</button>
              <span>${Number(item.qty || 1)}</span>
              <button type="button" onclick="cartQtyStep(${idx},1)">+</button>
            </div>
            <strong>${formatMoney(Number(item.qty || 1) * price)} ج.م</strong>
          </div>
        </div>
      `;
    }).join('');
  }
  updateFooterTier();
  updateHomeFlashChip();
}
function checkout() {
  if (!state.cart.length) {
    toast('السلة فارغة', 'warn');
    return;
  }
  if (!validateCheckoutRealtime()) {
    toast('راجع بيانات العميل أولاً', 'bad');
    return;
  }
  const message = buildWhatsAppMessage();
  const url = `${CONTACT.waLink}?text=${encodeURIComponent(message)}`;
  window.open(url, '_blank', 'noopener');
  toast('تم تجهيز الطلب على واتساب', 'good');
  closeOverlay();
}
function retryProducts() {
  state.productsMeta.error = null;
  loadProducts({ reset: true, force: true }).catch(() => {});
}

</script>
