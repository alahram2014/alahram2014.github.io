<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Alahram Co B2B</title>
  <meta name="theme-color" content="#1f3a5f" />
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e5eaf1;
      --primary:#1f3a5f;
      --primary-2:#245a91;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
      --gold:#d4a017;
      --shadow:0 14px 40px rgba(16,32,51,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%,#f8fbff 26%,var(--bg) 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding-bottom:108px;
    }
    button,input,textarea{font:inherit}
    button{border:0;background:none;cursor:pointer}
    input,textarea{outline:0}
    .app{max-width:1280px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:40;
      backdrop-filter:blur(12px);
      background:rgba(246,248,251,.90);
      border-bottom:1px solid rgba(229,234,241,.9);
    }
    .topbar-inner{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px 14px 10px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;min-width:0;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(135deg,var(--primary),#345f98);
      color:#fff;display:grid;place-items:center;
      font-weight:900;box-shadow:var(--shadow);flex:0 0 auto;
    }
    .brand h1{margin:0;font-size:16px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .top-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .chip-btn,.icon-btn,.pill{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:999px;padding:10px 14px;min-height:42px;
      box-shadow:0 6px 18px rgba(16,32,51,.05);
      transition:.18s ease transform,.18s ease background,.18s ease border-color,.18s ease color;
      user-select:none;
    }
    .chip-btn:hover,.icon-btn:hover,.pill:hover{transform:translateY(-1px)}
    .chip-btn.primary,.pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .chip-btn.good{background:var(--good);color:#fff;border-color:var(--good)}
    .chip-btn.warn{background:var(--warn);color:#fff;border-color:var(--warn)}
    .chip-btn.ghost,.icon-btn{background:#fff}
    .icon-btn{width:42px;height:42px;padding:0;border-radius:14px}
    .page{padding:14px 14px 0}
    .page-head{
      display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
      margin:8px 0 12px;
    }
    .page-head h2{margin:0;font-size:18px}
    .page-head p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.6}
    .search-panel{
      background:#fff;border:1px solid var(--line);border-radius:22px;
      padding:12px;box-shadow:var(--shadow)
    }
    .search-row{display:flex;gap:10px;align-items:center}
    .search-input{
      flex:1;min-width:0;border:0;background:transparent;
      font-size:15px;padding:8px 4px;
    }
    .search-clear{
      width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
      display:grid;place-items:center;background:#fff;color:var(--muted);
    }
    .quick-actions{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      margin-top:12px;
    }
    .quick-chip{
      background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px 14px;
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:flex-start;gap:4px;
      min-height:64px;text-align:right;
    }
    .quick-chip strong{font-size:15px;color:var(--text)}
    .quick-chip span{font-size:12px;color:var(--muted);line-height:1.4}
    .section-title{
      display:flex;align-items:end;justify-content:space-between;gap:10px;
      margin:18px 0 10px;
    }
    .section-title h3{margin:0;font-size:17px}
    .section-title small{color:var(--muted)}
    .toolbar{
      display:flex;gap:8px;flex-wrap:wrap;
      margin-top:10px
    }
    .companies-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;
      margin-top:12px;
    }
    .company-card{
      background:#fff;border:1px solid var(--line);border-radius:20px;padding:10px;
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
      min-height:108px;text-align:center;
    }
    .company-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .company-logo,.company-logo img{
      width:48px;height:48px;border-radius:16px;object-fit:cover;background:#eef3fb;
      display:block;
    }
    .company-logo.placeholder{
      display:grid;place-items:center;color:var(--primary);font-weight:900;font-size:15px;
    }
    .company-name{font-size:12px;font-weight:700;line-height:1.35;min-height:34px}
    .company-count{font-size:11px;color:var(--muted)}
    .catalog-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px;
    }
    .product-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);
      display:flex;flex-direction:column;min-height:100%;
    }
    .product-image{
      aspect-ratio:1/1;background:#eef3fb;position:relative;overflow:hidden;
    }
    .product-image img{
      width:100%;height:100%;object-fit:contain;display:block;padding:10px;background:#eef3fb;
    }
    .product-body{padding:10px 10px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
    .product-title{
      font-weight:900;font-size:13px;line-height:1.45;
      min-height:38px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .unit-tabs{display:flex;flex-wrap:wrap;gap:6px}
    .unit-tab{
      border:1px solid var(--line);background:#f8fbff;border-radius:999px;padding:6px 10px;
      font-size:11px;cursor:pointer;min-width:56px;text-align:center;
    }
    .unit-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .price-box{display:flex;flex-direction:column;gap:2px;border-top:1px dashed var(--line);padding-top:8px}
    .old-price{font-size:12px;color:var(--muted);text-decoration:line-through;line-height:1}
    .new-price{font-weight:900;font-size:18px;color:#0f172a;line-height:1.1}
    .buy-row{display:flex;gap:8px;align-items:center}
    .stepper{
      display:flex;align-items:center;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;flex:1;
      min-width:96px;
    }
    .stepper button{
      width:34px;height:34px;font-size:18px;background:#f8fbff;color:var(--text)
    }
    .stepper span{min-width:28px;text-align:center;font-weight:800}
    .buy-btn{
      min-width:72px;height:38px;border-radius:14px;padding:0 12px;font-weight:900;font-size:13px;
      background:var(--primary);color:#fff;box-shadow:0 10px 24px rgba(31,58,95,.18);
    }
    .buy-btn.remove{background:var(--bad)}
    .card-note{font-size:11px;color:var(--muted);line-height:1.5}
    .empty{
      padding:22px;border:1px dashed var(--line);border-radius:22px;background:#fff;text-align:center;color:var(--muted)
    }
    .skeleton-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:12px;
    }
    .skeleton-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);
      min-height:310px;
    }
    .shimmer{
      background:linear-gradient(90deg,#eef3fb 25%,#f7fafc 37%,#eef3fb 63%);
      background-size:400% 100%;animation:shimmer 1.15s ease infinite;
    }
    @keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
    .s-img{height:160px}
    .s-line{height:14px;border-radius:999px;margin:12px 12px 0}
    .s-line.sm{width:55%}
    .s-line.md{width:75%}
    .s-line.lg{width:90%}
    .s-btn{height:38px;border-radius:14px;margin:12px}
    .section-panel{
      background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow);margin-top:12px;
    }
    .tiers-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;
    }
    .tier-card{
      border:1px solid var(--line);border-radius:20px;padding:14px;background:#fff;box-shadow:var(--shadow);cursor:pointer;
    }
    .tier-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .tier-card .title{font-weight:900;font-size:14px}
    .tier-card .min,.tier-card .desc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
    .rep-card{
      margin-top:12px;background:linear-gradient(135deg,#102033,#1f3a5f 48%,#245a91);
      color:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow);
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .rep-card .text h4{margin:0 0 4px;font-size:16px}
    .rep-card .text p{margin:0;color:rgba(255,255,255,.82);font-size:12px;line-height:1.6}
    .rep-card button{background:#fff;color:var(--primary);border-radius:14px;padding:10px 14px;font-weight:900}
    .offer-grid,.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
    .promo-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;
    }
    .promo-image{aspect-ratio:1/1;background:#eef3fb}
    .promo-image img{width:100%;height:100%;object-fit:contain;padding:10px;display:block}
    .promo-body{padding:10px;display:flex;flex-direction:column;gap:8px;flex:1}
    .promo-body .name{font-weight:900;font-size:14px;line-height:1.45}
    .promo-body .desc{font-size:12px;color:var(--muted);line-height:1.55}
    .promo-body .timer{font-size:12px;color:var(--gold);font-weight:800}
    .footer-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:55;
      background:rgba(255,255,255,.90);backdrop-filter:blur(12px);
      border-top:1px solid rgba(229,234,241,.95);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    }
    .footer-inner{
      max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:10px;
    }
    .footer-tier{
      flex:1;min-width:0;height:58px;border-radius:18px;background:#fff;border:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px;
      box-shadow:var(--shadow);text-align:right;
    }
    .footer-tier.active{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border-color:#16a34a}
    .footer-tier .main{font-weight:900;font-size:15px;line-height:1.2}
    .footer-tier .sub{font-size:11px;opacity:.86;line-height:1.2;margin-top:2px}
    .footer-center{
      min-width:110px;height:58px;border-radius:18px;background:#fff;border:1px solid var(--line);
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 12px;text-align:center;
    }
    .footer-center .label{font-size:11px;color:var(--muted);line-height:1}
    .footer-center .value{font-weight:900;font-size:17px;line-height:1.1;margin-top:4px}
    .footer-checkout{
      min-width:104px;height:58px;border-radius:18px;background:var(--good);color:#fff;font-weight:900;
      box-shadow:0 10px 24px rgba(22,163,74,.20);
    }
    .drawer{
      position:fixed;inset:0 auto 0 0;z-index:70;width:min(420px,100%);
      background:#fff;border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(0,0,0,.10);
      transform:translateX(-102%);transition:.24s ease transform;display:flex;flex-direction:column;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-head{
      padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;
    }
    .drawer-head h3{margin:0;font-size:17px}
    .drawer-body{padding:14px;overflow:auto;flex:1}
    .cart-item{
      border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px;background:#fbfdff
    }
    .cart-item .row{display:flex;justify-content:space-between;gap:10px}
    .cart-item .name{font-weight:800;font-size:13px;line-height:1.45}
    .cart-item .meta{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}
    .cart-item .foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}
    .cart-footer{
      padding:14px;border-top:1px solid var(--line);background:#fff;position:sticky;bottom:0
    }
    .form-grid{display:grid;gap:10px}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;
    }
    .submit-btn{
      width:100%;height:54px;border-radius:18px;background:var(--good);color:#fff;font-weight:900;font-size:15px;
      box-shadow:0 10px 24px rgba(22,163,74,.20);
    }
    .overlay{
      position:fixed;inset:0;background:rgba(15,23,42,.48);z-index:80;display:none;align-items:center;justify-content:center;padding:16px;
    }
    .overlay.show{display:flex}
    .modal{
      width:min(520px,100%);background:#fff;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);
    }
    .modal-head{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .modal-head h3{margin:0;font-size:18px}
    .modal-body{padding:16px}
    .toast-zone{
      position:fixed;left:14px;bottom:122px;z-index:90;display:flex;flex-direction:column;gap:8px;
      max-width:min(360px,calc(100vw - 28px));
    }
    .toast{
      background:#0f172a;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;line-height:1.55;
      opacity:0;transform:translateY(10px);animation:toastIn .22s ease forwards;
    }
    .toast.good{background:#146c43}
    .toast.warn{background:#8a5a00}
    .toast.bad{background:#7f1d1d}
    .toast.info{background:#173a84}
    @keyframes toastIn{to{opacity:1;transform:translateY(0)}}
    .hidden{display:none !important}
    .loading-strip{
      margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);
      color:var(--muted);font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:10px;
    }
    .hint{font-size:12px;color:var(--muted);line-height:1.6}
    .flash-chip-sub{font-size:11px;color:var(--muted);line-height:1.2}
    .quick-chip.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    @media (max-width: 900px){
      .quick-actions{grid-template-columns:1fr}
    }
    @media (max-width: 520px){
      .topbar-inner{padding:12px 12px 10px}
      .page{padding:12px 12px 0}
      .brand h1{font-size:15px}
      .brand p{font-size:11px}
      .catalog-grid,.skeleton-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .companies-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .offer-grid,.flash-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .footer-inner{gap:8px}
      .footer-center{min-width:92px}
      .footer-checkout{min-width:92px}
      .toast-zone{left:10px;right:10px;bottom:126px;max-width:none}
      .drawer{width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" role="button" id="brandBtn">
          <div class="brand-badge">A</div>
          <div>
            <h1>Alahram Co</h1>
            <p id="brandSub">نظام بيع ذكي لتجارة الجملة</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="cartBtn" title="السلة">🛒 <span id="cartCount">0</span></button>
        </div>
      </div>
    </header>

    <main id="main" class="page"></main>
  </div>

  <div id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3>السلة</h3>
        <div class="hint" id="cartSummary">0 صنف</div>
      </div>
      <button class="icon-btn" id="closeCartBtn">✕</button>
    </div>
    <div class="drawer-body">
      <div id="cartList"></div>
      <div class="section-title">
        <div>
          <h3>بيانات الطلب</h3>
          <small>يحفظ على الشيت عند التأكيد</small>
        </div>
      </div>
      <div class="form-grid">
        <input class="input" id="custName" placeholder="اسم العميل" />
        <input class="input" id="custPhone" placeholder="رقم الهاتف" />
        <textarea class="input" id="custAddress" rows="3" placeholder="العنوان"></textarea>
      </div>
    </div>
    <div class="cart-footer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>الإجمالي</strong>
        <strong id="cartTotal">0 ج.م</strong>
      </div>
      <button class="submit-btn" id="submitOrderBtn">تأكيد الطلب</button>
    </div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modalTitle">عنوان</h3>
        <button class="icon-btn" id="modalCloseBtn">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast-zone" id="toastZone"></div>

  <div class="footer-bar">
    <div class="footer-inner">
      <button class="footer-tier" id="tierFooterBtn">
        <div style="min-width:0">
          <div class="main" id="tierFooterMain">اختار شريحتك</div>
          <div class="sub" id="tierFooterSub">اضغط هنا لفتح الشرائح</div>
        </div>
        <div style="font-weight:900">→</div>
      </button>
      <div class="footer-center">
        <div class="label">إجمالي السلة</div>
        <div class="value" id="footerTotal">0 ج.م</div>
      </div>
      <button class="footer-checkout" id="footerCheckoutBtn">إتمام الشراء</button>
    </div>
  </div>

<script>
(function(){
  'use strict';

  const API_BASE = window.APP_API_BASE || 'https://script.google.com/macros/s/AKfycbxMo1xtMySOVvY8onW5Si_IOTbfUWCPP_Abql4TN_98swFl27jkPF1Eo5HWSFMs4h-NOw/exec';
  const PAGE_LIMIT = 20;
  const DEBUG = true;

  const state = {
    route: { view: 'companies', company: '', query: '', drawerOpen: false },
    settings: {},
    tiers: [],
    companies: [],
    offers: [],
    flashOffers: [],
    selectedTier: loadJSON('alahram_selected_tier', null),
    rep: loadJSON('alahram_rep_session', null),
    cart: loadJSON('alahram_cart', []),
    searchQuery: '',
    companyFilter: '',
    catalog: { key: '', items: [], page: 1, hasMore: true, loading: false, error: '' },
    catalogCache: new Map(),
    catalogRequestId: 0,
    searchDebounce: null,
    flashTicker: null,
    catalogObserver: null,
  };

  const $ = (id) => document.getElementById(id);

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function saveJSON(key, value){
    try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
  }
  function fmtMoney(n){
    const v = Math.round(Number(n || 0));
    return new Intl.NumberFormat('ar-EG').format(v);
  }
  function parseNum(v){
    const n = Number(String(v ?? '').replace(/,/g, '').trim());
    return Number.isFinite(n) ? n : 0;
  }
  function esc(s){
    return String(s ?? '').replace(/[&<>"']/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[ch]));
  }
  function jsArg(v){ return JSON.stringify(String(v ?? '')); }
  function norm(s){ return String(s ?? '').trim().toLowerCase().replace(/\s+/g, ''); }
  function parseDate(v){
    if (!v) return 0;
    const direct = new Date(v);
    if (!Number.isNaN(direct.getTime())) return direct.getTime();
    const s = String(v).replace(' ', 'T');
    const alt = new Date(s);
    if (!Number.isNaN(alt.getTime())) return alt.getTime();
    return 0;
  }
  function formatDuration(ms){
    if (!Number.isFinite(ms) || ms <= 0) return 'انتهى العرض';
    const sec = Math.floor(ms / 1000);
    const d = Math.floor(sec / 86400);
    const h = Math.floor((sec % 86400) / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    const pad = n => String(n).padStart(2, '0');
    return d > 0 ? `${d} يوم ${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(h)}:${pad(m)}:${pad(s)}`;
  }
  function toast(message, type = 'info'){
    const zone = $('toastZone');
    if (!zone) return;
    const node = document.createElement('div');
    node.className = `toast ${type}`;
    node.textContent = message;
    zone.appendChild(node);
    setTimeout(() => {
      node.style.opacity = '0';
      node.style.transform = 'translateY(10px)';
      setTimeout(() => node.remove(), 250);
    }, 2500);
  }

  async function apiRequest(endpoint, { method = 'GET', params = {}, body = null } = {}){
    const url = new URL(API_BASE);
    url.searchParams.set('endpoint', endpoint);
    Object.entries(params || {}).forEach(([k, v]) => {
      if (v !== undefined && v !== null && String(v).length) url.searchParams.set(k, String(v));
    });
    if (DEBUG) console.log('[API]', method, endpoint, params, body || '');
    let res;
    try{
      res = await fetch(url.toString(), {
        method,
        headers: body !== null ? { 'Content-Type': 'application/json' } : {},
        body: body !== null ? JSON.stringify(body) : null
      });
    }catch(err){
      console.error('[FETCH ERROR]', endpoint, err);
      throw new Error('Failed to fetch: ' + endpoint);
    }
    const text = await res.text();
    if (DEBUG) console.log('[API RAW]', endpoint, text.slice(0, 600));
    let json;
    try{
      json = text ? JSON.parse(text) : {};
    }catch(err){
      throw new Error('Invalid JSON from ' + endpoint + ': ' + text.slice(0, 300));
    }
    const payload = json.data !== undefined ? json.data : json;
    if (!res.ok || payload.success === false || json.success === false){
      const msg = (payload && payload.error) || json.error || ('HTTP ' + res.status);
      throw new Error(msg);
    }
    return payload;
  }

        if (i && i.key) obj[String(i.key)] = i.value;

    }
    return payload;
  }

  function availableUnits(product){

    return units.filter(u => resolvePrice(product, u).current > 0);

  function visibleProduct(product){

  function getSelectedUnit(product){

    const stored = localStorage.getItem(key) || '';
    const units = availableUnits(product);

  function getTierRawPrice(raw, tierSlug, unit){
    if (!raw || !tierSlug) return 0;
    if (raw.tier_prices && typeof raw.tier_prices === 'object'){
      const tierObj = raw.tier_prices[tierSlug] || raw.tier_prices[norm(tierSlug)];
      if (tierObj && typeof tierObj === 'object'){
        return parseNum(tierObj[unit] ?? tierObj[`${unit}_price`] ?? 0);
      }
    }
    const directKeys = [
      `${tierSlug}_${unit}`,
      `${tierSlug}_${unit}_price`,
      `${tierSlug}${unit[0].toUpperCase()}${unit.slice(1)}`,
      `${tierSlug}${unit.charAt(0).toUpperCase() + unit.slice(1)}Price`
    ];
    for (const k of directKeys){
      if (raw[k] !== undefined && raw[k] !== null && String(raw[k]).length) return parseNum(raw[k]);
    }
    return 0;
  }
  function resolvePrice(product, unit){
    const base = parseNum(product?.base_prices?.[unit] ?? 0);
    let current = base;
    let tierPrice = 0;
    const tierSlug = currentTierSlug();
    if (tierSlug && product){
      tierPrice = getTierRawPrice(product.raw, tierSlug, unit);
      if (tierPrice > 0) current = tierPrice;
    }
    return { base, current, tierPrice, changed: current !== base };
  }

  function cartIndexForProduct(id, unit){
    return state.cart.findIndex(item => item.type === 'product' && productKey(item.id, item.unit) === productKey(id, unit));
  }
  function cartLinePrice(item){
    if (!item) return 0;
    if (item.type !== 'product') return parseNum(item.price || 0);
    return resolvePrice(item.product_snapshot || item, item.unit).current;
  }
  function cartTotals(){
    let total = 0;
    let eligible = 0;
    state.cart.forEach(item => {
      const line = cartLinePrice(item) * parseNum(item.qty || 0);
      total += line;
      if (item.type === 'product') eligible += line;
    });
    return { total, eligible };
  }
  function totalItems(){
    return state.cart.reduce((sum, item) => sum + parseNum(item.qty || 0), 0);

  async function loadCatalog({ reset = true, renderWhileLoading = true } = {}){
    const key = currentCatalogKey();
    const cached = state.catalogCache.get(key);
    if (reset){
      state.catalog.key = key;
      state.catalog.page = 1;
      state.catalog.hasMore = true;
      state.catalog.error = '';
      if (cached){
        state.catalog.items = cached.items.map(normalizeProduct);
        state.catalog.page = cached.page;
        state.catalog.hasMore = cached.hasMore;
        state.catalog.loading = true;
        if (renderWhileLoading) render();
      }else{
        state.catalog.items = [];
        state.catalog.loading = true;
        if (renderWhileLoading) render();
      }
    }
    const reqId = ++state.catalogRequestId;
    try{
      const params = {
        page: state.catalog.page,
        limit: PAGE_LIMIT,
        company: state.route.company || '',
        company_name: state.route.company || '',
        q: state.route.query || '',
        search: state.route.query || ''
      };
      const payload = await apiRequest('products', { params });
      if (reqId !== state.catalogRequestId) return;
      const itemsRaw = Array.isArray(payload?.items) ? payload.items : Array.isArray(payload?.products) ? payload.products : Array.isArray(payload) ? payload : [];
      const items = itemsRaw.map(normalizeProduct).filter(visibleProduct);
      if (state.catalog.page === 1) state.catalog.items = items;
      else state.catalog.items = state.catalog.items.concat(items);
      state.catalog.page += 1;
      state.catalog.hasMore = Boolean(
        payload?.hasMore ?? payload?.has_more ?? payload?.nextPage ?? (items.length >= PAGE_LIMIT)
      );
      state.catalog.loading = false;
      state.catalog.error = '';
      state.catalogCache.set(key, {
        items: state.catalog.items.map(x => ({ ...x })),
        page: state.catalog.page,
        hasMore: state.catalog.hasMore
      });
      if (!state.companies.length){
        state.companies = normalizeCompaniesFromProducts(state.catalog.items);
      }
      render();
    }catch(err){
      if (reqId !== state.catalogRequestId) return;
      state.catalog.loading = false;
      state.catalog.error = err.message || String(err);
      if (!state.catalog.items.length){
        state.catalog.items = [];
      }
      if (DEBUG) console.error('[CATALOG ERROR]', err);
      if (renderWhileLoading) render();
      toast(state.catalog.error, 'bad');
    }
  }

  async function loadMoreCatalog(){
    if (state.route.view !== 'products') return;
    if (state.catalog.loading || !state.catalog.hasMore) return;
    state.catalog.loading = true;
    render();
    const prevPage = state.catalog.page;
    try{
      const reqId = ++state.catalogRequestId;
      const payload = await apiRequest('products', {
        params: {
          page: prevPage,
          limit: PAGE_LIMIT,
          company: state.route.company || '',
          company_name: state.route.company || '',
          q: state.route.query || '',
          search: state.route.query || ''
        }
      });
      if (reqId !== state.catalogRequestId) return;
      const itemsRaw = Array.isArray(payload?.items) ? payload.items : Array.isArray(payload?.products) ? payload.products : Array.isArray(payload) ? payload : [];
      const items = itemsRaw.map(normalizeProduct).filter(visibleProduct);
      state.catalog.items = state.catalog.items.concat(items);
      state.catalog.page += 1;
      state.catalog.hasMore = Boolean(payload?.hasMore ?? payload?.has_more ?? payload?.nextPage ?? (items.length >= PAGE_LIMIT));
      state.catalog.loading = false;
      state.catalogCache.set(currentCatalogKey(), {
        items: state.catalog.items.map(x => ({ ...x })),
        page: state.catalog.page,
        hasMore: state.catalog.hasMore
      });

      state.catalog.loading = false;
      state.catalog.error = err.message || String(err);

  }

  function initCatalogObserver(){
    if (state.catalogObserver){
      try{ state.catalogObserver.disconnect(); }catch(e){}
    }
    state.catalogObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) loadMoreCatalog();
      });
    }, { rootMargin: '650px 0px 900px 0px' });
    const sentinel = $('catalogSentinel');
    if (sentinel){
      try{ state.catalogObserver.observe(sentinel); }catch(e){}

  function addProductToCart(productId, unit){
    const product = state.catalog.items.find(p => String(p.id) === String(productId));
    if (!product) return toast('الصنف غير متاح الآن', 'bad');
    const idx = cartIndexForProduct(String(productId), unit);
    if (idx >= 0){
      state.cart.splice(idx, 1);
      toast('تمت الإزالة من السلة', 'bad');
    }else{
      state.cart.push({
        type: 'product',
        id: String(product.id),
        name: product.name,
        company: product.company,
        company_logo: product.company_logo || '',
        image: product.image,
        unit,
        qty: 1,
        product_snapshot: product,
        base_prices: product.base_prices,
        raw: product.raw
      });
      toast('تمت الإضافة للسلة', 'good');
    }
    saveJSON('alahram_cart', state.cart);
    updateFooter();
    render();
  }

  function changeCartQty(index, delta){
    const item = state.cart[index];
    if (!item) return;
    const next = parseNum(item.qty || 1) + delta;
    if (next <= 0){
      state.cart.splice(index, 1);
    }else{
      item.qty = next;
    }
    saveJSON('alahram_cart', state.cart);
    updateFooter();
    render();
  }

  function changeProductQty(productId, unit, delta){
    const idx = cartIndexForProduct(String(productId), unit);
    if (idx < 0){
      if (delta > 0) addProductToCart(productId, unit);
      return;
    }
    changeCartQty(idx, delta);
  }

        qty: 1,
        image: item.image || item.image_url || '',

        <input class="input" id="repIdInput" placeholder="كود المندوب" autocomplete="off" />
        <input class="input" id="repPassInput" placeholder="كلمة السر" type="password" autocomplete="off" />
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="chip-btn primary" onclick="submitRepLogin()">دخول</button>
          <button class="chip-btn ghost" onclick="closeModal()">إلغاء</button>
        </div>
      </div>
    `);
  }
  async function submitRepLogin(){
    try{
      const rep_id = $('repIdInput').value.trim();
      const password = $('repPassInput').value.trim();
      const payload = await apiRequest('reps/login', {
        method: 'POST',
        body: {
          rep_id,
          rep_password: password,
          password,
          code: rep_id
        }
      });
      const valid = payload?.valid !== false && payload?.success !== false;
      if (!valid) throw new Error(payload?.error || 'بيانات الدخول غير صحيحة');
      const session = payload.session || payload.rep || payload.user || payload.data || payload;
      const token = payload.token || session?.token || payload.access_token || '';
      state.rep = session;
      if (token) localStorage.setItem('alahram_rep_token', token);
      saveJSON('alahram_rep_session', session);
      closeModal();
      updateRepBadge();
      toast('تم تسجيل الدخول بنجاح', 'good');
      render();
    }catch(err){
      console.error('[LOGIN ERROR]', err);
      toast(err.message || 'تعذر التحقق من دخول المندوب', 'bad');
    }
  }
  function logoutRep(){
    state.rep = null;
    localStorage.removeItem('alahram_rep_token');
    saveJSON('alahram_rep_session', null);
    closeModal();
    updateRepBadge();
    toast('تم تسجيل خروج المندوب', 'good');
    render();
  }
  async function validateRepSession(){
    const token = localStorage.getItem('alahram_rep_token');
    if (!token){
      state.rep = null;
      saveJSON('alahram_rep_session', null);
      updateRepBadge();
      return;
    }
    try{
      const payload = await apiRequest('auth', { params: { token } });
      if (payload?.valid === false){
        state.rep = null;
        localStorage.removeItem('alahram_rep_token');
        saveJSON('alahram_rep_session', null);
      }else{
        state.rep = payload.session || payload.rep || payload.user || state.rep;
        saveJSON('alahram_rep_session', state.rep);
      }
    }catch(err){
      state.rep = null;
      localStorage.removeItem('alahram_rep_token');
      saveJSON('alahram_rep_session', null);
    }finally{
      updateRepBadge();
    }
  }

  async function checkout(){
    if (!state.cart.length){
      toast('السلة فارغة', 'warn');
      return;
    }
    openDrawer(false);
  }

  async function submitOrder(){
    if (!state.cart.length){
      toast('السلة فارغة', 'warn');
      return;
    }
    const customer_name = $('custName').value.trim();
    const phone = $('custPhone').value.trim();
    const address = $('custAddress').value.trim();
    if (!customer_name || !phone){
      toast('اسم العميل ورقم الهاتف مطلوبان', 'bad');
      return;
    }
    try{
      const payload = {
        customer_name,
        phone,
        address,
        total: cartTotals().total,
        tier: state.selectedTier ? state.selectedTier.tier_name : '',
        rep_token: localStorage.getItem('alahram_rep_token') || '',
        items: state.cart.map(item => {
          if (item.type === 'product'){
            return {
              type: 'product',
              id: item.id,
              name: item.name,
              unit: item.unit,
              qty: item.qty,
              base_prices: item.base_prices,
              company: item.company
            };
          }
          return {
            type: item.type,
            id: item.id,
            name: item.name,
            qty: item.qty,
            price: item.price
          };
        })
      };
      const result = await apiRequest('orders', { method: 'POST', body: payload });
      toast('تم حفظ الطلب بنجاح', 'good');
      state.cart = [];
      saveJSON('alahram_cart', state.cart);
      updateFooter();
      closeDrawer();
      render();
      if (result?.order_id) toast('رقم الطلب: ' + result.order_id, 'info');
    }catch(err){
      toast(err.message || 'فشل حفظ الطلب', 'bad');
    }
  }

  function renderProductCard(product){
    const unit = getSelectedUnit(product);
    const res = resolvePrice(product, unit);
    const inCart = cartIndexForProduct(product.id, unit) >= 0;
    const units = availableUnits(product);
    const available = units.length ? units : ['carton'];
    const unitTabs = available.map(u => `
      <button class="unit-tab ${u === unit ? 'active' : ''}" onclick="setSelectedUnit(${jsArg(product.id)}, ${jsArg(u)})">${u === 'carton' ? 'كرتونة' : u === 'pack' ? 'دستة' : 'قطعة'}</button>
    `).join('');

    return `
      <article class="product-card">
        <div class="product-image">
          <img src="${esc(product.image || fallbackImage())}" alt="${esc(product.name)}" loading="lazy" />
        </div>
        <div class="product-body">
          <div class="product-title">${esc(product.name)}</div>
          <div class="unit-tabs">${unitTabs}</div>
          <div class="price-box">
            ${state.selectedTier && res.changed ? `<div class="old-price">${fmtMoney(res.base)} ج.م</div>` : ''}
            <div class="new-price">${fmtMoney(res.current)} ج.م</div>
          </div>
          <div class="buy-row">
            <div class="stepper">
              <button onclick="changeProductQty(${jsArg(product.id)}, ${jsArg(unit)}, -1)">−</button>
              <span>${cartLineQty(product.id, unit) || 1}</span>
              <button onclick="changeProductQty(${jsArg(product.id)}, ${jsArg(unit)}, 1)">+</button>
            </div>
            <button class="buy-btn ${inCart ? 'remove' : ''}" onclick="toggleProductCart(${jsArg(product.id)}, ${jsArg(unit)})">${inCart ? 'إزالة' : 'شراء'}</button>
          </div>
        </div>
      </article>
    `;
  }

  function renderMain(){
    const view = state.route.view;
    const chromeTop = renderSearchBar() + renderQuickActions();
    let body = '';
    if (view === 'tiers') body = renderTierPage();
    else if (view === 'offers') body = renderOffersPage();
    else if (view === 'flash') body = renderFlashPage();
    else if (view === 'products') body = renderProductsPage();
    else body = renderLanding();

    $('main').innerHTML = chromeTop + body;
    bindPageControls();
    updateFooter();
    updateFlashTexts();
    initCatalogObserver();

  function bindPageControls(){
    const input = $('searchInput');
    const clearBtn = $('searchClearBtn');
    if (input){
      input.oninput = () => {
        state.searchQuery = input.value.trim();
        if (state.route.view === 'products'){
          debounceCatalogSearch();
        }
      };
      input.onkeydown = (e) => {
        if (e.key === 'Enter'){
          e.preventDefault();
          if (state.route.view !== 'products'){
            goProducts('');
          }else{
            debounceCatalogSearch(true);
          }
        }
      };
    }
    if (clearBtn){
      clearBtn.onclick = () => clearSearch();
    }
    const offersBtn = $('offersQuickBtn');
    const flashBtn = $('flashQuickBtn');
    if (offersBtn) offersBtn.onclick = () => goOffers();
    if (flashBtn) flashBtn.onclick = () => goFlash();
    const tierBtn = $('tierFooterBtn');
    if (tierBtn) tierBtn.onclick = () => goTiers();
    const checkoutBtn = $('footerCheckoutBtn');
    if (checkoutBtn) checkoutBtn.onclick = () => openDrawer(true);
    const submitBtn = $('submitOrderBtn');
    if (submitBtn) submitBtn.onclick = submitOrder;
    const cartBtn = $('cartBtn');
    if (cartBtn) cartBtn.onclick = () => openDrawer(true);
    const closeCartBtn = $('closeCartBtn');
    if (closeCartBtn) closeCartBtn.onclick = () => closeDrawer(true);
    const modalCloseBtn = $('modalCloseBtn');
    if (modalCloseBtn) modalCloseBtn.onclick = closeModal;
    const overlay = $('overlay');
    if (overlay){
      overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
    }
    const brandBtn = $('brandBtn');
    if (brandBtn) brandBtn.onclick = () => goCompanies();
  }

  function debounceCatalogSearch(immediate = false){
    clearTimeout(state.searchDebounce);
    if (immediate){
      state.catalog.page = 1;
      state.catalog.items = [];
      state.catalog.hasMore = true;
      state.catalog.error = '';
      loadCatalog({ reset: true });
      return;
    }
    state.searchDebounce = setTimeout(() => {
      if (state.route.view !== 'products') return;
      state.route.query = state.searchQuery;
      state.route.company = state.route.company || '';
      loadCatalog({ reset: true });
    }, 280);
  }

  function clearSearch(){
    state.searchQuery = '';
    $('searchInput').value = '';
    if (state.route.view === 'products'){
      state.route.query = '';
      loadCatalog({ reset: true });

      renderMain();
    }
  }

      showModal('تسجيل خروج المندوب', `
        <div class="section-panel" style="margin:0">

          </div>

        <div class="form-grid">

          </div>
        </div>

  function addPromoToCartById(id, type){
    const item = type === 'offer'
      ? state.offers.find(o => String(o.id) === String(id))
      : state.flashOffers.find(o => String(o.id) === String(id));
    if (!item) return toast('العرض غير متاح الآن', 'bad');
    addPromoToCart(item, type);
  }

  function updateFlashTexts(){
    const flashSub = $('flashQuickSub');
    if (flashSub) flashSub.textContent = flashChipText();
    document.querySelectorAll('[data-countdown-end]').forEach(node => {
      const end = parseNum(node.getAttribute('data-countdown-end'));
      if (end) node.textContent = formatDuration(end - Date.now());
    });
  }

  function toggleProductCart(id, unit){
    const idx = cartIndexForProduct(String(id), unit);
    if (idx >= 0){
      state.cart.splice(idx, 1);
      toast('تمت الإزالة من السلة', 'bad');
    }else{
      const product = state.catalog.items.find(p => String(p.id) === String(id));
      if (!product) return toast('الصنف غير متاح الآن', 'bad');
      state.cart.push({
        type: 'product',
        id: String(product.id),
        name: product.name,
        company: product.company,
        company_logo: product.company_logo || '',
        image: product.image,
        unit,
        qty: 1,
        product_snapshot: product,
        base_prices: product.base_prices,
        raw: product.raw
      });
      toast('تمت الإضافة للسلة', 'good');
    }
    saveJSON('alahram_cart', state.cart);
    updateFooter();
    render();

  function toggleProductCart(id, unit){

    state.cart.push({

      company: product.company,
      company_logo: product.company_logo || '',
      image: product.image,

      raw: product.raw
    });

  function changeProductQty(id, unit, delta){
    const idx = cartIndexForProduct(String(id), unit);
    if (idx < 0){
      if (delta > 0) toggleProductCart(id, unit);
      return;
    }
    const next = parseNum(state.cart[idx].qty || 1) + delta;
    if (next <= 0){
      state.cart.splice(idx, 1);
    }else{
      state.cart[idx].qty = next;
    }
    saveJSON('alahram_cart', state.cart);
    updateFooter();
    render();
  }

  function changeCartQty(index, delta){
    const item = state.cart[index];
    if (!item) return;
    const next = parseNum(item.qty || 1) + delta;
    if (next <= 0){
      state.cart.splice(index, 1);
    }else{
      item.qty = next;
    }
    saveJSON('alahram_cart', state.cart);
    updateFooter();
    render();
  }

  async function loadMoreCatalog(){
    if (state.catalog.loading || !state.catalog.hasMore || state.route.view !== 'products') return;
    state.catalog.loading = true;
    render();
    const reqId = ++state.catalogRequestId;
    try{
      const payload = await apiRequest('products', {
        params: {
          page: state.catalog.page,
          limit: PAGE_LIMIT,
          company: state.route.company || '',
          company_name: state.route.company || '',
          q: state.route.query || '',
          search: state.route.query || ''
        }
      });
      if (reqId !== state.catalogRequestId) return;
      const itemsRaw = Array.isArray(payload?.items) ? payload.items : Array.isArray(payload?.products) ? payload.products : Array.isArray(payload) ? payload : [];
      const items = itemsRaw.map(normalizeProduct).filter(visibleProduct);
      state.catalog.items = state.catalog.items.concat(items);
      state.catalog.page += 1;
      state.catalog.hasMore = Boolean(payload?.hasMore ?? payload?.has_more ?? payload?.nextPage ?? (items.length >= PAGE_LIMIT));
      state.catalog.loading = false;
      state.catalogCache.set(currentCatalogKey(), {
        items: state.catalog.items.map(x => ({ ...x })),
        page: state.catalog.page,
        hasMore: state.catalog.hasMore
      });
      render();
    }catch(err){
      state.catalog.loading = false;
      state.catalog.error = err.message || String(err);
      render();
    }
  }

  async function validateRepSession(){
    const token = localStorage.getItem('alahram_rep_token');
    if (!token){
      state.rep = null;
      saveJSON('alahram_rep_session', null);
      updateRepBadge();
      return;
    }
    try{
      const payload = await apiRequest('auth', { params: { token } });
      if (payload?.valid === false){
        state.rep = null;
        localStorage.removeItem('alahram_rep_token');
        saveJSON('alahram_rep_session', null);
      }else{
        state.rep = payload.session || payload.rep || payload.user || state.rep;
        saveJSON('alahram_rep_session', state.rep);
      }
    }catch(err){
      state.rep = null;
      localStorage.removeItem('alahram_rep_token');
      saveJSON('alahram_rep_session', null);
    }finally{
      updateRepBadge();
    }
  }

  window.changeCartQty = changeCartQty;
  window.removeCartIndex = removeCartIndex;
  window.chooseTierByName = chooseTierByName;
  window.confirmTierPassword = confirmTierPassword;
  window.handleRepButton = handleRepButton;
  window.submitRepLogin = submitRepLogin;
  window.logoutRep = logoutRep;
  window.addPromoToCartById = addPromoToCartById;
  window.closeModal = closeModal;
  window.clearSearch = clearSearch;
  window.retryCatalog = retryCatalog;
  window.openDrawer = () => openDrawer(true);
  window.closeDrawer = closeDrawer;
  window.submitOrder = submitOrder;
  window.addPromoToCartById = addPromoToCartById;

  // additional globals for inline onclicks referenced before functions are declared
  window.goHome = goHome;
  window.addPromoToCartById = addPromoToCartById;

  boot().catch(err => {
    console.error('[BOOT ERROR]', err);
    $('main').innerHTML = `
      <div class="empty">
        <strong>تعذر تحميل البيانات</strong>
        <div style="margin-top:8px" class="hint">${esc(err.message || String(err))}</div>
        <div style="margin-top:12px"><button class="chip-btn primary" onclick="location.reload()">إعادة المحاولة</button></div>
      </div>
    `;
  });
})();
</script>
