<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Alahram Store</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f5;
  padding: 15px;
}

h2 {
  margin-top: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 10px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
}

img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 10px;
}

.title { font-weight: bold; }
.company { color: gray; font-size: 12px; }
.price { color: green; font-weight: bold; margin: 5px 0; }

button {
  width: 100%;
  padding: 7px;
  margin-top: 5px;
  border: none;
  border-radius: 8px;
  background: green;
  color: white;
}

.remove { background: red; }
.msg { background: #222; color: white; padding: 5px; border-radius: 8px; font-size: 12px; margin-top:5px;}
</style>
</head>

<body>

<h2>🛒 المنتجات</h2>
<div class="grid" id="products"></div>

<h2>🔥 العروض</h2>
<div class="grid" id="offers"></div>

<script>

// ================= CONFIG =================
const API = "https://script.google.com/macros/s/AKfycbw6azxH6sJr2kS9bUMCdzJctMJwbfuwJiudCD8Ksu-bbpA9_Bch8IgYAzp5qoGn9sJ0LQ/exec";

// ================= STATE =================
let cart = JSON.parse(localStorage.getItem("cart")) || {};
let tierMode = localStorage.getItem("tierMode") === "true";

// ================= PERSONALITIES =================
const messages = [
"يا كبير خلّص اللي في إيدك الأول 😉",
"استنى بس نطلع من الشريحة ونرجع ناخد العرض 🔥",
"العرض ده للعادي يا نجم 💪",
"واحدة واحدة يا معلم 😂",
"دي صفقة تقيلة بس ليها وقتها 😏"
];

function getMessage() {
  return messages[Math.floor(Math.random()*messages.length)];
}

// ================= PRODUCTS =================
function renderProduct(p){
  const qty = cart[p.code] || 0;

  let controls = "";

  if(qty === 0){
    controls = `<button onclick="add('${p.code}')">شراء 💪</button>`;
  }else{
    controls = `
      <button onclick="inc('${p.code}')">تزود ➕</button>
      <button class="remove" onclick="removeItem('${p.code}')">شيلها ❌</button>
    `;
  }

  return `
    <div class="card">
      <img src="${p.image || 'https://via.placeholder.com/150'}">
      <div class="title">${p.name}</div>
      <div class="company">${p.company}</div>
      <div class="price">${p.base_piece || "-"} جنيه</div>
      ${controls}
    </div>
  `;
}

// ================= OFFERS =================
function renderOffer(o){

  // لو داخل شريحة
  if(tierMode){
    return `
      <div class="card">
        <img src="${o.image || 'https://via.placeholder.com/150'}">
        <div class="title">${o.title}</div>
        <div class="price">${o.price} جنيه</div>
        <div class="msg">${getMessage()}</div>
      </div>
    `;
  }

  return `
    <div class="card">
      <img src="${o.image || 'https://via.placeholder.com/150'}">
      <div class="title">${o.title}</div>
      <div class="price">${o.price} جنيه</div>
      <button onclick="addOffer('${o.offer_id}')">خد العرض 🔥</button>
    </div>
  `;
}

// ================= LOAD =================
async function loadProducts(){
  const res = await fetch(API+"?action=getProducts");
  const data = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.data.forEach(p=>{
    container.innerHTML += renderProduct(p);
  });
}

async function loadOffers(){
  const res = await fetch(API+"?action=getOffers");
  const data = await res.json();

  const container = document.getElementById("offers");
  container.innerHTML = "";

  data.data.forEach(o=>{
    container.innerHTML += renderOffer(o);
  });
}

// ================= CART =================
function add(code){
  cart[code] = 1;
  saveCart();
}

function inc(code){
  cart[code]++;
  saveCart();
}

function removeItem(code){
  delete cart[code];
  saveCart();
}

function addOffer(id){
  alert("تم إضافة العرض 🔥");
}

// ================= SAVE =================
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  reload();
}

function reload(){
  loadProducts();
  loadOffers();
}

// ================= INIT =================
loadProducts();
loadOffers();

</script>

</body>
</html>
