<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Alahram Stable B2B</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fbf8f1;
  --card:#ffffff;
  --soft:#fffdf6;
  --line:#e8dcc4;
  --text:#0a2540;
  --muted:#5c6a7a;
  --gold:#c79b18;
  --gold2:#e3c56b;
  --gold3:#8a5a00;
  --accent:#173a84;
  --danger:#c0392b;
  --success:#1f8b4c;
  --shadow:0 10px 28px rgba(10,37,64,.08);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fbf8f1 0%, #f7f1e3 100%);
  color:var(--text);
}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font:inherit}
img{max-width:100%;display:block}
#app{max-width:1180px;margin:0 auto;padding:10px 10px 120px}
.header{
  position:sticky; top:0; z-index:50;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(18px) saturate(180%);
  border-bottom:1px solid rgba(10,37,64,.08);
  box-shadow:var(--shadow);
  border-bottom-left-radius:24px;
  border-bottom-right-radius:24px;
  overflow:hidden;
}
.hero{
  min-height:130px;
  background:linear-gradient(135deg,rgba(138,90,0,.92),rgba(199,155,24,.92));
  position:relative;
}
.hero img{
  width:100%; height:130px; object-fit:contain; background:#fff; padding:6px;
}
.hero::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(10,37,64,.02) 0%, rgba(10,37,64,.26) 100%);
  pointer-events:none;
}
.heroText{
  position:absolute; inset:0; z-index:1;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:12px;
  gap:10px;
}
.brandBox{
  display:flex; flex-direction:column; gap:6px;
}
.companyName{
  font-size:22px; font-weight:900; color:#0a2540;
  background:rgba(255,255,255,.84);
  border:1px solid rgba(10,37,64,.06);
  padding:8px 12px; border-radius:18px;
  width:max-content;
}
.tagline{
  display:none;
}
.contactRow{
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:8px 12px 10px;
}
.chipBtn,.navBtn,.actionBtn,.primaryBtn,.secondaryBtn,.dangerBtn,.footerBtn,.pageBtn{
  border:none; cursor:pointer; border-radius:999px; font-weight:800;
}
.chipBtn{
  min-height:40px; background:#fff; border:1px solid var(--line); color:var(--text);
}
.chipBtn.primary{background:linear-gradient(135deg,#c79b18,#e3c56b)}
.chipBtn.green{background:linear-gradient(135deg,#1f8b4c,#3ba96a);color:#fff}
.chipBtn.blue{background:linear-gradient(135deg,#173a84,#2f5fb8);color:#fff}
.topArea{
  display:grid; grid-template-columns:1.8fr 1fr; gap:8px; margin:10px 0;
}
.heroCard,.sectionCard,.card,.checkoutCard,.cartCard,.offerCard,.tierCard,.emptyCard,.summaryCard{
  background:rgba(255,255,255,.88);
  border:1px solid rgba(10,37,64,.08);
  border-radius:24px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.heroCard{padding:10px}
.sectionCard,.card,.checkoutCard,.cartCard,.offerCard,.tierCard,.emptyCard,.summaryCard{padding:12px}
.sectionTitle{margin:0 0 8px;font-size:16px;font-weight:900}
.sectionSub{font-size:12px;color:var(--muted);line-height:1.8}
.searchBox{
  display:grid; grid-template-columns:1fr auto auto; gap:8px;
  margin-bottom:10px;
}
.searchInput,.selectInput,.textInput,textarea{
  width:100%; min-height:48px; border-radius:16px; border:1px solid #d8dde7;
  padding:0 12px; background:#fff; outline:none; font-size:15px;
}
textarea{padding:12px; min-height:90px}
.searchInput:focus,.selectInput:focus,.textInput:focus,textarea:focus{
  border-color:#c79b18; box-shadow:0 0 0 3px rgba(199,155,24,.14);
}
.primaryBtn,.secondaryBtn,.dangerBtn,.actionBtn,.navBtn,.pageBtn,.footerBtn{
  min-height:46px; padding:0 14px;
}
.primaryBtn{background:linear-gradient(135deg,#c79b18,#e3c56b);color:#0a2540}
.secondaryBtn{background:#eef2f7;color:#20314a}
.dangerBtn{background:linear-gradient(135deg,#ff7b72,#c0392b);color:#fff}
.navBar{
  display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin:10px 0;
}
.navBtn{
  background:#fff; border:1px solid var(--line); color:#0a2540; min-height:42px; font-size:12px;
}
.navBtn.active{background:linear-gradient(135deg,#c79b18,#e3c56b)}
.grid{display:grid; gap:10px}
.grid.products{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid.tiers,.grid.offers,.grid.brands{grid-template-columns:repeat(2,minmax(0,1fr))}
.productCard,.tierCard,.offerCard,.brandCard{
  overflow:hidden; border-radius:24px;
}
.productImg,.brandImg,.offerImg{
  width:100%; height:180px; object-fit:contain; background:#f4f7fa;
  border-radius:20px;
}
.productName,.brandName,.tierName,.offerName{font-weight:900; line-height:1.5}
.productMeta,.tierMeta,.offerMeta,.smallMeta{font-size:12px;color:var(--muted);line-height:1.7}
.priceLine{font-size:15px;font-weight:900;color:#c79b18}
.old{text-decoration:line-through;color:#8a8f98;margin-inline-end:6px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}
.badge.green{background:#e8f7ee;color:#1f8b4c}
.badge.red{background:#fff0f0;color:#b63c2a}
.badge.blue{background:#eaf2ff;color:#173a84}
.badge.gold{background:#fff7cf;color:#5a4300}
.unitRow,.qtyRow,.cartRow{display:grid;gap:8px;align-items:center}
.unitRow{grid-template-columns:1fr}
.qtyRow{grid-template-columns:34px 1fr 34px}
.qtyBtn{height:34px;border:none;border-radius:999px;background:#eef2f7;font-size:16px;font-weight:900}
.qtyInput{text-align:center;font-weight:900}
.addBtn{background:linear-gradient(135deg,#c79b18,#e3c56b);color:#0a2540}
.addBtn.offer{background:linear-gradient(135deg,#1f8b4c,#3ba96a);color:#fff}
.footerDock{
  position:fixed;bottom:10px;left:10px;right:10px;z-index:60;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  padding:8px;background:rgba(248,249,250,.78);border:1px solid rgba(10,37,64,.08);
  backdrop-filter:blur(18px) saturate(180%);border-radius:24px;box-shadow:0 16px 38px rgba(10,37,64,.12);
}
.footerBtn{min-height:48px}
.footerTotal{display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:999px;font-weight:900}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);z-index:100}
.modal.show{display:flex}
.modalCard{
  width:min(480px,100%); background:#fff; border-radius:26px; padding:16px;
  border:1px solid #ead08a; box-shadow:0 28px 70px rgba(10,37,64,.18);
}
.modalTitle{font-size:20px;font-weight:900;margin:0 0 4px}
.modalSub{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:10px}
.formGrid{display:grid;gap:8px}
.hidden{display:none !important}
.ticker{
  padding:8px 12px; background:linear-gradient(135deg,#fff9e7,#fffdf7); border-top:1px solid rgba(10,37,64,.06);
  text-align:center; font-size:13px; font-weight:800; color:#5a4300;
}
.kpiGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.kpi{padding:10px;border-radius:18px;background:linear-gradient(135deg,#fff 0%, #f7eed2 100%)}
.kpi .n{font-size:18px;font-weight:900}
.kpi .l{font-size:11px;color:var(--muted)}
.reviewBox{background:#fffaf0;border:1px solid #ead08a;padding:10px;border-radius:18px;line-height:1.8}
@media (min-width: 800px){
  .grid.products{grid-template-columns:repeat(4,minmax(0,1fr))}
  .grid.tiers,.grid.offers,.grid.brands{grid-template-columns:repeat(3,minmax(0,1fr))}
}
@media (max-width: 799px){
  .topArea{grid-template-columns:1fr}
  .contactRow{grid-template-columns:1fr 1fr 1fr}
  .navBar{grid-template-columns:repeat(3,1fr)}
  .kpiGrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" alt="الأهرام" />
    <div class="heroText">
      <div class="brandBox">
        <div class="companyName" id="companyName">الأهرام للتجارة والتوزيع</div>
        <div class="tagline" id="tagline"></div>
      </div>
    </div>
  </div>
  <div class="contactRow">
    <a class="chipBtn blue" href="tel:01040880002">📞 اتصال</a>
    <a class="chipBtn green" href="https://wa.me/201040880002" target="_blank" rel="noopener">واتساب</a>
    <a class="chipBtn primary" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">Facebook</a>
  </div>
  <div class="ticker" id="ticker">جاري التحميل...</div>
</div>

<div id="app">
  <div class="emptyCard">جاري التحميل...</div>
</div>

<div class="footerDock">
  <button class="footerBtn secondaryBtn" onclick="setPage('home')">الرئيسية</button>
  <div class="footerTotal" id="footerTotal">0</div>
  <button class="footerBtn primaryBtn" onclick="setPage('checkout')">إتمام الطلب</button>
</div>

<div class="modal" id="passwordModal">
  <div class="modalCard">
    <div class="modalTitle" id="passwordTitle">إدخال الرقم السري</div>
    <div class="modalSub" id="passwordSub">ادخل الرقم السري للوصول.</div>
    <div class="formGrid">
      <input id="passwordInput" class="textInput" type="password" placeholder="الرقم السري">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="primaryBtn" onclick="confirmPassword()">تأكيد</button>
        <button class="secondaryBtn" onclick="closePasswordModal()">إلغاء</button>
      </div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  apiUrl: localStorage.getItem('alahram_api_url') || 'https://script.google.com/macros/s/AKfycbwvC3tpAbVKj1W0ikEzXWNvza1Q9EU4gAgudsx_g9SlqNepKltJJ_9xOYBIRpJJnc9qiw/exec',
  cacheKey: 'alahram_bootstrap_cache_v1',
  cartKey: 'alahram_cart_v1',
  tierKey: 'alahram_tier_v1',
  repKey: 'alahram_rep_v1',
  customerKey: 'alahram_customer_v1',
  pageKey: 'alahram_page_v1',
  themeKey: 'alahram_theme_v1',
};

const state = {
  page: localStorage.getItem(CONFIG.pageKey) || 'home',
  products: [],
  tiers: [],
  tierPrices: [],
  reps: [],
  offers: [],
  settings: {},
  cart: loadJSON(CONFIG.cartKey, []),
  selectedTier: loadJSON(CONFIG.tierKey, null),
  selectedRep: loadJSON(CONFIG.repKey, null),
  customer: loadJSON(CONFIG.customerKey, { name:'', phone:'', address:'', location:'' }),
  passwordMode: null,
  pendingTier: null,
  pendingRep: null,
  reviewMode: false,
  search: '',
  loading: true,
};

const el = {
  app: document.getElementById('app'),
  heroImage: document.getElementById('heroImage'),
  companyName: document.getElementById('companyName'),
  tagline: document.getElementById('tagline'),
  ticker: document.getElementById('ticker'),
  footerTotal: document.getElementById('footerTotal'),
  passwordModal: document.getElementById('passwordModal'),
  passwordTitle: document.getElementById('passwordTitle'),
  passwordSub: document.getElementById('passwordSub'),
  passwordInput: document.getElementById('passwordInput'),
};

function loadJSON(key, fallback){
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, value){ try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
function clean(v){ return (v ?? '').toString().trim(); }
function num(v){ const n = parseFloat(clean(v).replace(/[٬,\s]/g,'')); return Number.isFinite(n) ? n : 0; }
function norm(s){ return clean(s).normalize('NFKD').toLowerCase().replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/[^\u0600-\u06FFa-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function setPage(page){ state.page = page; savePage(); render(); }
function savePage(){ localStorage.setItem(CONFIG.pageKey, state.page); }
function saveState(){
  saveJSON(CONFIG.cartKey, state.cart);
  saveJSON(CONFIG.tierKey, state.selectedTier);
  saveJSON(CONFIG.repKey, state.selectedRep);
  saveJSON(CONFIG.customerKey, state.customer);
  savePage();
}
function toast(msg, type='info'){
  console.log(type.toUpperCase()+':', msg);
}
function currentTier(){
  return state.selectedTier;
}
function currentTierId(){
  const t = currentTier();
  return t ? clean(t.tier_id || t.tier_name || t.visible_label) : '';
}
function currentTierLabel(){
  const t = currentTier();
  return t ? clean(t.visible_label || t.tier_name || t.tier_id) : '';
}
function isTierActive(){
  return !!currentTier();
}
function getSettingsValue(key, fallback=''){
  return state.settings?.[key]?.value ?? fallback;
}
function apiUrl(path=''){
  const base = clean(CONFIG.apiUrl).replace(/\/$/,'');
  return base + path;
}
async function fetchJSON(url, options={}){
  const res = await fetch(url, {
    method: options.method || 'GET',
    headers: { 'Content-Type':'application/json' },
    body: options.body ? JSON.stringify(options.body) : undefined,
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'API error');
  return json.data;
}
async function loadBootstrap(force=false){
  if (!force){
    const cached = loadJSON(CONFIG.cacheKey, null);
    if (cached && cached.products){
      hydrate(cached);
      return;
    }
  }
  const data = await fetchJSON(apiUrl('?action=bootstrap'));
  saveJSON(CONFIG.cacheKey, data);
  hydrate(data);
}
function hydrate(data){
  state.products = data.products || [];
  state.tiers = data.tiers || [];
  state.tierPrices = data.tierPrices || [];
  state.reps = data.reps || [];
  state.offers = data.offers || [];
  state.settings = data.settings || {};
  state.loading = false;
  applyInitialTheme();
  updateHeader();
  render();
}
function applyInitialTheme(){
  const theme = loadJSON(CONFIG.themeKey, null);
  if (theme){
    Object.entries(theme).forEach(([k,v]) => document.documentElement.style.setProperty('--'+k, v));
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta && theme.gold) meta.setAttribute('content', theme.gold);
  }
}
function updateThemeFromTier(tier){
  const palettes = [
    { gold:'#c79b18', gold2:'#e3c56b', gold3:'#8a5a00', bg:'#fbf8f1', card:'#ffffff', soft:'#fffdf6', line:'#e8dcc4', text:'#0a2540', muted:'#5c6a7a' },
    { gold:'#8e44ad', gold2:'#d9b7ff', gold3:'#5e2d82', bg:'#f8f1ff', card:'#ffffff', soft:'#fbf7ff', line:'#e6d3f7', text:'#241a2f', muted:'#6d5f78' },
    { gold:'#16a085', gold2:'#6be3cf', gold3:'#0d6d60', bg:'#f1fffd', card:'#ffffff', soft:'#f7fffd', line:'#c9eee8', text:'#17312f', muted:'#5b7773' },
    { gold:'#2f80ed', gold2:'#8fc0ff', gold3:'#1353a4', bg:'#f2f8ff', card:'#ffffff', soft:'#f7fbff', line:'#cfe0f7', text:'#1b2738', muted:'#5d6d84' },
    { gold:'#e67e22', gold2:'#ffd08a', gold3:'#a5560d', bg:'#fff7ef', card:'#ffffff', soft:'#fffaf4', line:'#f0d3b0', text:'#352417', muted:'#7a6656' },
  ];
  const idx = Math.abs(hashCode(clean(tier?.visible_label || tier?.tier_name || tier?.tier_id || ''))) % palettes.length;
  const theme = palettes[idx];
  Object.entries(theme).forEach(([k,v]) => document.documentElement.style.setProperty('--'+k, v));
  localStorage.setItem(CONFIG.themeKey, JSON.stringify(theme));
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', theme.gold);
}
function hashCode(str){ let h=0; str=clean(str); for (let i=0;i<str.length;i++) h = ((h<<5)-h) + str.charCodeAt(i), h|=0; return Math.abs(h); }
function productKey(p){ return clean(p.product_id || p.id || p.sku || p.code || (p.company_name + '_' + p.product_name)); }
function productName(p){ return clean(p.product_name || p.name || p.title); }
function companyName(p){ return clean(p.company_name || p.brand || p.company); }
function productImage(p){ return clean(p.product_image || p.image || p.img || p.company_logo); }
function companyLogo(p){ return clean(p.company_logo || p.logo || p.company_image || p.product_image); }
function productVisible(p){ return String(p.visible ?? p.status ?? '1').trim().toLowerCase() !== '0' && String(p.visible ?? p.status ?? '1').trim().toLowerCase() !== 'false'; }
function activeOffers(){
  const now = new Date();
  return state.offers.filter(o => {
    const active = String(o.active ?? 1).trim() !== '0';
    if (!active) return false;
    return isOfferTimeLive(o, now);
  });
}
function isOfferTimeLive(o, now = new Date()){
  const s = parseTime(clean(o.start_datetime));
  const e = parseTime(clean(o.end_datetime));
  if (!s || !e) return true;
  const mins = now.getHours() * 60 + now.getMinutes();
  const sm = s.h*60 + s.m, em = e.h*60 + e.m;
  if (sm <= em) return mins >= sm && mins <= em;
  return mins >= sm || mins <= em; // عبور منتصف الليل
}
function parseTime(v){
  const m = String(v).match(/^(\d{1,2}):(\d{2})/);
  if (!m) return null;
  return { h: Math.max(0, Math.min(23, parseInt(m[1],10))), m: Math.max(0, Math.min(59, parseInt(m[2],10))) };
}
function flashPrice(offer){ return num(offer.price); }
function getTierPrice(product, unit){
  const t = currentTier();
  if (!t) return null;
  const tierName = clean(t.tier_name || t.visible_label || t.tier_id);
  const tierId = clean(t.tier_id || t.tier_name || t.visible_label);
  const row = state.tierPrices.find(x => clean(x.product_id) === productKey(product) || clean(x.product_name) === productName(product));
  if (!row) return null;
  const keys = [
    `${tierId}_${unit}`,
    `${tierName}_${unit}`,
  ];
  for (const k of keys){
    if (row[k] !== undefined && row[k] !== null && row[k] !== '') return num(row[k]);
  }
  const normalized = Object.keys(row).find(k => norm(k) === norm(keys[0]) || norm(k) === norm(keys[1]));
  if (normalized) return num(row[normalized]);
  return null;
}
function basePrice(product, unit){
  const p = product;
  if (unit === 'carton') return num(p.base_carton_price);
  if (unit === 'pack') return num(p.base_pack_price);
  if (unit === 'piece') return num(p.base_piece_price);
  return num(p.base_carton_price || p.base_pack_price || p.base_piece_price);
}
function effectivePrice(product, unit){
  const p = product;
  if (product.company_name === 'صفقة اليوم') return num(p.base_carton_price || p.base_pack_price || p.base_piece_price);
  const tier = getTierPrice(p, unit);
  if (tier && tier > 0) return tier;
  return basePrice(p, unit);
}
function unitOptions(product){
  const items = [];
  if (num(product.base_carton_price) > 0) items.push(['carton','كرتونة']);
  if (num(product.base_pack_price) > 0) items.push(['pack','دستة']);
  if (num(product.base_piece_price) > 0) items.push(['piece','قطعة']);
  return items.length ? items : [['carton','كرتونة']];
}
function getCartTotal(){
  return state.cart.reduce((sum, item) => sum + (num(item.price) * num(item.quantity)), 0);
}
function addToCart(product, unit, quantity){
  if (!productVisible(product)) return toast('الصنف غير متاح');
  const price = effectivePrice(product, unit);
  if (price <= 0) return toast('السعر غير متاح');
  const key = productKey(product) + '::' + unit;
  const existing = state.cart.find(i => i.key === key);
  if (existing){
    existing.quantity += quantity;
    existing.price = price;
  } else {
    state.cart.push({
      key,
      product_id: productKey(product),
      product_name: productName(product),
      company_name: companyName(product),
      unit,
      quantity,
      price,
      kind: companyName(product) === 'صفقة اليوم' ? 'offer' : 'normal'
    });
  }
  saveState(); render(); toast('تمت الإضافة');
}
function removeFromCart(key){
  state.cart = state.cart.filter(i => i.key !== key);
  saveState(); render();
}
function setQty(key, qty){
  const item = state.cart.find(i => i.key === key);
  if (!item) return;
  item.quantity = Math.max(1, parseInt(qty || 1, 10) || 1);
  saveState(); render();
}
function setUnitForCart(key, unit){
  const item = state.cart.find(i => i.key === key);
  if (!item) return;
  const product = state.products.find(p => productKey(p) === item.product_id);
  if (!product) return;
  item.unit = unit;
  item.price = effectivePrice(product, unit);
  item.key = item.product_id + '::' + unit;
  saveState(); render();
}
function searchProducts(){
  const q = norm(state.search);
  const products = state.products.filter(productVisible);
  if (!q) return products;
  const parts = q.split(' ').filter(Boolean);
  return products
    .map(p => ({ p, s: scoreProduct(p, q, parts) }))
    .filter(x => x.s > 0)
    .sort((a,b) => b.s - a.s)
    .slice(0, 60)
    .map(x => x.p);
}
function scoreProduct(p, q, parts){
  const text = norm([productName(p), productKey(p), companyName(p)].join(' '));
  let s = 0;
  if (text === q) s += 100;
  if (text.startsWith(q)) s += 80;
  if (text.includes(q)) s += 40;
  for (const part of parts){
    if (text.includes(part)) s += 8;
  }
  if (String(num(p.base_carton_price)).includes(q.replace(/\s+/g,''))) s += 10;
  return s;
}
function getTickerText(){
  const values = [];
  if (getSettingsValue('tier_welcome')) values.push(getSettingsValue('tier_welcome'));
  if (getSettingsValue('offer_welcome')) values.push(getSettingsValue('offer_welcome'));
  if (activeOffers().length) values.push('يوجد عروض فعالة الآن');
  if (currentTierLabel()) values.push('الشريحة الحالية: ' + currentTierLabel());
  return values.filter(Boolean).join(' • ') || 'جاهز للتحميل';
}

  const unit = defaultUnit(p);

  const inOffer = companyName(p) === 'صفقة اليوم';
  const options = unitOptions(p).map(([val,label]) => `<option value="${val}">${label}</option>`).join('');
  const badge = productVisible(p) ? '<span class="badge green">متاح</span>' : '<span class="badge red">غير متاح</span>';
  const priceHtml = price && base && price < base ? `<span class="old">${formatMoney(base)}</span><span>${formatMoney(price)}</span>` : `<span>${formatMoney(price)}</span>`;
  return `
    <div class="productCard card">
      ${productImage(p) ? `<img class="productImg" src="${escapeHTML(productImage(p))}" alt="${escapeHTML(productName(p))}">` : ''}

function renderCartItem(item){
  const product = state.products.find(p => productKey(p) === item.product_id);
  const options = product ? unitOptions(product).map(([val,label]) => `<option value="${val}" ${val===item.unit?'selected':''}>${label}</option>`).join('') : '';

        </div>

      </div>
      <div class="cartRow" style="grid-template-columns:1fr auto; margin-top:8px">
        <div class="smallMeta">السعر: ${formatMoney(item.price)}</div>
        <div class="smallMeta">الإجمالي: ${formatMoney(item.price * item.quantity)}</div>
      </div>
      <div class="cartRow" style="grid-template-columns:1fr; margin-top:8px">
        <select class="selectInput" onchange="setUnitForCart('${escapeJS(item.key)}', this.value)">${options}</select>

        <button class="qtyBtn" onclick="setQty('${escapeJS(item.key)}', ${item.quantity+1})">+</button>
      </div>

function uniqueCompanies(){
  return [...new Set(state.products.filter(productVisible).map(companyName).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ar'));
}
function countByCompany(company){
  return state.products.filter(p => productVisible(p) && companyName(p) === company).length;
}
function defaultUnit(p){
  if (num(p.base_carton_price) > 0) return 'carton';
  if (num(p.base_pack_price) > 0) return 'pack';
  if (num(p.base_piece_price) > 0) return 'piece';
  return 'carton';
}
function quickAdd(productId){
  const p = state.products.find(x => productKey(x) === productId);
  if (!p) return;
  const unitEl = document.getElementById('unit_'+escapeID(productId));
  const qtyEl = document.getElementById('qty_'+escapeID(productId));
  const unit = unitEl ? unitEl.value : defaultUnit(p);
  const qty = Math.max(1, parseInt(qtyEl ? qtyEl.value : 1, 10) || 1);
  addToCart(p, unit, qty);
}
function changeQty(productId, delta){
  const elQty = document.getElementById('qty_'+escapeID(productId));
  if (!elQty) return;
  const current = Math.max(1, parseInt(elQty.value || '1', 10) || 1);
  elQty.value = Math.max(1, current + delta);
}
function openCompany(name){
  state.search = name;
  setPage('products');
}
function selectTier(tierId, locked){
  const tier = state.tiers.find(t => String(t.tier_id) === String(tierId) || String(t.tier_name) === String(tierId) || String(t.visible_label) === String(tierId));
  if (!tier) return;
  if (clean(tier.tier_password) === ''){
    state.selectedTier = tier;
    updateThemeFromTier(tier);
    saveState();
    render();
    return;
  }
  state.pendingTier = tier;
  state.passwordMode = 'tier';
  el.passwordTitle.textContent = 'فتح الشريحة';
  el.passwordSub.textContent = `أدخل الرقم السري للشريحة: ${tier.visible_label || tier.tier_name || tier.tier_id}`;
  el.passwordInput.value = '';
  el.passwordModal.classList.add('show');
  el.passwordInput.focus();
}
async function confirmPassword(){
  const pwd = clean(el.passwordInput.value);
  if (!pwd) return;
  if (state.passwordMode === 'tier' && state.pendingTier){
    const tier = state.pendingTier;
    const res = await fetchJSON(apiUrl(), { method:'POST', body:{ action:'checkTier', tierId: tier.tier_id || tier.tier_name || tier.visible_label, password: pwd } });
    if (!res.ok) return;
    state.selectedTier = tier;
    updateThemeFromTier(tier);
    state.passwordMode = null;
    state.pendingTier = null;
    el.passwordModal.classList.remove('show');
    saveState();
    render();
    return;
  }
}
function closePasswordModal(){
  state.passwordMode = null;
  state.pendingTier = null;
  el.passwordModal.classList.remove('show');
}
function addOfferToCart(offerId){
  const offer = state.offers.find(o => String(o.Flash_id) === String(offerId) || clean(o.Flash_name) === clean(offerId));
  if (!offer) return;
  const item = {
    key: 'offer::' + (offer.Flash_id || offer.Flash_name),
    product_id: 'offer::' + (offer.Flash_id || offer.Flash_name),
    product_name: offer.display_title || offer.Flash_name || 'صفقة اليوم',
    company_name: 'صفقة اليوم',
    unit: 'offer',
    quantity: 1,
    price: flashPrice(offer),
    kind: 'offer',
  };
  const exists = state.cart.find(i => i.key === item.key);
  if (!exists) state.cart.push(item);
  saveState(); render(); setPage('cart');
}
function prepareReview(){
  const review = document.getElementById('reviewArea');
  if (!review) return;
  const name = clean(document.getElementById('custName').value);
  const phone = clean(document.getElementById('custPhone').value);
  const address = clean(document.getElementById('custAddress').value);
  if (!name || !phone || !address){
    review.classList.remove('hidden');
    review.innerHTML = 'أدخل الاسم والهاتف والعنوان أولاً.';
    return;
  }
  review.classList.remove('hidden');
  review.innerHTML = `
    <div class="sectionTitle">مراجعة الطلب</div>
    <div>الاسم: <b>${escapeHTML(name)}</b></div>
    <div>الهاتف: <b>${escapeHTML(phone)}</b></div>
    <div>العنوان: <b>${escapeHTML(address)}</b></div>
    <div>الإجمالي: <b>${formatMoney(getCartTotal())}</b></div>
    <div style="margin-top:8px">${state.cart.map(i => `• ${escapeHTML(i.product_name)} × ${i.quantity} = ${formatMoney(i.quantity*i.price)}`).join('<br>')}</div>
  `;
  state.reviewMode = true;
}
async function sendOrder(){
  const name = clean(document.getElementById('custName').value);
  const phone = clean(document.getElementById('custPhone').value);
  const address = clean(document.getElementById('custAddress').value);
  const location = clean(document.getElementById('custLocation').value);
  state.customer = { name, phone, address, location };
  saveState();

  if (!name || !phone || !address) return toast('أكمل بيانات العميل');

  const payload = {
    action: 'createOrder',
    customer: state.customer,
    items: state.cart,
    subtotal: getCartTotal(),
    total: getCartTotal(),
    order_type: currentTier() ? 'tier' : 'normal',
    tier_name: currentTierLabel(),
    rep_name: state.selectedRep?.rep_name || '',
    rep_id: state.selectedRep?.rep_id || '',
  };

  try{
    const res = await fetchJSON(apiUrl(), { method:'POST', body: payload });
    const whatsapp = buildWhatsAppMessage(res.order_id);
    window.open(whatsapp, '_blank');
    state.cart = [];
    saveState();
    render();
    setPage('home');
    toast('تم حفظ الطلب');
  }catch(err){
    toast(err.message || 'فشل إرسال الطلب');
  }
}
function buildWhatsAppMessage(orderId){
  const lines = [];
  lines.push('طلب جديد: ' + orderId);
  lines.push('الاسم: ' + clean(state.customer.name));
  lines.push('الهاتف: ' + clean(state.customer.phone));
  lines.push('العنوان: ' + clean(state.customer.address));
  lines.push('الإجمالي: ' + formatMoney(getCartTotal()));
  state.cart.forEach(i => lines.push(`${i.product_name} - ${i.unit} x ${i.quantity} = ${formatMoney(i.quantity * i.price)}`));
  const text = encodeURIComponent(lines.join('\n'));
  return 'https://wa.me/201040880002?text=' + text;
}
function escapeHTML(s){
  return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;');
}
function escapeJS(s){
  return String(s ?? '').replaceAll('\\','\\\\').replaceAll("'", "\\'");
}
function escapeID(s){
  return String(s ?? '').replace(/[^a-zA-Z0-9_-]/g,'_');
}
window.addEventListener('load', async () => {
  try{
    await loadBootstrap();
    if (state.selectedTier) updateThemeFromTier(state.selectedTier);
    render();
  }catch(err){
    el.app.innerHTML = `<div class="emptyCard">فشل تحميل البيانات: ${escapeHTML(err.message || err)}</div>`;
  }
});
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePasswordModal();
});
