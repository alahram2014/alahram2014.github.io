
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Al-Ahram Co | Amazon Style</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <section id="banner"></section>

    <header class="topbar" id="mainHeader">
      <div class="header-row-top">
        <a href="#" class="logo-brand">ALAHRAM<span>.CO</span></a>
        <div class="user-box">
          <button class="h-chip" id="userBtn">أهلاً، دخول</button>
        </div>
      </div>
      
      <div class="search-container">
        <input type="text" id="globalSearch" placeholder="ابحث في أمازون الأهرام...">
        <button id="searchBtn">🔍</button>
      </div>

      <div class="header-chips-row">
        <button class="h-chip" id="tierBtn">الشريحة السعرية</button>
        <button class="h-chip" id="dealsBtn">عروض اليوم</button>
        <button class="h-chip" onclick="location.hash='#flash'">عروض الحرق</button>
      </div>
    </header>

    <!-- CRITICAL: The main container for data -->
    <main id="main" class="main"></main>

    <nav class="bottom-nav">
      <a href="#" class="nav-item active"><span>🏠</span>الرئيسية</a>
      <a href="#companies" class="nav-item"><span>🏢</span>الشركات</a>
      <a href="#deals" class="nav-item"><span>🏷️</span>العروض</a>
      <a href="javascript:void(0)" id="openCartBtn" class="nav-item"><span>🛒</span>السلة</a>
    </nav>
  </div>

  <!-- Cart Drawer -->
  <aside class="drawer" id="cartDrawer">
    <div class="drawer-head">
      <h3>تسوق السلة</h3>
      <button onclick="document.getElementById('cartDrawer').classList.remove('active')" style="background:none; border:none; color:white; font-size:1.5rem;">×</button>
    </div>
    <div id="cartItems" style="flex:1; overflow-y:auto; padding:15px;"></div>
    <div style="padding:15px; border-top:1px solid #ddd;">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <strong>الإجمالي:</strong>
        <strong id="cartTotal">0</strong>
      </div>
      <button class="amazon-btn" id="checkoutBtn" style="width:100%; font-weight:bold;">إتمام الطلب</button>
    </div>
  </aside>

  <!-- IMPORTANT: Link to JS -->
  <script src="app.js"></script>
</body>
</html>
