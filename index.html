  <style>

    /* ===== Dark Theme System ===== */
    :root{
      --bg-main:#0f172a;
      --bg-card:#111827;
      --border:#1f2937;
      --text-main:#f9fafb;
      --text-secondary:#9ca3af;
      --gold:#f7c948;
      --green:#22c55e;
      --blue:#3b82f6;
      --red:#ef4444;
      --primary:var(--blue);
      --primary2:#2563eb;
      --good:var(--green);
      --bad:var(--red);
      --warn:var(--gold);
      --bg:#0f172a;
      --card:#111827;
      --line:#1f2937;
      --text:#f9fafb;
      --muted:#9ca3af;
      --shadow:0 18px 42px rgba(0,0,0,.34);
      --shadow-soft:0 12px 28px rgba(0,0,0,.24);
    }
    body{
      background:
        radial-gradient(circle at top, rgba(59,130,246,.12), transparent 30%),
        radial-gradient(circle at right top, rgba(247,201,72,.10), transparent 24%),
        linear-gradient(180deg,#0b1120 0%, #0f172a 50%, #111827 100%) !important;
      color:var(--text-main) !important;
      color-scheme:dark;
    }
    .topbar{
      background:rgba(15,23,42,.76) !important;
      border-bottom:1px solid rgba(255,255,255,.08) !important;
      backdrop-filter:blur(18px);
    }
    .brand-text p,.section-head p,.card .meta,.msg,.stat-pill span,.bottom-tier .sub,.bottom-total .sub,.signature,.drawer-head h3,.drawer-footer .total,.checkout-location small,.filter-chip,.search-clear,.contact-link,.empty,.agent-note,.agent-readonly,.modal h3,.suggest-item span{color:var(--text-secondary) !important;}
    .brand-text h1,.section-head h2,.card .title,.action-card .label,.tier-card .label,.company-name,.price .now,.buy-btn,.stepper span,.cart-item .name,.cart-item .meta,.bottom-tier .main,.bottom-total .main,.stat-pill strong,.checkout-summary strong,.input{color:var(--text-main) !important;}
    .panel,.company-card,.action-card,.tier-card,.card,.special-card,.modal,.cart-drawer,.drawer-head,.drawer-body,.drawer-footer,.stat-pill,.cart-item,.search-wrap,.search-suggest,.input,.search-clear,.filter-chip,.back-btn,.contact-link,.agent-card,.agent-status,.agent-readonly,.empty{
      background:rgba(17,24,39,.92) !important;
      border-color:var(--border) !important;
      box-shadow:var(--shadow-soft) !important;
    }
    .company-card:hover,.card:hover,.action-card:hover,.tier-card:hover,.special-card:hover,.contact-link:hover,.back-btn:hover{transform:translateY(-1px) scale(1.01);}
    .company-logo,.company-img,.card .img,.special-card .img{
      background:#0b1220 !important;
    }
    .company-card.active,.tier-card.active,.filter-chip.active{
      border-color:rgba(247,201,72,.55) !important;
      box-shadow:0 0 0 1px rgba(247,201,72,.12), var(--shadow) !important;
    }
    .chip.primary,.bottom-tier.ok{
      background:linear-gradient(135deg,#2563eb,#3b82f6) !important;
      border-color:#2563eb !important;
      color:#fff !important;
    }
    .chip.good,.submit-btn,.buy-btn:not(.remove){
      background:linear-gradient(135deg,#16a34a,#22c55e) !important;
      border-color:#16a34a !important;
      color:#fff !important;
    }
    .chip.gold{
      background:linear-gradient(135deg,#f7c948,#eab308) !important;
      border-color:#d4a713 !important;
      color:#111827 !important;
    }
    .chip.live{
      background:linear-gradient(135deg,#7c2d12,#f59e0b) !important;
      border-color:#f59e0b !important;
      box-shadow:0 0 0 1px rgba(255,255,255,.08),0 16px 30px rgba(245,158,11,.22) !important;
    }
    .buy-btn.remove,.back-btn,.search-clear{
      background:linear-gradient(135deg,#b91c1c,#ef4444) !important;
      color:#fff !important;
      border-color:#ef4444 !important;
    }
    .special-list{grid-template-columns:1fr !important;}
    .special-card{
      min-height:340px !important;
      grid-template-columns:1fr !important;
      border-radius:26px !important;
    }
    .special-card .title{font-size:18px !important;}
    .special-card .price .now{font-size:22px !important;}
    .special-card .img{aspect-ratio:1/1 !important;}
    .catalog{
      grid-template-columns:repeat(auto-fill,minmax(132px,1fr)) !important;
      gap:8px !important;
    }
    .card .body,.action-card,.tier-card,.company-card{padding:10px !important;}
    .card .img img,.company-img{
      object-fit:contain !important;
    }
    .companies{
      grid-template-columns:repeat(auto-fill,minmax(118px,1fr)) !important;
      gap:8px !important;
    }
    .company-card{
      min-height:116px !important;
      padding:12px !important;
    }
    .input::placeholder,.search-input::placeholder{color:rgba(156,163,175,.9) !important;}
    .drawer-head,.drawer-footer,.modal .head{background:rgba(15,23,42,.92) !important;}
    .overlay{background:rgba(2,6,23,.68) !important;}
    .toast{box-shadow:0 16px 34px rgba(0,0,0,.36) !important;}
    .toast.good{background:#166534 !important;}
    .toast.bad{background:#991b1b !important;}
    .toast.warn{background:#92400e !important;}
    .toast.info{background:#1d4ed8 !important;}
    .bottom-bar{
      background:rgba(15,23,42,.90) !important;
      border-top:1px solid rgba(255,255,255,.08) !important;
      backdrop-filter:blur(16px);
    }
    .bottom-tier,.bottom-total{
      background:rgba(17,24,39,.96) !important;
      border-color:var(--border) !important;
    }
    .bottom-total .icon{filter:drop-shadow(0 1px 1px rgba(0,0,0,.35))}
    .msg{color:var(--text-secondary) !important;}
    .empty{
      background:rgba(17,24,39,.72) !important;

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbxQYr5a3Mrl0kRnbg_n5JFe9Co4bxQKgcQ_2Kyp9BJE6f-ykLBOTb3EXh2AKBWlcYu3cQ/exec';
const PAGE_LIMIT = 20;
const UNIT_ORDER = ['carton','pack','piece'];
const UNIT_LABELS = { carton:'كرتونة', pack:'دستة', piece:'قطعة' };
const CACHE_TTL = 5 * 60 * 1000;
const state = {
  view: 'home',
  settings: {}, tiers: [], companies: [], offers: [], flashOffers: [],
  selectedTier: loadJSON('alahram_selected_tier', null),
  cart: loadJSON('alahram_cart', []),
  selectedCompany: '',
  searchQuery: loadJSON('alahram_search_query', ''),
  searchMode: !!loadJSON('alahram_search_query', ''),
  suggestionItems: [],
  products: [],
  productsCache: new Map(),
  productsKey: '',
  productsMeta: { page: 1, hasMore: true, loading: false, error: null },
  productsReqId: 0,
  productsObserver: null,
  loadingInitial: true,
  toastLog: [],
  smartSeed: 0,
  productModalItem: null,
  checkoutGeo: '',
  agent: loadJSON('alahram_agent', null),

  agentDirectoryLoaded: false,
  apiMemory: new Map(),

  _lastTierRemaining: null,
  flashTick: Date.now(),
  repSafe: false
};
const $ = (id) => document.getElementById(id);

function loadJSON(key, fallback){ try{ const raw=localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(e){ return fallback; } }
function saveJSON(key, value){ try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){} }
function formatMoney(n){ const num=Number(n||0); const fixed = Math.abs(num % 1) < 1e-9 ? String(Math.trunc(num)) : num.toFixed(2).replace(/0+$/,'').replace(/\.$/,''); return new Intl.NumberFormat('ar-EG').format(Number(fixed)); }
function escapeHtml(str){ return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[s])); }
function norm(v){ return String(v || '').trim().toLowerCase().replace(/\s+/g,' '); }
function toast(message, type='info'){ const zone=$('toastZone'); const node=document.createElement('div'); node.className=`toast ${type}`; node.textContent=message; zone.appendChild(node); setTimeout(()=>{ node.style.opacity='0'; node.style.transform='translateY(8px)'; setTimeout(()=>node.remove(),240); }, 2200); }
function unitLabel(unit){ return UNIT_LABELS[unit] || unit || ''; }
function fallbackImage(){ return 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800"><rect width="100%" height="100%" fill="#eef3fb"/><text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-size="28" fill="#64748b">Alahram Co</text></svg>`); }
function currentTierSlug(){ return state.selectedTier ? norm(state.selectedTier.tier_name || state.selectedTier.visible_label || '') : ''; }
function basePrices(product){ return product && product.base_prices ? product.base_prices : { carton:0, pack:0, piece:0 }; }
function resolvePrice(product, unit, tierSlug=currentTierSlug()){ const base=basePrices(product); const basePrice=Number(base[unit] || 0); let current=basePrice; let changed=false; if (tierSlug && product && product.tier_prices && product.tier_prices[tierSlug]) { const tierPrice=Number((product.tier_prices[tierSlug] || {})[unit] || 0); if (tierPrice > 0){ current=tierPrice; changed=tierPrice !== basePrice; } } return { base: basePrice, current, changed }; }
function productKey(ctx){ return `company:${norm(ctx.company || '')}|q:${norm(ctx.q || '')}`; }
function getContext(){ return { company: state.selectedCompany || '', q: state.searchMode ? state.searchQuery : '' }; }
function getSelectedUnit(productId, units){ const key=`alahram_unit_${productId}`; const saved=localStorage.getItem(key); if (saved && units.includes(saved)) return saved; const first=units[0] || 'piece'; localStorage.setItem(key, first); return first; }
function setSelectedUnit(productId, unit){ try{ localStorage.setItem(`alahram_unit_${productId}`, unit); }catch(e){} renderCurrentView(); }
function normalizeQty(v){ const s = String(v ?? '').replace(/[^\d]/g,''); if (!s) return 0; const n = parseInt(s, 10); return Number.isFinite(n) ? n : 0; }
function getDraftQty(pid, unit){ try{ return localStorage.getItem(`alahram_draft_qty_${pid}_${unit}`) || ''; }catch(e){ return ''; } }
function setDraftQty(pid, unit, value){ try{ localStorage.setItem(`alahram_draft_qty_${pid}_${unit}`, String(value || '')); }catch(e){} }
function apiUrl(endpoint, params={}){ const url = new URL(API_BASE); url.searchParams.set('endpoint', endpoint); Object.entries(params).forEach(([k,v])=>{ if (v !== undefined && v !== null && String(v).length) url.searchParams.set(k, String(v)); }); return url.toString(); }
async function fetchApi(endpoint, params={}, method='GET', body=null){ const key=`${method}:${endpoint}:${JSON.stringify(params)}:${body ? JSON.stringify(body) : ''}`; const cached = state.apiMemory.get(key); if (cached && (Date.now() - cached.ts) < CACHE_TTL) return cached.data; const ctrl = new AbortController(); const t = setTimeout(()=>ctrl.abort(), 12000); try{ const res = await fetch(apiUrl(endpoint, params), { method, headers: body ? { 'Content-Type':'application/json' } : {}, body: body ? JSON.stringify(body) : undefined, signal: ctrl.signal }); const text = await res.text(); let json; try{ json = JSON.parse(text); }catch(e){ throw new Error('استجابة غير متوقعة من الخادم'); } if (!res.ok || json.success === false) throw new Error(json.error || ('HTTP ' + res.status)); const data = json.data || {}; state.apiMemory.set(key, { ts: Date.now(), data }); return data; }catch(err){ throw new Error(err.name === 'AbortError' ? 'انتهت مهلة الاتصال بالخدمة' : (err.message || 'تعذر الاتصال بالخدمة')); }finally{ clearTimeout(t); } }
function saveCart(){ saveJSON('alahram_cart', state.cart); }
function cartKey(id, unit){ return `${id}::${unit}`; }
function itemLinePrice(item){ if (!item) return 0; if (item.type === 'special') return Number(item.price || 0); return resolvePrice(item.product_snapshot || item, item.unit).current; }
function getCartAnalysis(cart = state.cart){ const companiesMap={}; let total=0; let eligible=0; let hasOffer=false; let hasFlash=false; for (const item of cart || []) { const price = itemLinePrice(item); const qty = Number(item.qty || 1); const sum = qty * price; total += sum; if (item.type === 'product') { eligible += sum; const company = String(item.company || 'غير معروف').trim(); companiesMap[company] = (companiesMap[company] || 0) + sum; } if (item.type === 'offer') hasOffer = true; if (item.type === 'flash') hasFlash = true; } return { total, eligible, companiesMap, companiesCount: Object.keys(companiesMap).length, hasOffer, hasFlash }; }
function isCartContainsSpecial(id, type){ return state.cart.some(x => x.type === type && String(x.id) === String(id)); }
function findCartIndex(key){ return state.cart.findIndex(x => x.type === 'product' && cartKey(String(x.id), String(x.unit)) === key); }
function popSmartToast(reason='generic'){ const tally = getCartAnalysis(); const remaining = state.selectedTier ? Math.max(0, Number(state.selectedTier.tier_min || 0) - tally.eligible) : null; const groups = { add:['تمام يا معلم 👌 اتحط في السلة','حلو كده، نكمل الصنف الجاي','قفلناه في السلة، خطوة مظبوطة'], remove:['اتشال، كمل على الهدوء','تم الحذف، السلة فضيت شوية','شيلناه، وهنكمل على السريع'], tier:['الشريحة اشتغلت صح 👏','كده انت ماشي مظبوط مع الشريحة','ممتاز، قربت تحقق المطلوب'], order:['تم تجهيز الطلب، برافو عليك','الطلب جاهز، خلصناها بشكل شيك','تمام، الطلب اتجهز واتساب'], generic:['شغلك منظم 👌','كمل بنفس الوتيرة','أداء حلو، استمر'] }; let bank = groups[reason] || groups.generic; if (state.selectedTier && remaining !== null) { if (remaining <= 0) bank = ['مبروك 👏 الشريحة اكتملت','كده الشريحة اتحققت','ممتاز، الشريحة قفلت']; else if (tally.companiesCount < 5) bank = ['وزّع السلة على شركات أكثر','كمل من أكثر من شركة','جرّب أصناف من شركات إضافية']; } const pick = bank[(state.smartSeed++ + state.toastLog.length) % bank.length]; if (state.toastLog.slice(-2).includes(pick)) return toast(reason === 'remove' ? 'اتشال من السلة' : 'تمام', reason === 'remove' ? 'bad' : 'good'); state.toastLog.push(pick); if (state.toastLog.length > 12) state.toastLog.shift(); toast(pick, reason === 'remove' ? 'bad' : reason === 'tier' || reason === 'order' ? 'good' : 'info'); }
function currentFlash(){ return getLiveFlashOffers()[0] || null; }
function flashCountdownText(endIso){ if (!endIso) return 'لا يوجد عرض نشط'; const diff = Math.max(0, new Date(endIso).getTime() - Date.now()); const h = String(Math.floor(diff / 3600000)).padStart(2,'0'); const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0'); const s = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0'); return `ينتهي خلال ${h}:${m}:${s}`; }
function companyInitials(name){ const parts = String(name || '').trim().split(/\s+/).filter(Boolean); return parts.length ? parts.slice(0,2).map(p=>p[0]).join('').toUpperCase() : 'A'; }

function openOverlay(id){ $(id).classList.add('show'); $(id).setAttribute('aria-hidden','false'); }
function closeOverlay(id){ $(id).classList.remove('show'); $(id).setAttribute('aria-hidden','true'); }
function setRoute(view, replace=false){ const snapshot = { view, company: state.selectedCompany || '', q: state.searchMode ? state.searchQuery : '', tier: state.selectedTier ? (state.selectedTier.tier_name || state.selectedTier.visible_label || '') : '' }; if (replace) history.replaceState(snapshot, '', location.href); else history.pushState(snapshot, '', location.href); }
function bindHistory(){ if (!history.state) history.replaceState({ view: state.view }, '', location.href); window.onpopstate = (ev) => applyRoute(ev.state || { view:'home' }); }
function applyRoute(route={}){ state.view = route.view || 'home'; state.selectedCompany = route.company || ''; state.searchQuery = route.q || ''; state.searchMode = !!route.q; if (route.tier) { const wanted = norm(route.tier); const found = state.tiers.find(t => norm(t.tier_name) === wanted || norm(t.visible_label) === wanted || String(t.tier_id || '') === String(route.tier)); if (found) state.selectedTier = found; } renderCurrentView(true); }
function renderSearchBox(placeholder='ابحث بالاسم أو الكود أو الشركة...'){ return `<section class="search-wrap panel sticky-search"><div class="search-row"><input id="searchInput" class="search-input" value="${escapeHtml(state.searchQuery)}" placeholder="${escapeHtml(placeholder)}" /><button class="search-clear" id="searchClearBtn" type="button">✕</button></div><div id="searchSuggest" class="search-suggest"></div></section>`; }

function sendWhatsappInvoice(){ const name = String($('checkoutName')?.value || '').trim(); const phone = String($('checkoutPhone')?.value || '').trim(); const address = String($('checkoutAddress')?.value || '').trim(); const err = $('checkoutErr'); if (!name || !phone || !address) { if (err) err.classList.add('show'); toast('أكمل البيانات المطلوبة', 'bad'); return; } if (err) err.classList.remove('show'); const message = buildInvoiceMessage({ name, phone, address, location: state.checkoutGeo || 'لا يوجد' }); const url = `https://wa.me/201552670465?text=${encodeURIComponent(message)}`; window.open(url, '_blank', 'noopener'); popSmartToast('order'); }
function buildInvoiceMessage(input={}){ const tally = getCartAnalysis(); const phone = String(input.phone || '').trim(); const address = String(input.address || '').trim(); const location = String(state.checkoutGeo || input.location || 'لا يوجد').trim() || 'لا يوجد'; const tier = state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name || 'لا يوجد') : 'لا يوجد'; const sender = agentIsActive() ? agentDisplayName() : String(input.name || '').trim(); const lines = []; lines.push('🧾 طلب فاتورة شراء'); lines.push('━━━━━━━━━━━━━━━━━━━━━━'); lines.push(''); lines.push('👤 من:'); lines.push(sender || ''); lines.push(''); lines.push('📞 رقم التليفون:'); lines.push(phone || ''); lines.push(''); lines.push('📍 العنوان:'); lines.push(address || ''); lines.push(''); lines.push('📌 اللوكيشن:'); lines.push(location || 'لا يوجد'); lines.push(''); lines.push('━━━━━━━━━━━━━━━━━━━━━━'); lines.push(''); lines.push('📊 الشريحة:'); lines.push(tier || 'لا يوجد'); lines.push(''); lines.push('━━━━━━━━━━━━━━━━━━━━━━'); lines.push(''); lines.push('📦 تفاصيل الطلب:'); lines.push(''); (state.cart || []).forEach((item, i) => { if (item.type === 'product') { const line = resolvePrice(item.product_snapshot || item, item.unit); const displayQty = Number(item.qty || 1); lines.push(`${i + 1}️⃣ ${String(item.id || '').trim()} ${item.name || ''}`); lines.push(`الوحدة: ${unitLabel(item.unit)}`); lines.push(`سعر الوحدة: ${Math.round(line.current)} ج`); lines.push(`الكمية: ${displayQty}`); lines.push(`الإجمالي: ${Math.round(displayQty * line.current)} ج`); lines.push(''); } else { lines.push(`${i + 1}️⃣ ${String(item.id || '').trim()} ${item.name || ''}`); lines.push(`النوع: ${item.type === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'}`); lines.push(`الإجمالي: ${Math.round(Number(item.price || 0))} ج`); lines.push(''); } }); if (tally.hasOffer) { lines.push('🔥 ملاحظات:'); lines.push('يحتوي على صفقة اليوم ✔️'); } if (tally.hasFlash) { lines.push('يحتوي على عرض الساعة ✔️'); } lines.push(''); lines.push('💰 الإجمالي الكلي:'); lines.push(`${Math.round(tally.total)} ج`); lines.push(''); lines.push('━━━━━━━━━━━━━━━━━━━━━━'); lines.push('📌 تم الارسال من متجر الاهرام'); return lines.join('\n'); }
