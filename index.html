<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الأهرام للتجارة والتوزيع</title>

  <style>
    body {
      font-family: Arial;
      direction: rtl;
      padding: 20px;
      background: #f5f5f5;
    }

    .product {
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .title {
      font-weight: bold;
      font-size: 18px;
    }

    .company {
      color: gray;
    }
  </style>
</head>

<body>

<h1>منتجات الأهرام</h1>

<div id="products">جاري التحميل...</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw6azxH6sJr2kS9bUMCdzJctMJwbfuwJiudCD8Ksu-bbpA9_Bch8IgYAzp5qoGn9sJ0LQ/exec";

async function loadProducts() {
  const res = await fetch(API + "?action=getProducts");
  const data = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.data.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <div class="title">${p.name}</div>
      <div class="company">${p.company}</div>
    `;

    container.appendChild(div);
  });
}

loadProducts();

</script>

</body>
</html>
