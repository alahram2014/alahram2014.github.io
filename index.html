<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Alahram Co B2B</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#102033;
      --muted:#64748b;
      --line:#e5eaf1;
      --primary:#1f3a5f;
      --primary2:#0ea5e9;
      --good:#16a34a;
      --warn:#f59e0b;
      --bad:#ef4444;
      --shadow:0 14px 40px rgba(16,32,51,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
      background:linear-gradient(180deg,#eef4ff 0%, #f8fbff 26%, var(--bg) 100%);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      padding-bottom:98px;
    }
    button,input,select,textarea{font:inherit}
    button{border:0;background:none}
    a{text-decoration:none;color:inherit}
    .app{max-width:1280px;margin:0 auto}
    .topbar{
      position:sticky;top:0;z-index:40;
      backdrop-filter:blur(12px);
      background:rgba(246,248,251,.88);
      border-bottom:1px solid rgba(229,234,241,.8);
    }
    .topbar-inner{
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;padding:14px 14px 12px;
    }
    .brand{
      display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer;
    }
    .brand-badge{
      width:46px;height:46px;border-radius:16px;
      background:linear-gradient(135deg,var(--primary),#345f98);
      color:#fff;display:grid;place-items:center;
      font-weight:900;box-shadow:var(--shadow);
      flex:0 0 auto;
    }
    .brand h1{margin:0;font-size:16px;line-height:1.1}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .top-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .chip-btn,.icon-btn,.pill{
      display:inline-flex;align-items:center;justify-content:center;
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:999px;padding:10px 14px;min-height:42px;
      box-shadow:0 6px 18px rgba(16,32,51,.05);cursor:pointer;
      transition:.18s ease transform,.18s ease background,.18s ease border-color;
      gap:8px;
    }
    .chip-btn:hover,.icon-btn:hover,.pill:hover{transform:translateY(-1px)}
    .chip-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
    .chip-btn.good{background:var(--good);color:#fff;border-color:var(--good)}
    .chip-btn.ghost{background:#fff}
    .page{padding:14px}
    .hero{
      display:grid;gap:12px;
      grid-template-columns:repeat(12,1fr);
      margin-top:6px;
    }
    .hero-card{
      grid-column:span 12;
      background:linear-gradient(135deg,#102033,#1f3a5f 45%,#245a91);
      color:#fff;border-radius:26px;padding:18px;
      box-shadow:var(--shadow);position:relative;overflow:hidden;
    }
    .hero-card:before{
      content:"";position:absolute;inset:auto -70px -70px auto;width:190px;height:190px;border-radius:50%;
      background:rgba(255,255,255,.08);
    }
    .hero-title{margin:0 0 8px;font-size:22px}
    .hero-sub{margin:0;color:rgba(255,255,255,.82);max-width:64ch;line-height:1.8;font-size:13px}
    .hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .hero-actions .chip-btn{border:0}
    .search-wrap{
      grid-column:span 12;
      background:#fff;border:1px solid var(--line);border-radius:24px;
      padding:12px;box-shadow:var(--shadow)
    }
    .search-row{display:flex;gap:10px;align-items:center}
    .search-input{
      flex:1;min-width:0;border:0;outline:0;background:transparent;
      font-size:15px;padding:8px 4px;
    }
    .search-clear{
      width:42px;height:42px;border-radius:14px;border:1px solid var(--line);
      display:grid;place-items:center;cursor:pointer;background:#fff;color:var(--muted);
    }
    .suggestions{
      margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;
      display:none;gap:8px;flex-direction:column;
      max-height:320px;overflow:auto;
    }
    .suggestions.show{display:flex}
    .suggest-item{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:12px;border-radius:18px;background:#f8fbff;border:1px solid #e8eef8;cursor:pointer;
    }
    .suggest-item strong{display:block;font-size:14px}
    .suggest-item span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
    .grid-3{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;
      margin-top:10px;
    }
    .action-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;
      min-height:82px;padding:14px;box-shadow:var(--shadow);
      display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;
      transition:.18s ease transform,.18s ease box-shadow;
    }
    .action-card:hover{transform:translateY(-1px)}
    .action-card .label{font-weight:800;font-size:15px}
    .action-card .desc{font-size:12px;color:var(--muted);line-height:1.6}
    .section-head{
      margin:18px 0 10px;display:flex;align-items:end;justify-content:space-between;gap:12px;
    }
    .section-head h2{margin:0;font-size:17px}
    .section-head p{margin:0;color:var(--muted);font-size:12px}
    .companies{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;
    }
    .company{
      background:#fff;border:1px solid var(--line);border-radius:20px;padding:10px;
      box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
      min-height:102px;
    }
    .company.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .company img,.company .logo{
      width:48px;height:48px;border-radius:16px;object-fit:cover;background:#edf2f7;
      display:grid;place-items:center;font-weight:800;color:var(--primary);
    }
    .company .name{font-size:12px;font-weight:700;text-align:center;line-height:1.35}
    .company .count{font-size:11px;color:var(--muted)}
    .products-toolbar{
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
      margin-top:12px;
    }
    .products-toolbar .pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .catalog{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-top:12px;
    }
    .card{
      background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);
      display:flex;flex-direction:column;min-height:100%;
    }
    .card .img{
      aspect-ratio:1/1;background:#eef3fb;position:relative;overflow:hidden;
    }
    .card .img img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .badge{
      position:absolute;top:10px;left:10px;background:rgba(16,32,51,.78);color:#fff;
      padding:6px 10px;border-radius:999px;font-size:11px;backdrop-filter:blur(6px)
    }
    .card .body{padding:12px;display:flex;flex-direction:column;gap:10px;flex:1}
    .card .title{font-weight:800;font-size:14px;line-height:1.5;min-height:42px}
    .subline{font-size:12px;color:var(--muted);line-height:1.5}
    .unit-tabs{display:flex;gap:6px;flex-wrap:wrap}
    .unit-tab{
      border:1px solid var(--line);background:#f8fbff;border-radius:999px;padding:7px 10px;
      font-size:12px;cursor:pointer;min-width:58px;text-align:center;
    }
    .unit-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .price-box{
      display:flex;flex-direction:column;gap:2px;align-items:flex-start;
      border-top:1px dashed var(--line);padding-top:8px;
    }
    .old-price{font-size:12px;color:var(--muted);text-decoration:line-through;min-height:16px}
    .new-price{font-size:20px;font-weight:900;color:#0f172a;line-height:1.2}
    .qty-row{display:flex;gap:8px;align-items:center}
    .stepper{
      display:flex;align-items:center;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;
      min-width:106px;
    }
    .stepper button{
      width:36px;height:36px;cursor:pointer;font-size:18px;background:#f8fbff;color:var(--text)
    }
    .stepper span{min-width:34px;text-align:center;font-weight:800}
    .add-btn{
      width:100%;height:56px;border-radius:18px;font-size:16px;font-weight:900;
      background:var(--primary);color:#fff;cursor:pointer;box-shadow:0 10px 24px rgba(31,58,95,.22);
      transition:.2s ease transform,.2s ease filter,.2s ease background;
    }
    .add-btn.remove{background:var(--bad)}
    .add-btn:active{transform:scale(.98)}
    .card.flash{border-color:#f7c948}
    .card.offer{border-color:#9e77ed}
    .card.pulse{animation:pulse .45s ease}
    @keyframes pulse{
      0%{transform:scale(1)}
      45%{transform:scale(1.015)}
      100%{transform:scale(1)}
    }
    .drawer{
      position:fixed;inset:0 auto 0 0;z-index:60;width:min(420px,100%);
      background:#fff;border-left:1px solid var(--line);box-shadow:-16px 0 40px rgba(0,0,0,.10);
      transform:translateX(-102%);transition:.24s ease transform;display:flex;flex-direction:column;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-head{
      padding:16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;
    }
    .drawer-head h3{margin:0;font-size:17px}
    .drawer-body{padding:14px;overflow:auto;flex:1}
    .cart-item{
      border:1px solid var(--line);border-radius:18px;padding:12px;margin-bottom:10px;background:#fbfdff
    }
    .cart-item .row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .cart-item .name{font-weight:800;font-size:13px;line-height:1.45}
    .cart-item .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .cart-item .foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px}
    .cart-footer{
      padding:14px;border-top:1px solid var(--line);background:#fff;position:sticky;bottom:0
    }
    .form-grid{display:grid;gap:10px}
    .input{
      width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;outline:0;
    }
    .submit-btn{
      width:100%;height:56px;border-radius:18px;background:var(--good);color:#fff;font-weight:900;font-size:16px;cursor:pointer;
    }
    .muted{color:var(--muted)}
    .overlay{
      position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:70;display:none;align-items:center;justify-content:center;padding:16px;
    }
    .overlay.show{display:flex}
    .modal{
      width:min(520px,100%);background:#fff;border-radius:24px;box-shadow:var(--shadow);overflow:hidden;
    }
    .modal .head{
      padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .modal .body{padding:16px}
    .modal h3{margin:0;font-size:18px}
    .tiers-grid{
      display:grid;gap:10px;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    }
    .tier-card{
      border:1px solid var(--line);border-radius:22px;padding:14px;background:#fff;box-shadow:var(--shadow);cursor:pointer;
    }
    .tier-card.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(31,58,95,.08),var(--shadow)}
    .tier-card .title{font-weight:900}
    .tier-card .min{font-size:13px;color:var(--muted);margin-top:6px}
    .empty{
      padding:24px;border:1px dashed var(--line);border-radius:22px;background:#fff;text-align:center;color:var(--muted)
    }
    .toast-zone{
      position:fixed;left:14px;bottom:104px;z-index:80;display:flex;flex-direction:column;gap:8px;
      max-width:min(360px,calc(100vw - 28px));
    }
    .toast{
      background:#0f172a;color:#fff;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);font-size:13px;line-height:1.55;
      opacity:0;transform:translateY(10px);animation:toastIn .22s ease forwards;
    }
    .toast.good{background:#146c43}
    .toast.warn{background:#8a5a00}
    .toast.bad{background:#7f1d1d}
    .toast.info{background:#173a84}
    .debug{
      margin-top:10px;padding:10px 12px;border-radius:16px;border:1px dashed var(--line);background:#fbfdff;color:#334155;font-size:12px;line-height:1.6;white-space:pre-wrap;
    }
    @keyframes toastIn{to{opacity:1;transform:translateY(0)}}
    .bottom-bar{
      position:fixed;left:0;right:0;bottom:0;z-index:55;
      background:rgba(255,255,255,.88);backdrop-filter:blur(12px);
      border-top:1px solid rgba(229,234,241,.95);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    }
    .bottom-inner{
      max-width:1280px;margin:0 auto;display:flex;gap:10px;align-items:center;justify-content:space-between;
    }
    .smart-tier{
      flex:1;height:56px;border-radius:18px;background:#fff;border:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 14px;cursor:pointer;
      box-shadow:var(--shadow);
    }
    .smart-tier.ok{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:#16a34a;color:#fff}
    .smart-tier .main{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .smart-tier .sub{font-size:12px;color:inherit;opacity:.82;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .small-btn{
      width:56px;height:56px;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);
      display:grid;place-items:center;cursor:pointer;font-size:18px
    }
    .hidden{display:none !important}
    .skeleton{
      position:relative;overflow:hidden;background:#eef3fb;border-radius:24px;
    }
    .skeleton::after{
      content:"";position:absolute;inset:0;transform:translateX(-100%);
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
      animation:shimmer 1.2s infinite;
    }
    @keyframes shimmer{100%{transform:translateX(100%)}}
    .skeleton.card{min-height:360px}
    .skeleton.line{height:16px;border-radius:999px}
    .skeleton.btn{height:56px;border-radius:18px}
    .skeleton.sm{height:40px;border-radius:16px}
    @media (max-width: 900px){
      .hero{grid-template-columns:1fr}
      .grid-3{grid-template-columns:1fr}
      .catalog{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
    }
    @media (max-width: 520px){
      .topbar-inner{padding:12px 12px 10px}
      .page{padding:12px}
      .brand h1{font-size:15px}
      .brand p{font-size:11px}
      .catalog{grid-template-columns:repeat(2,minmax(0,1fr))}
      .companies{grid-template-columns:repeat(3,minmax(0,1fr))}
      .toast-zone{left:10px;right:10px;bottom:108px;max-width:none}
      .drawer{width:100%}
      .new-price{font-size:18px}
      .add-btn{height:52px;font-size:15px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" role="button" onclick="goHome()">
          <div class="brand-badge">A</div>
          <div>
            <h1>Alahram Co</h1>
            <p id="brandSub">نظام بيع ذكي لتجارة الجملة</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="chip-btn ghost" id="repBtn" onclick="openAuthModal()">دخول مندوب</button>
          <button class="icon-btn" onclick="openCart()">🛒 <span id="cartCount">0</span></button>
        </div>
      </div>
    </header>

    <main id="main" class="page">
      <div class="empty">جارٍ تحميل البيانات…</div>
    </main>
  </div>

  <div id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div>
        <h3>السلة</h3>
        <div class="muted" id="cartSummary">0 صنف</div>
      </div>
      <button class="icon-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="drawer-body">
      <div id="cartList"></div>

      <div class="section-head">
        <div>
          <h2>بيانات الطلب</h2>
          <p>يحفظ في الشيت مباشرة عند التأكيد</p>
        </div>
      </div>

      <div class="form-grid">
        <input class="input" id="custName" placeholder="اسم العميل" />
        <input class="input" id="custPhone" placeholder="رقم الهاتف" />
        <textarea class="input" id="custAddress" rows="3" placeholder="العنوان"></textarea>
      </div>
    </div>
    <div class="cart-footer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong>الإجمالي</strong>
        <strong id="cartTotal">0</strong>
      </div>
      <button class="submit-btn" onclick="checkout()">تأكيد الطلب</button>
    </div>
  </div>

  <div id="overlay" class="overlay" onclick="overlayClose(event)">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="head">
        <h3 id="modalTitle">عنوان</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast-zone" id="toastZone"></div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <button class="smart-tier" id="tierBtn" onclick="openTierView()">
        <div style="min-width:0">
          <div class="main" id="tierBtnMain">اختار شريحتك</div>
          <div class="sub" id="tierBtnSub">اضغط هنا لاختيار الشريحة</div>
        </div>
        <div id="tierBtnRight" style="font-weight:900">→</div>
      </button>
      <button class="small-btn" onclick="openView('offers')">🏷️</button>
      <button class="small-btn" onclick="openView('flash')">⚡</button>
    </div>
  </div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbwq10iAV8etL-55n701nYObRkfPYhYZ6m0xubbGcSFXcCzxMF8Itpk4XzgmrLtlq9elSQ/exec';
const UNIT_ORDER = ['carton','dozen','piece'];
const UNIT_LABELS = { carton:'كرتونة', dozen:'دستة', piece:'قطعة' };

const LS = {
  cart: 'alahram_cart_v2',
  tier: 'alahram_tier_v2',
  rep: 'alahram_rep_v2',
  auth: 'alahram_auth_v2',
  units: 'alahram_units_v2',
  search: 'alahram_search_v2'
};

const state = {
  loading: true,
  staticLoaded: false,
  view: 'home',
  search: loadJSON(LS.search, ''),
  searchSuggestions: [],
  company: 'ALL',
  selectedTier: loadJSON(LS.tier, null),
  rep: loadJSON(LS.rep, null),
  auth: loadJSON(LS.auth, null),
  cart: loadJSON(LS.cart, []),
  unitMap: loadJSON(LS.units, {}),
  settings: {},
  tiers: [],
  reps: [],
  companies: [],
  offers: [],
  flashOffers: [],
  products: [],
  productPage: 1,
  productLimit: 20,
  productsHasMore: true,
  productsLoading: false,
  productsQuery: '',
  productsCompany: 'ALL',
  productsMode: 'home',
  debugLastError: '',
  debugLastRaw: '',
  searchTimer: null,
  suppressScrollLoad: false
};

const el = (id) => document.getElementById(id);

function loadJSON(key, fallback){
  try{
    var raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}
function saveJSON(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}
function formatMoney(v){
  var n = Number(v || 0);
  return new Intl.NumberFormat('ar-EG').format(Math.round(n));
}
function normalizeText(v){
  return String(v || '').trim().toLowerCase().replace(/\s+/g,' ');
}
function showToast(msg, type){
  var zone = el('toastZone');
  var node = document.createElement('div');
  node.className = 'toast ' + (type || '');
  node.textContent = msg;
  zone.appendChild(node);
  setTimeout(function(){
    node.style.opacity = '0';
    node.style.transform = 'translateY(10px)';
    setTimeout(function(){ if(node && node.parentNode) node.parentNode.removeChild(node); }, 260);
  }, 2500);
}
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, function(s){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'" :'&#39;'}[s]); });
}
function escapeAttr(str){
  return escapeHtml(str).replace(/`/g,'&#96;');
}
function clamp(n, min, max){
  n = parseInt(n, 10);
  if (isNaN(n)) n = min;
  if (n < min) n = min;
  if (n > max) n = max;
  return n;
}
function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

async function requestJSON(endpoint, params, method, body){
  params = params || {};
  method = method || 'GET';
  var qs = new URLSearchParams();
  qs.set('endpoint', endpoint);
  Object.keys(params).forEach(function(k){
    if (params[k] !== undefined && params[k] !== null && String(params[k]).length) qs.set(k, String(params[k]));
  });
  var url = API_BASE + '?' + qs.toString();
  var opts = { method: method, headers: {} };
  if (body !== undefined && body !== null){
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  var res = await fetch(url, opts);
  var text = await res.text();
  state.debugLastRaw = text;
  if (!res.ok){
    throw new Error('HTTP ' + res.status + ' from ' + endpoint + ' :: ' + text.slice(0, 220));
  }
  var json;
  try{
    json = JSON.parse(text);
  }catch(e){
    throw new Error('Non-JSON response from ' + endpoint + ' :: ' + text.slice(0, 220));
  }
  if (!json || json.success === false){
    throw new Error((json && json.error) ? json.error : ('API error from ' + endpoint));
  }
  return json.data;
}

function currentTierKey(){
  if (!state.selectedTier) return '';
  return state.selectedTier.key || state.selectedTier.tier_name || state.selectedTier.visible_label || '';
}
function loadStateAfterAuth(){
  syncAuthUi();

function productBasePrice(product, unit){
  return Number((product.base_prices && product.base_prices[unit]) || 0);
}
function productTierPrice(product, unit){
  if (!state.selectedTier) return 0;
  var tkey = currentTierKey();
  var tp = product.tier_prices || {};
  if (tp[tkey] && Number(tp[tkey][unit] || 0) > 0) return Number(tp[tkey][unit]);
  return 0;
}
function productPrice(product, unit){
  var tierPrice = productTierPrice(product, unit);
  if (tierPrice > 0) return tierPrice;
  return productBasePrice(product, unit);
}
function availableUnits(product){
  var list = [];
  UNIT_ORDER.forEach(function(unit){
    var base = productBasePrice(product, unit);
    var tier = productTierPrice(product, unit);
    if (base > 0 || tier > 0) list.push({ unit: unit, label: UNIT_LABELS[unit] });
  });
  return list.length ? list : [{ unit:'carton', label:'كرتونة' }];
}
function selectedUnit(productId, defaultUnit){
  return state.unitMap[String(productId)] || defaultUnit || 'carton';
}
function setSelectedUnit(productId, unit){
  state.unitMap[String(productId)] = unit;
  saveState();
  renderCurrentView();
}
function cartKey(productId, unit){ return String(productId) + '::' + String(unit); }
function findCartItem(productId, unit){
  return state.cart.find(function(x){ return x.id === String(productId) && x.unit === String(unit) && x.source === 'product'; });
}
function offerCartKey(id, source){ return source + '::' + String(id); }
function findOfferCartItem(id, source){
  return state.cart.find(function(x){ return x.id === String(id) && x.source === source; });
}
function cartSubtotalProducts(){
  var sum = 0;
  state.cart.forEach(function(item){
    if (item.source !== 'product') return;
    var p = state.products.find(function(x){ return String(x.id) === String(item.id); });
    if (!p) return;
    sum += Number(productPrice(p, item.unit)) * Number(item.qty || 0);
  });
  return sum;
}
function cartSubtotalOffers(){
  var sum = 0;
  state.cart.forEach(function(item){
    if (item.source === 'product') return;
    sum += Number(item.price || 0) * Number(item.qty || 0);
  });
  return sum;
}
function cartTotal(){
  return cartSubtotalProducts() + cartSubtotalOffers();
}
function cartCount(){
  return state.cart.reduce(function(sum, x){ return sum + Number(x.qty || 0); }, 0);
}
function companyInitials(name){
  var parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'A';
  return parts.slice(0,2).map(function(p){ return p[0]; }).join('').toUpperCase();
}

async function bootstrap(){
  state.loading = true;
  renderShell();
  showMainSkeleton();

  try{
    // Sequential loading only (no Promise.all)
    var settingsData = await requestJSON('api/settings');
    state.settings = settingsData.settings || {};
    renderShell();

    var tiersData = await requestJSON('api/tiers');
    state.tiers = tiersData.tiers || [];
    renderShell();

    var repsData = await requestJSON('api/reps');
    state.reps = repsData.reps || [];
    renderShell();

    var offersData = await requestJSON('api/offers');
    state.offers = offersData.items || [];
    renderShell();

    var flashData = await requestJSON('api/flash_offers');
    state.flashOffers = flashData.items || [];
    renderShell();

    var companiesData = await requestJSON('api/companies');
    state.companies = companiesData.items || [];
    renderShell();

    if (state.auth && state.auth.token){
      try{
        var valid = await requestJSON('api/auth', { token: state.auth.token }, 'GET');
        if (!valid.valid){
          state.auth = null;
          showToast('انتهت الجلسة، سجل الدخول مرة أخرى', 'warn');
          saveState();
        }
      }catch(err){
        state.auth = null;
        showToast('تعذر التحقق من الجلسة', 'warn');
      }
    }

    syncAuthUi();
    updateFooterTier();

    // initial products
    state.productsQuery = '';
    state.productsCompany = 'ALL';
    state.productsMode = 'home';
    await loadProducts(true);

    state.loading = false;
    renderCurrentView();
    attachScrollLoader();

    if (!state.selectedTier) {
      var welcome = state.settings.tier_welcome || 'اختار شريحتك';
      showToast(welcome, 'good');
    }
  }catch(err){
    state.loading = false;
    state.debugLastError = String(err && err.message ? err.message : err);
    renderError(err);
  }
}

async function loadProducts(reset){
  if (reset){
    state.productPage = 1;
    state.products = [];
    state.productsHasMore = true;
  }
  if (state.productsLoading || !state.productsHasMore) return;
  state.productsLoading = true;
  renderProductsSkeletonIfNeeded();

  try{
    var params = {
      page: state.productPage,
      limit: state.productLimit
    };
    if (state.productsQuery && state.productsQuery.trim().length) params.q = state.productsQuery.trim();
    if (state.productsCompany && state.productsCompany !== 'ALL') params.company = state.productsCompany;

    var data = await requestJSON('api/products', params, 'GET');
    var items = data.items || [];
    if (reset) state.products = items;
    else state.products = state.products.concat(items);
    state.productsHasMore = !!(data.pagination && data.pagination.has_more);
    state.productPage = (data.pagination && data.pagination.page ? data.pagination.page : state.productPage) + 1;
  }catch(err){
    state.debugLastError = String(err && err.message ? err.message : err);
    showToast('فشل تحميل المنتجات', 'bad');
    if (!state.products.length) state.products = [];
    state.productsHasMore = false;
  }finally{
    state.productsLoading = false;
    saveState();
    renderCurrentView();
  }
}

function attachScrollLoader(){
  window.addEventListener('scroll', function(){
    if (state.suppressScrollLoad) return;
    if (!(state.view === 'home' || state.view === 'products' || state.view === 'companies')) return;
    if (!state.productsHasMore || state.productsLoading) return;
    if ((window.innerHeight + window.scrollY) < (document.body.offsetHeight - 600)) return;
    loadProducts(false);
  }, { passive: true });
}

function renderProductCard(p){
  var units = availableUnits(p);
  var unit = selectedUnit(p.id, units[0].unit);
  if (!units.find(function(u){ return u.unit === unit; })) unit = units[0].unit;
  var base = productBasePrice(p, unit);
  var current = productPrice(p, unit);
  var inCart = !!findCartItem(p.id, unit);
  var qty = inCart ? findCartItem(p.id, unit).qty : 1;
  var oldPrice = (state.selectedTier && current !== base) ? `<div class="old-price">${formatMoney(base)} ج.م</div>` : '<div class="old-price">&nbsp;</div>';

  return `
    <article class="card">
      <div class="img">
        <img src="${escapeAttr(p.image || fallbackImage())}" alt="${escapeAttr(p.name || '')}" loading="lazy" />
      </div>
      <div class="body">
        <div class="title">${escapeHtml(p.name || '')}</div>
        <div class="subline">كود: ${escapeHtml(p.id || '')}</div>

        <div class="unit-tabs">
          ${units.map(function(u){
            return `<button class="unit-tab ${u.unit === unit ? 'active' : ''}" onclick='setSelectedUnit(${JSON.stringify(p.id)}, ${JSON.stringify(u.unit)})'>${u.label}</button>`;
          }).join('')}
        </div>

        <div class="price-box">
          ${oldPrice}
          <div class="new-price">${formatMoney(current)} ج.م</div>
        </div>

        <div class="qty-row">
          <div class="stepper">
            <button onclick='changeQty(${JSON.stringify(p.id)}, ${JSON.stringify(unit)}, -1)'>−</button>
            <span>${qty}</span>
            <button onclick='changeQty(${JSON.stringify(p.id)}, ${JSON.stringify(unit)}, 1)'>+</button>
          </div>
          <button class="add-btn ${inCart ? 'remove' : ''}" onclick='toggleProductCart(${JSON.stringify(p.id)}, ${JSON.stringify(unit)})'>${inCart ? 'إزالة' : 'إضافة للسلة'}</button>
        </div>
      </div>
    </article>
  `;
}

        <img src="${escapeAttr(o.image || fallbackImage())}" alt="${escapeAttr(o.name || '')}" loading="lazy" />

function updateCartUi(){
  el('cartCount').textContent = String(cartCount());
  el('cartSummary').textContent = cartCount() + ' قطعة / ' + state.cart.length + ' أصناف';
  el('cartTotal').textContent = formatMoney(cartTotal()) + ' ج.م';
  var list = el('cartList');
  if (!list) return;

  if (!state.cart.length){
    list.innerHTML = '<div class="empty">السلة فارغة الآن.</div>';
    return;
  }

  list.innerHTML = state.cart.map(function(item, idx){
    if (item.source === 'product'){
      var p = state.products.find(function(x){ return String(x.id) === String(item.id); });
      var price = p ? productPrice(p, item.unit) : Number(item.price || 0);
      var total = price * Number(item.qty || 0);
      return `
        <div class="cart-item">
          <div class="row">
            <div style="min-width:0">
              <div class="name">${escapeHtml(item.name || '')}</div>
              <div class="meta">${escapeHtml(item.company || '')} • ${escapeHtml(UNIT_LABELS[item.unit] || item.unit)} • ${formatMoney(price)} ج.م</div>
            </div>
            <button class="icon-btn" onclick="removeCartIndex(${idx})">✕</button>
          </div>
          <div class="foot">
            <div class="stepper">
              <button onclick="cartStep(${idx}, -1)">−</button>
              <span>${item.qty}</span>
              <button onclick="cartStep(${idx}, 1)">+</button>
            </div>
            <strong>${formatMoney(total)} ج.م</strong>
          </div>
        </div>
      `;
    }
    var total2 = Number(item.price || 0) * Number(item.qty || 0);
    return `
      <div class="cart-item">
        <div class="row">
          <div style="min-width:0">
            <div class="name">${escapeHtml(item.name || '')}</div>
            <div class="meta">${escapeHtml(item.source === 'flash' ? 'عرض الساعة' : 'صفقة اليوم')} • ${formatMoney(item.price || 0)} ج.م</div>
          </div>
          <button class="icon-btn" onclick="removeCartIndex(${idx})">✕</button>
        </div>
        <div class="foot">
          <div class="stepper">
            <button onclick="cartStep(${idx}, -1)">−</button>
            <span>${item.qty}</span>
            <button onclick="cartStep(${idx}, 1)">+</button>
          </div>
          <strong>${formatMoney(total2)} ج.م</strong>
        </div>
      </div>
    `;
  }).join('');
  updateFooterTier();
}

function toggleProductCart(productId, unit){
  var p = state.products.find(function(x){ return String(x.id) === String(productId); });
  if (!p) return;
  var item = findCartItem(productId, unit);
  if (item){
    removeProductFromCart(productId, unit);
  }else{
    addProductToCart(p, unit, 1);
  }
}
function addProductToCart(product, unit, qty){
  var item = findCartItem(product.id, unit);
  if (item){
    item.qty += Number(qty || 1);
  }else{
    state.cart.push({
      id: String(product.id),
      source: 'product',
      unit: String(unit),
      qty: Number(qty || 1),
      name: product.name || '',
      company: product.company || ''
    });
  }
  saveState();
  pulseCardById(product.id);
  showToast('تمت الإضافة للسلة', 'good');
  updateCartUi();
  renderCurrentView();
}
function removeProductFromCart(productId, unit){
  state.cart = state.cart.filter(function(x){
    return !(x.source === 'product' && String(x.id) === String(productId) && String(x.unit) === String(unit));
  });
  saveState();
  showToast('تمت الإزالة من السلة', 'bad');
  updateCartUi();
  renderCurrentView();
}
function changeQty(productId, unit, delta){
  var item = findCartItem(productId, unit);
  var p = state.products.find(function(x){ return String(x.id) === String(productId); });
  if (!p) return;
  if (!item){
    if (delta > 0) addProductToCart(p, unit, 1);
    return;
  }
  item.qty = Math.max(0, Number(item.qty || 0) + Number(delta || 0));
  if (item.qty <= 0){
    removeProductFromCart(productId, unit);
  }else{
    saveState();
    updateCartUi();
    renderCurrentView();
  }
}
function pulseCardById(productId){
  var cards = Array.from(document.querySelectorAll('.card'));
  var match = cards.find(function(card){ return card.innerText.indexOf(String(productId)) >= 0; });
  if (!match) return;
  match.classList.remove('pulse');
  void match.offsetWidth;
  match.classList.add('pulse');
}

function toggleOfferCart(id, source, price, name){
  var item = findOfferCartItem(id, source);
  if (item){
    state.cart = state.cart.filter(function(x){ return !(x.source === source && String(x.id) === String(id)); });
    saveState();
    showToast('تمت الإزالة', 'bad');
    updateCartUi();
    renderCurrentView();
    return;
  }
  state.cart.push({
    id: String(id),
    source: source,
    unit: source,
    qty: 1,
    price: Number(price || 0),
    name: String(name || ''),
    company: source === 'flash' ? 'عرض الساعة' : 'صفقة اليوم'
  });
  saveState();
  showToast('العرض ده مش هيتحسب ضمن الشريحة', 'warn');
  updateCartUi();
  renderCurrentView();
}

function removeCartIndex(idx){
  state.cart.splice(idx, 1);
  saveState();
  updateCartUi();
  renderCurrentView();
}
function cartStep(idx, delta){
  if (!state.cart[idx]) return;
  state.cart[idx].qty = Math.max(0, Number(state.cart[idx].qty || 0) + Number(delta || 0));
  if (state.cart[idx].qty <= 0) state.cart.splice(idx, 1);
  saveState();
  updateCartUi();
  renderCurrentView();
}

async function checkout(){
  if (!state.cart.length){
    showToast('السلة فارغة', 'warn');
    return;
  }
  var customerName = (el('custName') && el('custName').value || '').trim();
  var phone = (el('custPhone') && el('custPhone').value || '').trim();
  var address = (el('custAddress') && el('custAddress').value || '').trim();
  if (!customerName || !phone){
    showToast('اسم العميل ورقم الهاتف مطلوبان', 'bad');
    return;
  }
  try{
    var body = {
      customer_name: customerName,
      phone: phone,
      address: address,
      total: cartTotal(),
      rep_id: state.auth && state.auth.session && state.auth.session.mode === 'rep' ? state.auth.session.rep_id : '',
      tier: state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name || '') : '',
      status: 'pending',
      items: state.cart.map(function(x){
        if (x.source === 'product'){
          var p = state.products.find(function(p){ return String(p.id) === String(x.id); });
          var price = p ? productPrice(p, x.unit) : 0;
          return { product_id: x.id, name: x.name, unit: x.unit, qty: x.qty, price: price, source: 'product' };
        }
        return { product_id: x.id, name: x.name, unit: x.unit, qty: x.qty, price: x.price, source: x.source };
      })
    };
    var data = await requestJSON('api/orders', {}, 'POST', body);
    showToast('تم حفظ الطلب #' + data.order_id, 'good');
    state.cart = [];
    saveState();
    closeCart();
    updateCartUi();
    renderCurrentView();
  }catch(err){
    showToast(err.message || 'فشل حفظ الطلب', 'bad');
  }
}

function countdownText(endAt){
  if (!endAt) return '';
  var target = new Date(endAt);
  if (isNaN(target.getTime())) return '';
  var diff = Math.max(0, target.getTime() - Date.now());
  var h = Math.floor(diff / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  var s = Math.floor((diff % 60000) / 1000);
  return 'ينتهي خلال ' + pad2(h) + ':' + pad2(m) + ':' + pad2(s);
}
function pad2(n){ return String(n).padStart(2, '0'); }
