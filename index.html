<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#C79B18">
<style>
:root{--bg:#F8F9FA;--card:rgba(255,255,255,.9);--line:rgba(10,37,64,.08);--text:#0A2540;--muted:#5C6A7A;--gold:#C79B18;--gold2:#E3C56B;--green:#1F8B4C;--blue:#173A84;--danger:#C0392B}
*{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:Cairo,system-ui,sans-serif;background:linear-gradient(180deg,#FBF8F1 0%,#F3F6FA 100%);color:var(--text);-webkit-tap-highlight-color:transparent} a{text-decoration:none;color:inherit} button,input,select{font:inherit} img{max-width:100%;display:block}
#app{max-width:980px;margin:0 auto;padding:10px 10px 110px}
.header{position:sticky;top:0;z-index:3000;background:rgba(255,255,255,.82);backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--line);border-radius:0 0 22px 22px;box-shadow:0 10px 28px rgba(10,37,64,.08)}
body.subpage-mode .header{display:none!important}
.brand{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 12px 8px}.brandLogo{width:44px;height:44px;border-radius:14px;background:#fff;border:1px solid var(--line);box-shadow:0 8px 18px rgba(0,0,0,.08)}.brandName{font-size:18px;font-weight:900;line-height:1.2}
.topActions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px 10px}.topBtn{min-height:48px;border:0;border-radius:16px;font-weight:900;font-size:12px;padding:8px 10px;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 18px rgba(10,37,64,.08)}.topBtn.tier{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540}.topBtn.deal{background:linear-gradient(135deg,#1F8B4C,#3BA96A);color:#fff}.topBtn.flash{background:linear-gradient(135deg,#173A84,#2f5fb8);color:#fff}
.searchBox{margin:0 12px 10px;padding:8px;border-radius:18px;background:rgba(255,255,255,.9);border:1px solid var(--line);box-shadow:0 10px 24px rgba(10,37,64,.06)}.searchRow{display:grid;grid-template-columns:1fr 82px;gap:8px}.searchInput{width:100%;height:40px;border-radius:14px;border:1px solid rgba(10,37,64,.12);padding:0 12px;outline:none}.searchInput:focus{border-color:rgba(199,155,24,.9);box-shadow:0 0 0 3px rgba(199,155,24,.14)}.clearBtn{height:40px;border:0;border-radius:14px;background:#6B7280;color:#fff;font-weight:900}
.pageCard,.sectionCard,.brandCard,.productCard,.tierCard,.cartCard,.emptyCard{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 22px rgba(10,37,64,.05)}.pageCard,.sectionCard,.emptyCard{padding:10px;margin-bottom:10px}.sectionTitle{margin:0 0 6px;font-size:15px;font-weight:900;color:#173A84}.sectionSub{margin:0;color:var(--muted);font-size:12px;line-height:1.6}.grid{display:grid;gap:8px}.brandGrid,.tierGrid,.productGrid{grid-template-columns:repeat(2,minmax(0,1fr))}@media(min-width:700px){.brandGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.productGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(min-width:980px){.productGrid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.brandCard{padding:8px;min-height:96px;display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;text-align:center}.brandImg,.productImg{width:100%;height:110px;object-fit:contain;background:#F4F7FA;border-radius:16px;box-shadow:inset 0 0 0 1px rgba(10,37,64,.04)}.brandTitle{font-size:13px;font-weight:900;line-height:1.3}.brandMeta{font-size:11px;color:var(--muted)}
.productCard{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:260px}.productTitle{font-size:12px;font-weight:900;line-height:1.35;min-height:32px}.productMeta{font-size:11px;color:var(--muted);line-height:1.4}.priceLine{color:#C79B18;font-size:13px;font-weight:900}.badge{display:inline-flex;align-items:center;justify-content:center;width:max-content;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:#EEF2FF;color:#173A84}.badge.success{background:#E8F7EE;color:#1F8B4C}.badge.warn{background:#FFF0F0;color:#C0392B}.badge.gold{background:#FFF7CF;color:#5A4300}
.unitSelect,.qtyInput,.formInput{width:100%;height:36px;border-radius:12px;border:1px solid rgba(10,37,64,.12);padding:0 10px;background:#fff;outline:none}.unitSelect:focus,.qtyInput:focus,.formInput:focus{border-color:rgba(199,155,24,.9);box-shadow:0 0 0 3px rgba(199,155,24,.14)}.qtyRow{display:grid;grid-template-columns:28px 1fr 28px;gap:4px;align-items:center}.qtyBtn{width:28px;height:28px;border:0;border-radius:8px;background:#EEF2F7;color:var(--text);font-weight:900}.buyBtn,.primaryBtn,.secondaryBtn,.dangerBtn{min-height:38px;border:0;border-radius:12px;font-weight:900}.buyBtn,.primaryBtn{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540}.secondaryBtn{background:#eff3f8;color:#20314a}.dangerBtn{background:linear-gradient(135deg,#ff7b72,#c0392b);color:#fff}
.pageTop{padding:10px;border-radius:18px;background:rgba(255,255,255,.9);border:1px solid var(--line);box-shadow:0 8px 18px rgba(10,37,64,.05)}.pageTitle{margin:0 0 4px;font-size:16px;font-weight:900}.pageDesc{margin:0;font-size:12px;color:var(--muted);line-height:1.6}
.contactsRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.contactBtn{min-height:40px;border:0;border-radius:14px;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(10,37,64,.05)}.contactBtn.phone{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540}.contactBtn.wa{background:linear-gradient(135deg,#1F8B4C,#3BA96A);color:#fff}.contactBtn.fb{background:linear-gradient(135deg,#173A84,#2f5fb8);color:#fff}
.footerDock{position:fixed;left:10px;right:10px;bottom:10px;z-index:2400;display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:8px;padding:8px;background:rgba(248,249,250,.84);backdrop-filter:blur(18px) saturate(180%);border:1px solid var(--line);border-radius:22px;box-shadow:0 16px 38px rgba(10,37,64,.12)}.footerBtn{min-height:48px;border:0;border-radius:16px;font-weight:900;padding:8px 10px}.footerTierBtn{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540;display:flex;flex-direction:column;justify-content:center;align-items:center;line-height:1.05;text-align:center}.footerTierBtn.active{background:linear-gradient(135deg,#1F8B4C,#3BA96A);color:#fff}.footerTierBtn .smallLine{font-size:9px;font-weight:800;opacity:.96}.footerTierBtn .amount{font-size:13px}.footerTotal{background:#fff;border:1px solid var(--line);color:#0A2540;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900}.footerCheckout{background:linear-gradient(135deg,#1F8B4C,#3BA96A);color:#fff}
.subpageFooter{margin-top:10px}.backBtn{width:100%;min-height:42px;border:0;border-radius:14px;background:#eff3f8;color:#20314a;font-weight:900}.emptyState{padding:16px;text-align:center;color:var(--muted);line-height:1.8}
.modal{position:fixed;inset:0;z-index:5000;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}.modal.show{display:flex}.modalCard{width:min(420px,100%);background:#fff;border-radius:22px;border:1px solid #ead08a;box-shadow:0 24px 60px rgba(0,0,0,.2);padding:16px}.modalTitle{font-size:20px;font-weight:900;margin:0 0 6px;color:#5A4300}.modalSub{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.7}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.modalActions button{min-height:44px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:6000;display:none;padding:10px 14px;border-radius:999px;color:#fff;background:#1F8B4C;box-shadow:0 16px 30px rgba(0,0,0,.16);font-size:14px;font-weight:900}.toast.error{background:#C0392B}.toast.info{background:#173A84}
body.subpage-mode #app{padding-top:10px}
</style>
</head>
<body>
<div class="header">
  <div class="brand"><div id="brandLogo" class="brandLogo"></div><div class="brandName">الأهرام للتجارة والتوزيع</div></div>
  <div class="topActions">
    <button id="btnTierTop" class="topBtn tier" type="button">اختار شريحتك</button>
    <button id="btnDealsTop" class="topBtn deal" type="button">صفقة اليوم</button>
    <button id="btnFlashTop" class="topBtn flash" type="button">عرض الساعة</button>
  </div>
  <div class="searchBox"><div class="searchRow"><input id="searchInput" class="searchInput" placeholder="ابحث داخل الشركة أو الكود"><button id="btnSearchClear" class="clearBtn" type="button">مسح</button></div></div>
</div>
<div id="app"><div class="emptyState">جارٍ التحميل...</div></div>
<div class="footerDock">
  <button id="footerTierBtn" class="footerBtn footerTierBtn" type="button"><span class="smallLine">اختار شريحتك</span><span class="amount">—</span></button>
  <div id="footerTotal" class="footerBtn footerTotal">0</div>
  <button id="footerCheckoutBtn" class="footerBtn footerCheckout" type="button">إتمام الشراء</button>
</div>
<div id="repModal" class="modal"><div class="modalCard"><div class="modalTitle">دخول المندوب</div><div class="modalSub">أدخل كود المندوب والرقم السري المطابقين لبيانات Reps في الشيت.</div><input id="repCode" class="formInput" placeholder="كود المندوب"><div style="height:8px"></div><input id="repPassword" class="formInput" type="password" placeholder="الرقم السري"><div style="height:8px"></div><div class="modalActions"><button id="btnRepSubmit" class="primaryBtn" type="button">دخول</button><button id="btnRepCancel" class="secondaryBtn" type="button">إلغاء</button></div></div></div>
<div id="tierModal" class="modal"><div class="modalCard"><div class="modalTitle">الشريحة مقفلة</div><div id="tierModalText" class="modalSub">أدخل الرقم السري للوصول إلى هذه الشريحة.</div><input id="tierPassword" class="formInput" type="password" placeholder="الرقم السري للشريحة"><div style="height:8px"></div><div class="modalActions"><button id="btnTierSubmit" class="primaryBtn" type="button">دخول</button><button id="btnTierCancel" class="secondaryBtn" type="button">إلغاء</button></div></div></div>
<div id="toast" class="toast"></div>
<script>
const DATA={apiUrl:'https://script.google.com/macros/s/AKfycbyGbDZHun0PVFQerlieO76NH8QSvFGfEvwRdRx8hPMKtJlbta-aP1ssSAQSfW8MhRW3cA/exec'};
const LS={cart:'alahram_cart_v4',tier:'alahram_selected_tier_v4',tierUnlocks:'alahram_tier_unlocks_v4',rep:'alahram_rep_session_v4',customer:'alahram_customer_v4',page:'alahram_page_v4',search:'alahram_search_v4',history:'alahram_history_v4'};
const state={loading:true,page:'home',history:['home'],search:'',products:[],tiers:[],reps:[],flashOffers:[],companies:[],selectedTier:null,tierUnlocks:{},repSession:null,customer:{name:'',phone:'',address:''},currentCompany:'',tierModalRow:null,cartMap:{}};
const els={app:document.getElementById('app'),toast:document.getElementById('toast'),brandLogo:document.getElementById('brandLogo'),searchInput:document.getElementById('searchInput'),btnTierTop:document.getElementById('btnTierTop'),btnDealsTop:document.getElementById('btnDealsTop'),btnFlashTop:document.getElementById('btnFlashTop'),btnSearchClear:document.getElementById('btnSearchClear'),footerTierBtn:document.getElementById('footerTierBtn'),footerTotal:document.getElementById('footerTotal'),footerCheckoutBtn:document.getElementById('footerCheckoutBtn'),repModal:document.getElementById('repModal'),tierModal:document.getElementById('tierModal'),repCode:document.getElementById('repCode'),repPassword:document.getElementById('repPassword'),btnRepSubmit:document.getElementById('btnRepSubmit'),btnRepCancel:document.getElementById('btnRepCancel'),tierPassword:document.getElementById('tierPassword'),btnTierSubmit:document.getElementById('btnTierSubmit'),btnTierCancel:document.getElementById('btnTierCancel'),tierModalText:document.getElementById('tierModalText')};
function loadJSON(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch{return f}} function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}} function clean(v){return (v??'').toString().trim()} function lower(v){return clean(v).toLowerCase()} function norm(v){return clean(v).normalize('NFKD').replace(/[\u064B-\u065F\u0670\u0640]/g,'').replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/ة/g,'ه').toLowerCase().replace(/[^\u0600-\u06FF\w ]+/g,' ').replace(/\s+/g,' ').trim()} function compact(v){return norm(v).replace(/\s+/g,'')} function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')} function num(v){const n=Number(clean(v).replace(/[٬،\s]/g,'').replace(/,/g,''));return Number.isFinite(n)?n:0} function money(v){return new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(Math.round(Number(v||0)||0))} function toast(msg,type='ok'){els.toast.textContent=msg;els.toast.className='toast '+(type==='error'?'error':type==='info'?'info':'');els.toast.style.display='block';clearTimeout(window.__t);window.__t=setTimeout(()=>els.toast.style.display='none',1800)}
function rowValue(row,keys,fallback=''){const arr=Array.isArray(keys)?keys:[keys];if(!row||typeof row!=='object')return fallback;const map={};for(const [k,v] of Object.entries(row))map[compact(k)]=v;for(const key of arr){const ck=compact(key);if(ck in map&&clean(map[ck])!=='')return map[ck]}for(const [k,v] of Object.entries(row)){const kk=compact(k);for(const key of arr){const ck=compact(key);if(kk===ck||kk.includes(ck)||ck.includes(kk)){if(clean(v)!=='')return v}}}return fallback}
function asRows(v){if(!v)return[];if(Array.isArray(v))return v.filter(x=>x&&typeof x==='object').map(x=>({...x}));if(typeof v==='object'){if(Array.isArray(v.rows))return asRows(v.rows);if(Array.isArray(v.data))return asRows(v.data);if(Array.isArray(v.items))return asRows(v.items)}return[]}
function productId(r){return clean(rowValue(r,['id','product_id','sku','code','codo'],''))} function productName(r){return clean(rowValue(r,['name','product_name','item_name','title','item'],''))} function productCompany(r){return clean(rowValue(r,['company','company_name','brand','brand_name'],''))} function productImage(r){return clean(rowValue(r,['image','img','photo','picture','image_url','url'],''))} function productStatus(r){const s=lower(rowValue(r,['status','active','state','is_active'],'')); if(!s)return true; return ['1','true','yes','active','فعال','متاح'].includes(s)} function productCode(r){return clean(rowValue(r,['code','codo','product_code','sku'],''))} function unitList(r){const raw=rowValue(r,['units','unit_options','available_units','unit','unit_type'],''); if(Array.isArray(raw)) return raw.map(clean).filter(Boolean); const txt=clean(raw); return txt?txt.split(/[|,،\n/]+/).map(clean).filter(Boolean):[]} function defaultUnit(r){return unitList(r)[0]||'قطعة'} function priceForUnit(r,u){const unit=norm(u); const map={carton:['carton_price','price_carton','price1','wholesale_price','price'],piece:['piece_price','price_piece','price2','price'],box:['box_price','price_box','price'],pack:['pack_price','price_pack','price'],offer:['price_offer','offer_price','offerprice','discount_price']}; const pref=map[unit]||['price','sale_price','unit_price','price1']; for(const k of pref){const val=num(rowValue(r,k,'')); if(val>0)return val} return num(rowValue(r,['price','sale_price','unit_price','amount'],0))} function tierKey(r){return clean(rowValue(r,['tier_id','tier_name','name','id'],''))} function tierLabel(r){return clean(rowValue(r,['visible_label','tier_label','tier_name','name','id'],''))} function tierMin(r){return num(rowValue(r,['tier_min','min','minimum','threshold'],0))} function tierPasswordValue(r){return clean(rowValue(r,['tier_password','password','code','pin'],''))} function tierTerms(r){return clean(rowValue(r,['tier_terms','terms','rules','notes','description'],''))} function tierProtected(r){return !!tierPasswordValue(r)} function repCodeValue(r){return clean(rowValue(r,['repId','rep_id','code','id'],''))} function repPasswordValue(r){return clean(rowValue(r,['repPassword','rep_password','password','pass','pin'],''))} function repActive(r){const s=lower(rowValue(r,['status','active','state','is_active'],'')); if(!s)return true; return ['1','true','yes','active','فعال','متاح'].includes(s)} function offerType(r){return lower(rowValue(r,['type','offer_type','kind','category'],''))}
async function api(action,data={}){const res=await fetch(DATA.apiUrl,{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8'},body:JSON.stringify({action,...data})}); try{return await res.json()}catch{return {success:false,message:'bad response'}}}
function normalizeBootstrap(data){return {products:asRows(data.products||data.Products||[]),tiers:asRows(data.tiers||data.Tiers||[]),reps:asRows(data.reps||data.Reps||[]).filter(repActive),flashOffers:asRows(data.flash_offers||data.flashOffers||data.offers||data.deals||data.Flash_Offers||[])}}
function saveState(){saveJSON(LS.cart,state.cartMap);saveJSON(LS.tier,state.selectedTier);saveJSON(LS.tierUnlocks,state.tierUnlocks);saveJSON(LS.rep,state.repSession);saveJSON(LS.customer,state.customer);saveJSON(LS.page,state.page);saveJSON(LS.search,state.search);saveJSON(LS.history,state.history)}
function setBodyMode(){document.body.classList.toggle('subpage-mode',state.page!=='home')}
function buildCompanies(){const map=new Map(); for(const r of state.products){if(!productStatus(r))continue; const c=productCompany(r); if(!c)continue; if(!map.has(c))map.set(c,{name:c,count:0,image:productImage(r),rows:[]}); const item=map.get(c); item.count++; item.rows.push(r); if(!item.image)item.image=productImage(r)} state.companies=[...map.values()].sort((a,b)=>a.name.localeCompare(b.name,'ar'))}
function applyTierTheme(r){const root=document.documentElement; root.style.setProperty('--gold',rowValue(r,['gold'],'#C79B18')||'#C79B18'); root.style.setProperty('--gold2',rowValue(r,['gold2'],'#E3C56B')||'#E3C56B'); root.style.setProperty('--gold3',rowValue(r,['gold3'],'#8A5A00')||'#8A5A00')}
function resetTheme(){const root=document.documentElement; root.style.setProperty('--gold','#C79B18'); root.style.setProperty('--gold2','#E3C56B'); root.style.setProperty('--gold3','#8A5A00')}
function getCartItems(){return Object.values(state.cartMap||{}).filter(x=>x&&x.qty)} function cartTotal(){return getCartItems().reduce((s,i)=>s+Number(i.price||0)*Number(i.qty||0),0)} function tierRemaining(){return state.selectedTier?Math.max(0,tierMin(state.selectedTier)-cartTotal()):0}
function updateFooter(){if(!state.selectedTier){els.footerTierBtn.classList.remove('active'); els.footerTierBtn.innerHTML='<span class="smallLine">اختار شريحتك</span><span class="amount">—</span>'}else{els.footerTierBtn.classList.add('active'); els.footerTierBtn.innerHTML='<span class="smallLine">متبقي لك لتحقيق الشريحة</span><span class="amount">'+money(tierRemaining())+'</span>'} els.footerTotal.textContent=money(cartTotal())}
function navigate(page,push=true){const prev=state.page||'home'; if(push&&prev!==page) state.history.push(prev); state.page=page; setBodyMode(); saveState(); render()} function backPage(){if(state.history.length>1){state.history.pop(); state.page=state.history[state.history.length-1]||'home'}else state.page='home'; setBodyMode(); saveState(); render()} function goHome(){navigate('home')} function goTiers(){navigate('tiers')} function goCompanies(){navigate('companies')} function goOffers(){navigate('offers')} function goFlash(){navigate('flash')} function goProducts(company){state.currentCompany=company||''; navigate('products')}
function openModal(id){document.getElementById(id).classList.add('show')} function closeModal(id){document.getElementById(id).classList.remove('show')}
function chooseTier(row){if(tierProtected(row)&&!state.tierUnlocks[compact(tierKey(row)||tierLabel(row))]){state.tierModalRow=row; document.getElementById('tierModalText').textContent='أدخل الرقم السري للوصول إلى شريحة '+(tierLabel(row)||tierKey(row)); openModal('tierModal'); setTimeout(()=>els.tierPassword.focus(),50); return} state.selectedTier=row; applyTierTheme(row); saveState(); toast('تم اختيار الشريحة'); closeModal('tierModal'); navigate('companies')}
async function submitTierPassword(){const row=state.tierModalRow; if(!row)return; const pass=clean(els.tierPassword.value); if(pass&&pass===clean(tierPasswordValue(row))){state.tierUnlocks[compact(tierKey(row)||tierLabel(row))]=true; state.selectedTier=row; applyTierTheme(row); saveState(); closeModal('tierModal'); toast('تم فتح الشريحة'); navigate('companies')}else toast('الرقم السري غير صحيح','error')}
async function submitRepLogin(){const code=clean(els.repCode.value), password=clean(els.repPassword.value); if(!code||!password){toast('أدخل كود المندوب والرقم السري','error'); return} try{const res=await api('check_rep',{code,password}); if(res&&res.success){state.repSession=res.data||{code}; saveState(); closeModal('repModal'); toast('تم دخول المندوب'); return} throw new Error(res?.message||'بيانات غير صحيحة')}catch(err){toast(err.message||'تعذر التحقق من المندوب','error')}}

async function bootstrap(){state.loading=true; render(); try{const res=await api('bootstrap'); if(!res||res.success===false) throw new Error(res?.message||'فشل تحميل البيانات'); const data=res.data||res; const x=normalizeBootstrap(data); state.products=x.products; state.tiers=x.tiers; state.reps=x.reps; state.flashOffers=x.flashOffers; buildCompanies(); if(state.selectedTier){const k=compact(tierKey(state.selectedTier)||tierLabel(state.selectedTier)); if(k&&state.selectedTier&&tierProtected(state.selectedTier)&&!state.tierUnlocks[k]) state.selectedTier=null} state.loading=false; setBodyMode(); render()}catch(err){state.loading=false; renderEmpty('تعذر الاتصال بالـ API. '+esc(err.message||err));}}
function renderEmpty(msg){els.app.innerHTML=`<div class="emptyState">${msg}</div>`}
function renderOfferCard(r){const unit=defaultUnit(r); const price=priceForUnit(r, offerType(r)==='flash'?'offer':unit); const key=rowValue(r,['id','product_id','sku','code','codo'],'')||rowValue(r,['name','title'],''); return `<div class="productCard"><div>${productImage(r)?`<img class="productImg" src="${esc(productImage(r))}" alt="${esc(rowValue(r,['name','title','product_name','item_name'],'صنف'))}">`:`<div class="productImg"></div>`}</div><div class="productTitle">${esc(rowValue(r,['name','title','product_name','item_name'],'صنف'))}</div><div class="productMeta">${esc(rowValue(r,['company','brand'],''))}${rowValue(r,['code','sku','codo','product_code'],'')?' • '+esc(rowValue(r,['code','sku','codo','product_code'],'')):''}</div><div class="priceLine">${money(price)}</div><div class="badge gold">${offerType(r)==='flash'?'عرض الساعة':offerType(r)==='deal'?'صفقة اليوم':'عرض'}</div><div class="qtyRow"><button class="qtyBtn" data-dec="${esc(key)}" type="button">-</button><input class="qtyInput" data-qty="${esc(key)}" inputmode="numeric" value="1"><button class="qtyBtn" data-inc="${esc(key)}" type="button">+</button></div><button class="buyBtn" data-buy="${esc(key)}" type="button">شراء</button></div>`}
function renderOffers(type){const list=offerRows(type); const title=type==='flash'?'عرض الساعة':'صفقة اليوم'; els.app.innerHTML=`<div class="pageShell"><div class="pageTop"><h1 class="pageTitle">${title}</h1><p class="pageDesc">البيانات من الشيت فقط، بدون أي بيانات وهمية.</p></div><div class="sectionCard"><div class="grid productGrid">${list.length?list.map(renderOfferCard).join(''):'<div class="emptyState">لا توجد عناصر مطابقة في الشيت لهذا القسم.</div>'}</div></div><div class="subpageFooter"><button class="backBtn" data-back="1" type="button">رجوع للخلف</button></div></div>`}
function renderCompanies(){const companies=filteredCompanies(); const list=state.currentCompany?productsForCompany(state.currentCompany):[]; els.app.innerHTML=`<div class="pageShell"><div class="pageTop"><h1 class="pageTitle">الشركات</h1><p class="pageDesc">${state.selectedTier?`الشريحة الحالية: ${esc(tierLabel(state.selectedTier))}`:'اختر شريحة ثم ادخل على الشركات.'}</p></div>${state.currentCompany?`<div class="sectionCard"><div class="sectionTitle">${esc(state.currentCompany)}</div><div class="sectionSub">${list.length} صنف متاح</div><div style="height:8px"></div><div class="grid productGrid">${list.length?list.map(renderProductCard).join(''):'<div class="emptyState">لا توجد منتجات مطابقة.</div>'}</div></div>`:`<div class="sectionCard"><div class="sectionTitle">عرض شبكي للشركات</div><div class="sectionSub">اضغط على أي شركة لعرض منتجاتها.</div><div style="height:8px"></div><div class="grid brandGrid">${companies.length?companies.map(c=>`<button class="brandCard" data-company="${esc(c.name)}" type="button">${c.image?`<img class="brandImg" src="${esc(c.image)}" alt="${esc(c.name)}">`:`<div class="brandImg"></div>`}<div class="brandTitle">${esc(c.name)}</div><div class="brandMeta">${c.count} صنف</div></button>`).join(''):'<div class="emptyState">لا توجد شركات مطابقة حالياً.</div>'}</div></div>`}<div class="sectionCard"><div class="sectionTitle">التواصل</div><div class="sectionSub">اتصال واتساب وفيس بوك.</div><div style="height:8px"></div><div class="contactsRow"><a class="contactBtn phone" href="tel:01040880002">اتصال</a><a class="contactBtn wa" href="https://wa.me/201040880002" target="_blank" rel="noopener">واتساب</a><a class="contactBtn fb" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">فيس بوك</a></div></div><div class="subpageFooter"><button class="backBtn" data-back="1" type="button">رجوع للخلف</button></div></div>`}
function renderCart(){const items=getCartItems(); els.app.innerHTML=`<div class="pageShell"><div class="pageTop"><h1 class="pageTitle">السلة</h1><p class="pageDesc">راجع الطلب ثم أرسله للـ API.</p></div><div class="sectionCard">${items.length?items.map(item=>`<div class="cartCard" style="padding:10px;margin-bottom:8px"><div class="pageTitle" style="font-size:14px;margin:0 0 4px">${esc(item.name)}</div><div class="sectionSub">${esc(item.company||'')} ${item.unit?' • '+esc(item.unit):''}</div><div class="priceLine">${money(item.price)} × ${item.qty} = ${money(item.price*item.qty)}</div><div class="qtyRow" style="margin-top:6px"><button class="qtyBtn" data-cart-dec="${esc(item.key)}" type="button">-</button><input class="qtyInput" data-cart-qty="${esc(item.key)}" inputmode="numeric" value="${esc(item.qty)}"><button class="qtyBtn" data-cart-inc="${esc(item.key)}" type="button">+</button></div><div style="height:8px"></div><button class="dangerBtn" data-cart-remove="${esc(item.key)}" type="button" style="width:100%">حذف</button></div>`).join(''):'<div class="emptyState">السلة فارغة حالياً.</div>'}</div><div class="sectionCard"><div class="sectionTitle">بيانات العميل</div><div class="grid" style="gap:8px"><input id="custName" class="formInput" placeholder="اسم العميل" value="${esc(state.customer?.name||'')}"><input id="custPhone" class="formInput" placeholder="رقم الهاتف" value="${esc(state.customer?.phone||'')}"><input id="custAddress" class="formInput" placeholder="العنوان" value="${esc(state.customer?.address||'')}"></div></div><div class="sectionCard"><button id="btnSubmitOrder" class="primaryBtn" type="button" style="width:100%;min-height:44px">إرسال الطلب</button></div><div class="subpageFooter"><button class="backBtn" data-back="1" type="button">رجوع للخلف</button></div></div>`}
function bindPageEvents(){document.querySelectorAll('[data-company]').forEach(b=>b.addEventListener('click',()=>goProducts(b.dataset.company))); document.querySelectorAll('[data-tier-key]').forEach(b=>b.addEventListener('click',()=>{const row=state.tiers.find(t=>compact(tierKey(t)||tierLabel(t))===compact(b.dataset.tierKey)); if(row) chooseTier(row)})); document.querySelectorAll('[data-buy]').forEach(b=>b.addEventListener('click',()=>addFromCard(b.dataset.buy,state.page==='offers'||state.page==='flash'))); document.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',()=>changeQty(b.dataset.inc,1))); document.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',()=>changeQty(b.dataset.dec,-1))); document.querySelectorAll('[data-qty]').forEach(i=>i.addEventListener('change',()=>setQty(i.dataset.qty,i.value))); document.querySelectorAll('[data-cart-inc]').forEach(b=>b.addEventListener('click',()=>changeCartQty(b.dataset.cartInc,1))); document.querySelectorAll('[data-cart-dec]').forEach(b=>b.addEventListener('click',()=>changeCartQty(b.dataset.cartDec,-1))); document.querySelectorAll('[data-cart-remove]').forEach(b=>b.addEventListener('click',()=>removeCart(b.dataset.cartRemove))); document.querySelectorAll('[data-cart-qty]').forEach(i=>i.addEventListener('change',()=>setCartQty(i.dataset.cartQty,i.value))); const back=document.querySelector('[data-back="1"]'); if(back) back.addEventListener('click',backPage); const submit=document.getElementById('btnSubmitOrder'); if(submit) submit.addEventListener('click',submitOrder); const cn=document.getElementById('custName'), cp=document.getElementById('custPhone'), ca=document.getElementById('custAddress'); if(cn) cn.addEventListener('input',saveCustomer); if(cp) cp.addEventListener('input',saveCustomer); if(ca) ca.addEventListener('input',saveCustomer); document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>{const a=b.dataset.action; if(a==='tiers')goTiers(); if(a==='offers')goOffers(); if(a==='flash')goFlash(); if(a==='rep')openModal('repModal')}))}
function openModal(id){document.getElementById(id).classList.add('show')} function closeModal(id){document.getElementById(id).classList.remove('show')}
function render(){updateFooter(); els.btnTierTop.textContent=state.selectedTier?tierLabel(state.selectedTier):'اختار شريحتك'; els.searchInput.value=state.search||''; if(state.selectedTier) applyTierTheme(state.selectedTier); else resetTheme(); if(state.loading){renderEmpty('جارٍ تحميل البيانات من الـ API...'); return} if(state.page==='home') renderHome(); else if(state.page==='tiers') renderTiers(); else if(state.page==='companies') renderCompanies(); else if(state.page==='products') renderCompanies(); else if(state.page==='offers') renderOffers('deal'); else if(state.page==='flash') renderOffers('flash'); else if(state.page==='cart') renderCart(); else renderHome(); bindPageEvents(); updateFooter()}
function refreshFooter(){updateFooter(); if(state.selectedTier){els.footerTierBtn.classList.add('active'); els.footerTierBtn.innerHTML='<span class="smallLine">متبقي لك لتحقيق الشريحة</span><span class="amount">'+money(tierRemaining())+'</span>'}else{els.footerTierBtn.classList.remove('active'); els.footerTierBtn.innerHTML='<span class="smallLine">اختار شريحتك</span><span class="amount">—</span>'}}
async function init(){state.cartMap=loadJSON(LS.cart,{}); state.selectedTier=loadJSON(LS.tier,null); state.tierUnlocks=loadJSON(LS.tierUnlocks,{}); state.repSession=loadJSON(LS.rep,null); state.customer=loadJSON(LS.customer,{name:'',phone:'',address:''}); state.search=loadJSON(LS.search,''); state.history=loadJSON(LS.history,['home']); els.searchInput.value=state.search||''; setBodyMode(); refreshFooter(); bindGlobal(); await bootstrap(); render();}
function bindGlobal(){els.btnTierTop.addEventListener('click',goTiers); els.btnDealsTop.addEventListener('click',goOffers); els.btnFlashTop.addEventListener('click',goFlash); els.btnSearchClear.addEventListener('click',()=>{state.search=''; els.searchInput.value=''; saveState(); render()}); els.searchInput.addEventListener('input',()=>{state.search=els.searchInput.value; saveState(); render()}); els.footerTierBtn.addEventListener('click',goTiers); els.footerCheckoutBtn.addEventListener('click',()=>{if(state.page!=='cart') navigate('cart'); else submitOrder()}); els.btnRepSubmit.addEventListener('click',submitRepLogin); els.btnRepCancel.addEventListener('click',()=>closeModal('repModal')); els.btnTierSubmit.addEventListener('click',submitTierPassword); els.btnTierCancel.addEventListener('click',()=>closeModal('tierModal')); els.repModal.addEventListener('click',e=>{if(e.target===els.repModal) closeModal('repModal')}); els.tierModal.addEventListener('click',e=>{if(e.target===els.tierModal) closeModal('tierModal')}); document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('repModal'); closeModal('tierModal')}})}
window.addEventListener('DOMContentLoaded',init);
window.goHome=goHome; window.goTiers=goTiers; window.goCompanies=goCompanies; window.goOffers=goOffers; window.goFlash=goFlash; window.goProducts=goProducts; window.backPage=backPage; window.submitRepLogin=submitRepLogin; window.submitTierPassword=submitTierPassword; window.chooseTier=chooseTier;
</script>
