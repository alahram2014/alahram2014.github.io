<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام Stable B2B</title>
<meta name="theme-color" content="#c79b18" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#c79b18;--gold2:#e3c56b;--bg:#fbf8f1;--card:#fff;--line:#e8dcc4;--text:#0a2540;--muted:#5c6a7a;--accent:#173a84;--danger:#c0392b;--success:#1f8b4c}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#fbf8f1,#f7f1e3);color:var(--text)}a{text-decoration:none;color:inherit}button,input,select{font-family:inherit}img{max-width:100%;display:block}
#app{max-width:1100px;margin:0 auto;padding:12px 12px 120px}
.header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid rgba(10,37,64,.08);border-radius:0 0 28px 28px;box-shadow:0 10px 28px rgba(10,37,64,.08);overflow:hidden}
.hero{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 12px;background:linear-gradient(135deg,rgba(138,90,0,.95),rgba(199,155,24,.95));color:#fff}.brand{display:flex;align-items:center;gap:10px}.brandBox{width:52px;height:52px;border-radius:16px;background:#fff;display:grid;place-items:center;color:#0a2540;font-weight:900}.companyName{font-size:20px;font-weight:900}.tag{font-size:12px;opacity:.95}
.contactRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px 12px}.contactBtn,.navBtn,.primaryBtn,.secondaryBtn,.dangerBtn,.addBtn,.tabBtn,.footerBtn,.searchBtn,.clearBtn,.qtyBtn,.tierPick,.offerBtn{border:none;border-radius:999px;min-height:42px;font-weight:900;cursor:pointer}.contactBtn{background:#fff;color:#0a2540}.contactBtn.wa{background:#1f8b4c;color:#fff}.contactBtn.fb{background:#173a84;color:#fff}
.navBar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 12px 12px}.navBtn{background:rgba(255,255,255,.92);color:#0a2540;box-shadow:0 8px 18px rgba(10,37,64,.05)}.navBtn.active,.footerBtn.checkout,.addBtn,.primaryBtn,.offerBtn,.tierPick.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a2540}
.footerDock{position:fixed;left:10px;right:10px;bottom:10px;z-index:50;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;background:rgba(248,249,250,.86);border:1px solid rgba(10,37,64,.08);backdrop-filter:blur(18px);border-radius:24px;box-shadow:0 16px 38px rgba(10,37,64,.12)}
.footerBtn{background:#fff;color:#0a2540;border:1px solid rgba(10,37,64,.08)}.footerTotal{display:grid;place-items:center;background:#fff;border:1px solid rgba(10,37,64,.08);border-radius:999px;font-weight:900}
.sectionCard,.emptyCard,.cartCard,.tierCard,.offerCard{background:rgba(255,255,255,.88);border:1px solid rgba(10,37,64,.08);border-radius:24px;box-shadow:0 10px 30px rgba(10,37,64,.06);backdrop-filter:blur(10px)}
.sectionCard,.emptyCard,.cartCard{padding:12px;margin-bottom:10px}.sectionTitle{margin:0 0 8px;font-size:18px;font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.7}
.searchBox{display:grid;grid-template-columns:1fr 110px 90px;gap:8px;background:rgba(255,255,255,.92);padding:10px;border-radius:999px;border:1px solid rgba(10,37,64,.08);box-shadow:0 12px 30px rgba(10,37,64,.06);margin-bottom:10px}.searchInput,.qtyInput,.formInput,.unitSelect{height:48px;border-radius:18px;border:1px solid #d8dde7;padding:0 12px;font-size:15px;background:#fff;color:#0a2540}.searchInput:focus,.qtyInput:focus,.formInput:focus,.unitSelect:focus{outline:none;border-color:#c79b18;box-shadow:0 0 0 3px rgba(199,155,24,.14)}.searchBtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a2540}.clearBtn{background:linear-gradient(135deg,#173a84,#2f5fb8);color:#fff}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}@media(min-width:700px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.contactRow{grid-template-columns:repeat(3,1fr)}}@media(min-width:980px){.grid{grid-template-columns:repeat(4,minmax(0,1fr))}}
.productCard,.brandCard,.offerCard,.tierCard{overflow:hidden;padding:10px;display:flex;flex-direction:column;gap:8px}.productImg,.brandImg,.offerImg{width:100%;height:160px;object-fit:contain;background:#f4f7fa;border-radius:20px}.productName,.brandName,.offerName,.tierName{font-weight:900;line-height:1.5}.priceLine{font-size:16px;font-weight:900;color:#c0392b}.old{text-decoration:line-through;color:#8b8f98;margin-inline-end:6px}.stockBadge{display:inline-flex;align-items:center;justify-content:center;margin:0 auto;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900;background:#e8f7ee;color:#1f8b4c}.stockBadge.bad{background:#fff0f0;color:#b63c2a}
.qtyRow{display:grid;grid-template-columns:38px 1fr 38px;gap:6px;align-items:center}.qtyBtn{height:38px;background:#eef2f7;color:#0a2540}.addBtn,.tierPick,.offerBtn,.primaryBtn,.secondaryBtn,.dangerBtn{min-height:44px}.secondaryBtn{background:#eff3f8;color:#20314a}.dangerBtn{background:linear-gradient(135deg,#ff7b72,#c0392b);color:#fff}
.cartItem{padding:10px;border:1px solid rgba(10,37,64,.06);border-radius:18px;margin-bottom:8px;background:#fff}.cartHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.cartName{font-weight:900}.cartLine{color:#56657b;font-size:13px;line-height:1.6}
.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}.tabBtn{background:rgba(255,255,255,.9);color:#0a2540;border:1px solid rgba(10,37,64,.08)}.tabBtn.active{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);z-index:100}.modal.show{display:flex}.modalCard{width:min(430px,calc(100% - 24px));background:#fff;border-radius:24px;padding:16px;border:1px solid #ead08a}.modalTitle{font-size:20px;font-weight:900;margin-bottom:6px}.modalSub{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.7}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:none;padding:10px 14px;border-radius:999px;background:#1f8b4c;color:#fff;font-weight:900;box-shadow:0 16px 30px rgba(0,0,0,.16)}.toast.error{background:#c0392b}.toast.info{background:#173a84}.hidden{display:none!important}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <div class="brand"><div class="brandBox">الأهرام</div><div><div class="companyName">الأهرام Stable B2B</div><div class="tag" id="tagline">منصة الجملة الذكية</div></div></div>
    <div class="chip" id="tierChip" style="background:#fff;color:#0a2540;padding:8px 12px;border-radius:999px;font-weight:900">بدون شريحة</div>
  </div>
  <div class="contactRow"><a class="contactBtn" href="tel:01040880002">اتصال</a><a class="contactBtn wa" href="https://wa.me/201040880002" target="_blank" rel="noopener">واتساب</a><a class="contactBtn fb" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">Facebook</a></div>
  <div class="navBar" id="navBar"></div>
</div>
<div id="app"><div class="emptyCard">جارٍ التحميل...</div></div>
<div class="footerDock"><button class="footerBtn" onclick="go('home')">الرئيسية</button><div class="footerTotal" id="footerTotal">0</div><button class="footerBtn checkout" onclick="go('cart')">إتمام الطلب</button></div>
<div class="toast" id="toast"></div>
<div class="modal" id="passwordModal"><div class="modalCard"><div class="modalTitle" id="modalTitle">دخول</div><div class="modalSub" id="modalSub">أدخل الرقم السري</div><input class="formInput" id="modalPassword" type="password" placeholder="الرقم السري"><div style="height:10px"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button class="primaryBtn" onclick="submitPassword()">دخول</button><button class="secondaryBtn" onclick="closeModal()">إلغاء</button></div></div></div>
<script>
const CONFIG = { apiUrl: 'https://script.google.com/macros/s/AKfycbwvC3tpAbVKj1W0ikEzXWNvza1Q9EU4gAgudsx_g9SlqNepKltJJ_9xOYBIRpJJnc9qiw/exec', storage:{ cart:'alahram_cart_v2', tier:'alahram_tier_v2', rep:'alahram_rep_v2', customer:'alahram_customer_v2', page:'alahram_page_v2', drafts:'alahram_drafts_v2', cache:'alahram_bootstrap_cache_v2' } };
const state={ products:[], tiers:[], tierPrices:[], reps:[], offers:[], settings:[], cart:load(CONFIG.storage.cart,[]), tier:load(CONFIG.storage.tier,null), rep:load(CONFIG.storage.rep,null), customer:load(CONFIG.storage.customer,{name:'',phone:'',address:'',location:''}), page:load(CONFIG.storage.page,'home'), drafts:load(CONFIG.storage.drafts,{}), bootstrap:null, query:'', busy:false, modal:{open:false,type:'',target:null} };
const el={ app:document.getElementById('app'), navBar:document.getElementById('navBar'), toast:document.getElementById('toast'), footerTotal:document.getElementById('footerTotal'), tierChip:document.getElementById('tierChip'), modal:document.getElementById('passwordModal'), modalTitle:document.getElementById('modalTitle'), modalSub:document.getElementById('modalSub'), modalPassword:document.getElementById('modalPassword'), tagline:document.getElementById('tagline') };
function load(k,f){ try{ const v=localStorage.getItem(k); return v ? JSON.parse(v) : f; } catch { return f; } } function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); } catch {} } function text(v){ return (v ?? '').toString().trim(); } function num(v){ const n = parseFloat(text(v).replace(/[٬،\s,]/g,'')); return Number.isFinite(n) ? n : 0; } function normalize(s){ return text(s).toLowerCase().replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/ة/g,'ه').replace(/[^\w\u0600-\u06FF ]+/g,' ').replace(/\s+/g,' ').trim(); } function compact(s){ return normalize(s).replace(/\s+/g,''); } function toast(msg,type='ok'){ el.toast.textContent=msg; el.toast.className='toast '+(type==='error'?'error':type==='info'?'info':''); el.toast.style.display='block'; clearTimeout(window.__t); window.__t = setTimeout(()=>el.toast.style.display='none',1800); } function saveState(){ save(CONFIG.storage.cart,state.cart); save(CONFIG.storage.tier,state.tier); save(CONFIG.storage.rep,state.rep); save(CONFIG.storage.customer,state.customer); save(CONFIG.storage.page,state.page); save(CONFIG.storage.drafts,state.drafts); }
function jsonp(url, params={}){ return new Promise((resolve,reject)=>{ const cb='__cb_'+Math.random().toString(36).slice(2); params.callback=cb; const qs=new URLSearchParams(params).toString(); const s=document.createElement('script'); window[cb]=data=>{ delete window[cb]; s.remove(); resolve(data); }; s.onerror=()=>{ delete window[cb]; s.remove(); reject(new Error('Failed to fetch')); }; s.src=url+'?'+qs+'&_='+Date.now(); document.head.appendChild(s); }); }
async function apiGet(action, params={}){ return jsonp(CONFIG.apiUrl, { action, ...params }); }
async function apiPost(payload){ const body=new URLSearchParams(); for(const [k,v] of Object.entries(payload)){ body.set(k, Array.isArray(v) || (v && typeof v==='object') ? JSON.stringify(v) : String(v ?? '')); } body.set('action', payload.action || 'createOrder'); await fetch(CONFIG.apiUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'}, body }); return { ok:true }; }
function setPage(page){ state.page=page; saveState(); render(); } function go(page){ setPage(page); window.scrollTo({top:0,behavior:'smooth'}); }
function currentTierObj(){ if(!state.tier) return null; return state.tiers.find(t => compact(t.tier_name)===compact(state.tier.tier_name) || compact(t.visible_label)===compact(state.tier.visible_label) || compact(t.tier_id)===compact(state.tier.tier_id)) || state.tier; }
function tierLabel(t){ return text(t?.visible_label || t?.tier_name || t?.tier_id || ''); } function tierKey(t){ return compact(text(t?.tier_name || t?.tier_id || t?.visible_label || '')); }
function productActive(p){ const s = normalize(p.status || p.visible); return !s || ['1','true','yes','active','متاح','فعال'].includes(s); } function isOfferRow(p){ return compact(p.company_name)===compact('صفقة اليوم') || num(p.price_offer)>0 || text(p.offer_label); }
function effectiveUnitPrice(p, unit){ const t=currentTierObj(); const base = unit==='piece' ? num(p.base_piece_price) : unit==='dozen' ? num(p.base_pack_price) : num(p.base_carton_price); if(t){ const tk=tierKey(t); const priceRow=state.tierPrices.find(r=>compact(text(r.product_id))===compact(text(p.product_id)) || compact(text(r.product_name))===compact(text(p.product_name))); if(priceRow){ const column = tk + '_' + (unit==='piece' ? 'piece' : unit==='dozen' ? 'pack' : 'carton'); const keys=[column, tk + '_' + (unit==='dozen' ? 'pack' : unit), tk + '_price', tk]; for(const k of keys) if(priceRow[k]!==undefined && text(priceRow[k])!=='') return num(priceRow[k]); } } return base; }
function cartItems(){ return state.cart || []; } function cartTotal(){ return cartItems().reduce((a,x)=>a + num(x.qty) * num(x.price), 0); } function cartCount(){ return cartItems().reduce((a,x)=>a + num(x.qty), 0); } function companyName(p){ return text(p.company_name); } function productMatchesQuery(p,q){ if(!q) return true; const s=normalize(q), t=[p.product_name,p.company_name,p.product_id].map(normalize).join(' '); return t.includes(s.replace(/\s+/g,'')) || t.includes(s); }
function isOfferActive(o){ if(!o) return false; const raw = text(o.active).toLowerCase(); if(['1','true','yes','active','on','فعال','متاح'].includes(raw)) return true; if(['0','false','no','inactive','off','موقوف','غير فعال'].includes(raw)) return false; return !!o.is_active_now; }
function showModal(type,target){ state.modal={open:true,type,target}; el.modal.classList.add('show'); el.modalPassword.value=''; el.modalPassword.focus(); if(type==='tier'){ el.modalTitle.textContent='الشريحة مقفلة'; el.modalSub.textContent='أدخل الرقم السري للوصول إلى هذه الشريحة.'; } else { el.modalTitle.textContent='دخول المندوب'; el.modalSub.textContent='أدخل كود المندوب والرقم السري بصيغة: الكود|الرقم السري'; } }
function closeModal(){ state.modal={open:false,type:'',target:null}; el.modal.classList.remove('show'); }
async function submitPassword(){ const pwd=text(el.modalPassword.value); if(!pwd) return; if(state.modal.type==='tier'){ const tier=state.modal.target; const res=await apiGet('checkTier',{ tierId: tier.tier_id || tier.tier_name || tier.visible_label, password: pwd }); if(res.ok){ state.tier=res.tier; saveState(); toast('تم تفعيل الشريحة'); closeModal(); render(); } else toast(res.message || 'خطأ في الرقم السري','error'); } else { const [repId,password] = pwd.split('|').map(x=>text(x)); if(!repId || !password) return toast('اكتب الكود والرقم السري بصيغة الكود|الرقم السري','error'); const res=await apiGet('checkRep',{ repId, password }); if(res.ok){ state.rep=res.rep; saveState(); toast('تم تسجيل المندوب'); closeModal(); render(); } else toast(res.message || 'تعذر تسجيل الدخول','error'); } }
function navButtons(){ el.navBar.innerHTML = [['home','الرئيسية'],['companies','الشركات'],['offers','صفقة اليوم'],['tiers','الشرائح'],['cart','السلة']].map(([p,l])=>`<button class="navBtn ${state.page===p?'active':''}" onclick="go('${p}')">${l}</button>`).join(''); }
function heroText(){ const msg = state.settings.find(x=>compact(x.key).includes('tier_welcome') || compact(x.key).includes('tierwelcome'))?.value || 'منصة الجملة الذكية'; el.tagline.textContent = text(msg) || 'منصة الجملة الذكية'; }
function updateHeader(){ const t=currentTierObj(); el.tierChip.textContent = t ? tierLabel(t) : 'بدون شريحة'; el.footerTotal.textContent = String(cartCount()); }
function render(){ navButtons(); heroText(); updateHeader(); if(state.page==='home') return renderHome(); if(state.page==='companies') return renderCompanies(); if(state.page==='brand') return renderBrand(); if(state.page==='offers') return renderOffers(); if(state.page==='tiers') return renderTiers(); if(state.page==='cart') return renderCart(); state.page='home'; saveState(); renderHome(); }
function renderHome(){ const products=state.products.filter(productActive).filter(p=>!isOfferRow(p)).slice(0,12); const companies=[...new Map(state.products.filter(productActive).filter(p=>!isOfferRow(p)).map(p=>[compact(companyName(p)),companyName(p)])).entries()].map(([,v])=>v).filter(Boolean).slice(0,12); el.app.innerHTML = `<div class="sectionCard"><div class="searchBox"><input class="searchInput" placeholder="ابحث بالاسم أو الكود أو الشركة" value="${escapeHtml(state.query)}" oninput="state.query=this.value"><button class="searchBtn" onclick="renderSearch()">بحث</button><button class="clearBtn" onclick="clearSearch()">مسح</button></div><div class="muted">يقرأ البيانات من الشيتات الحالية كما هي</div></div>${renderOffersBanner()}${state.tier ? renderTierBanner() : ''}<div class="sectionCard"><div class="sectionTitle">أقوى الأصناف</div><div class="grid">${products.map(cardProduct).join('') || '<div class="muted">لا توجد منتجات متاحة</div>'}</div></div><div class="sectionCard"><div class="sectionTitle">أهم الشركات</div><div class="grid">${companies.map(c=>companyCard(c)).join('') || '<div class="muted">لا توجد شركات</div>'}</div></div>`; }
function renderSearch(){ const q=text(state.query); const hits=state.products.filter(productActive).filter(p=>!isOfferRow(p)).filter(p=>productMatchesQuery(p,q)).slice(0,48); el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">نتائج البحث</div><div class="muted">العثور على ${hits.length} نتيجة</div></div><div class="grid">${hits.map(cardProduct).join('') || '<div class="emptyCard">لا توجد نتائج</div>'}</div>`; }
function clearSearch(){ state.query=''; renderHome(); }
function renderCompanies(){ const names=[...new Map(state.products.filter(productActive).filter(p=>!isOfferRow(p)).map(p=>[compact(companyName(p)),companyName(p)])).entries()].map(([,v])=>v).filter(Boolean); el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">الشركات</div><div class="muted">اضغط على أي شركة لعرض منتجاتها</div></div><div class="grid">${names.map(n=>`<button class="brandCard" onclick="openBrand('${escapeJs(n)}')"><div class="brandName">${escapeHtml(n)}</div></button>`).join('')}</div>`; }
function openBrand(name){ state.brand=name; state.page='brand'; saveState(); render(); }
function renderBrand(){ const name=state.brand||''; const items=state.products.filter(productActive).filter(p=>!isOfferRow(p)).filter(p=>compact(companyName(p))===compact(name)); el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">${escapeHtml(name || 'الشركة')}</div><div class="muted">${items.length} صنف</div></div><div class="grid">${items.map(cardProduct).join('') || '<div class="emptyCard">لا توجد منتجات</div>'}</div>`; }
function renderOffersBanner(){ const active=state.offers.filter(o=>isOfferActive(o)); if(!active.length) return ''; const o=active[0]; return `<div class="sectionCard offerCard"><div class="sectionTitle">صفقة اليوم</div><div class="muted">${escapeHtml(o.display_subtitle || o.description || '')}</div><div style="height:8px"></div><button class="offerBtn" onclick="go('offers')">${escapeHtml(o.display_button_label || 'عرض الصفقات')}</button></div>`; }
function renderOffers(){ const active=state.offers.filter(o=>isOfferActive(o)); el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">صفقة اليوم</div><div class="muted">عروض مؤقتة من شيت Flash_Offers</div></div><div class="grid">${active.map(o=>`<div class="offerCard">${o.image_url ? `<img class="offerImg" src="${escapeHtml(o.image_url)}" alt="">` : ''}<div class="offerName">${escapeHtml(o.display_title || o.Flash_name || '')}</div><div class="muted">${escapeHtml(o.display_subtitle || o.description || '')}</div><div class="priceLine">${fmt(o.price)}</div><div class="muted">${escapeHtml(o.public_conditions || o.conditions || '')}</div></div>`).join('') || '<div class="emptyCard">لا توجد عروض نشطة الآن</div>'}</div>`; }
function renderTiers(){ el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">الشرائح</div><div class="muted">الشرائح المقفلة ستطلب كلمة المرور</div></div><div class="grid">${state.tiers.filter(t=>text(t.active)==='1' || text(t.active).toLowerCase()==='true' || !text(t.active)).map(t=>`<div class="tierCard"><div class="tierName">${escapeHtml(tierLabel(t))}</div><div class="muted">${escapeHtml(t.tier_description || '')}</div><div class="muted">الحد الأدنى: ${fmt(t.tier_min || 0)}</div><button class="tierPick ${state.tier && compact(state.tier.tier_name)===compact(t.tier_name) ? 'active' : ''}" onclick='pickTier(${JSON.stringify(t).replace(/'/g,'\\\'')})'>${state.tier && compact(state.tier.tier_name)===compact(t.tier_name) ? 'مفعلة' : 'تفعيل'}</button></div>`).join('')}</div>${state.tier ? `<div style="height:10px"></div><button class="dangerBtn" style="width:100%" onclick="clearTier()">إلغاء الشريحة الحالية</button>` : ''}`; }
function pickTier(t){ if(text(t.tier_password)){ showModal('tier', t); return; } state.tier=t; saveState(); toast('تم تفعيل الشريحة'); render(); }
function clearTier(){ state.tier=null; saveState(); toast('تم إلغاء الشريحة'); render(); }
function renderTierBanner(){ const t=currentTierObj(); if(!t) return ''; const remaining=Math.max(num(t.tier_min)-cartTotal(),0); return `<div class="sectionCard"><div class="sectionTitle">الشريحة الحالية: ${escapeHtml(tierLabel(t))}</div><div class="muted">الحد الأدنى: ${fmt(t.tier_min || 0)} | المتبقي للوصول: ${fmt(remaining)}</div><div style="height:8px"></div><button class="secondaryBtn" onclick="clearTier()">إلغاء الشريحة</button></div>`; }
function renderCart(){ const items=cartItems(); el.app.innerHTML = `<div class="sectionCard"><div class="sectionTitle">السلة</div><div class="muted">إجمالي القطع: ${cartCount()} | الإجمالي: ${fmt(cartTotal())}</div></div>${items.map(cartCard).join('') || '<div class="emptyCard">السلة فارغة</div>'}<div class="sectionCard"><div class="sectionTitle">بيانات العميل</div><input class="formInput" placeholder="اسم العميل" value="${escapeHtml(state.customer.name||'')}" oninput="state.customer.name=this.value; saveState()"><div style="height:8px"></div><input class="formInput" placeholder="رقم الهاتف" value="${escapeHtml(state.customer.phone||'')}" oninput="state.customer.phone=this.value; saveState()"><div style="height:8px"></div><input class="formInput" placeholder="العنوان" value="${escapeHtml(state.customer.address||'')}" oninput="state.customer.address=this.value; saveState()"><div style="height:8px"></div><input class="formInput" placeholder="المنطقة / الموقع" value="${escapeHtml(state.customer.location||'')}" oninput="state.customer.location=this.value; saveState()"><div style="height:10px"></div><button class="primaryBtn" style="width:100%" onclick="reviewOrder()">مراجعة الطلب</button><div style="height:8px"></div><button class="secondaryBtn" style="width:100%" onclick="sendOrder()">تأكيد وإرسال</button></div>`; }
function reviewOrder(){ if(!itemsValid()) return; toast('الطلب جاهز للمراجعة','info'); go('cart'); }
function itemsValid(){ if(!state.cart.length){ toast('السلة فارغة','error'); return false; } if(!text(state.customer.name) || !text(state.customer.phone) || !text(state.customer.address)){ toast('أكمل بيانات العميل','error'); return false; } return true; }
async function sendOrder(){ if(!itemsValid()) return; if(state.busy) return; state.busy=true; try{ const payload={ action:'createOrder', customer:state.customer, customer_name:state.customer.name, customer_phone:state.customer.phone, customer_address:state.customer.address, customer_location:state.customer.location, rep_id:state.rep?.rep_id || '', rep_name:state.rep?.rep_name || '', order_type:state.tier ? 'tier' : 'normal', total:cartTotal(), subtotal:cartTotal(), items:state.cart }; await apiPost(payload); const wa=buildWhatsAppMessage(); state.cart=[]; saveState(); render(); toast('تم إرسال الطلب'); window.open('https://wa.me/201040880002?text=' + encodeURIComponent(wa), '_blank'); } catch(err){ toast('فشل إرسال الطلب','error'); } finally { state.busy=false; } }
function buildWhatsAppMessage(){ const lines=['طلب جديد من الأهرام Stable B2B','العميل: ' + text(state.customer.name),'الهاتف: ' + text(state.customer.phone),'العنوان: ' + text(state.customer.address),'الإجمالي: ' + fmt(cartTotal()),'---']; state.cart.forEach(i => lines.push(`${i.name} x${i.qty} (${unitLabel(i.unit)}) = ${fmt(num(i.qty) * num(i.price))}`)); return lines.join('\n'); }
function cardProduct(p){ const unit = p.base_piece_price ? 'piece' : (p.base_pack_price ? 'dozen' : 'carton'); const price = effectiveUnitPrice(p, unit); const inStock = productActive(p); return `<div class="productCard">${p.product_image ? `<img class="productImg" src="${escapeHtml(p.product_image)}" alt="">` : ''}<div class="productName">${escapeHtml(p.product_name)}</div><div class="muted">${escapeHtml(p.company_name || '')}</div><div class="priceLine">${fmt(price)}</div><div class="stockBadge ${inStock ? '' : 'bad'}">${inStock ? 'متاح' : 'غير متاح'}</div><select class="unitSelect" id="u_${p.product_id}">${p.base_carton_price ? `<option value="carton">كرتونة</option>` : ''}${p.base_pack_price ? `<option value="dozen">دستة</option>` : ''}${p.base_piece_price ? `<option value="piece">قطعة</option>` : ''}</select><div class="qtyRow"><button class="qtyBtn" onclick="chgQty('${escapeJs(String(p.product_id))}',-1)">−</button><input class="qtyInput" id="q_${p.product_id}" value="${state.drafts[p.product_id]?.qty || 1}"><button class="qtyBtn" onclick="chgQty('${escapeJs(String(p.product_id))}',1)">+</button></div><button class="addBtn" onclick="addToCart('${escapeJs(String(p.product_id))}')">أضف للسلة</button></div>`; }
function companyCard(name){ return `<button class="brandCard" onclick="openBrand('${escapeJs(name)}')"><div class="brandName">${escapeHtml(name)}</div></button>`; }
function cartCard(i, idx){ return `<div class="cartItem"><div class="cartHead"><div class="cartName">${escapeHtml(i.name)}</div><button class="dangerBtn" style="min-height:34px;padding:0 12px" onclick="removeCart(${idx})">حذف</button></div><div class="cartLine">${escapeHtml(i.company)} | ${escapeHtml(unitLabel(i.unit))} | ${fmt(num(i.price))}</div><div class="qtyRow"><button class="qtyBtn" onclick="updateCartQty(${idx},-1)">−</button><input class="qtyInput" value="${i.qty}" onchange="updateCartQty(${idx},this.value,true)"><button class="qtyBtn" onclick="updateCartQty(${idx},1)">+</button></div><div class="cartLine">الإجمالي: ${fmt(num(i.qty)*num(i.price))}</div></div>`; }
function addToCart(id){ const p=state.products.find(x=>String(x.product_id)===String(id)); if(!p) return; const unitEl=document.getElementById('u_'+id); const qtyEl=document.getElementById('q_'+id); const unit=unitEl ? unitEl.value : 'carton'; const qty=Math.max(1, num(qtyEl ? qtyEl.value : 1)); const price=effectiveUnitPrice(p, unit); const key=String(p.product_id)+'|'+unit; const existing=state.cart.find(x=>x.key===key); if(existing){ existing.qty += qty; existing.price = price; } else state.cart.push({ key, id:p.product_id, name:p.product_name, company:p.company_name, unit, qty, price }); state.drafts[id] = { qty:1, unit }; saveState(); toast('تمت الإضافة للسلة'); render(); }
function chgQty(id, delta){ const q=Math.max(1, num((state.drafts[id] && state.drafts[id].qty) || 1) + delta); state.drafts[id] = { ...(state.drafts[id] || {}), qty:q }; saveState(); const qEl=document.getElementById('q_'+id); if(qEl) qEl.value = q; }
function updateCartQty(idx, val, direct){ const item=state.cart[idx]; if(!item) return; item.qty = direct ? Math.max(1, num(val)) : Math.max(1, num(item.qty)+num(val)); saveState(); render(); }
function removeCart(idx){ state.cart.splice(idx,1); saveState(); render(); }
function fmt(n){ return new Intl.NumberFormat('ar-EG').format(num(n)); } function unitLabel(u){ return u==='piece' ? 'قطعة' : u==='dozen' ? 'دستة' : 'كرتونة'; }
function escapeHtml(s){ return text(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); } function escapeJs(s){ return String(s).replaceAll('\\','\\\\').replaceAll("'","\\'").replaceAll('\n',' '); }
async function boot(){ try{ const cache=load(CONFIG.storage.cache, null); if(cache) applyBootstrap(cache); const data=await apiGet('bootstrap'); if(data && data.ok !== false){ applyBootstrap(data); save(CONFIG.storage.cache, data); } } catch(err){ toast('فشل تحميل البيانات','error'); } finally { render(); } }
function applyBootstrap(data){ state.bootstrap=data; state.products=data.products || []; state.tiers=data.tiers || []; state.tierPrices=data.tierPrices || []; state.reps=data.reps || []; state.offers=data.offers || []; state.settings=data.settings || []; const t = state.settings.find(x=>compact(x.key).includes('tier_welcome') || compact(x.key).includes('tierwelcome')); if(t && t.value) el.tagline.textContent = text(t.value); }
function openBrand(name){ state.brand=name; state.page='brand'; saveState(); render(); }
function clearTier(){ state.tier=null; saveState(); render(); }
window.go=go; window.openBrand=openBrand; window.addToCart=addToCart; window.chgQty=chgQty; window.updateCartQty=updateCartQty; window.removeCart=removeCart; window.submitPassword=submitPassword; window.closeModal=closeModal; window.clearTier=clearTier; window.reviewOrder=reviewOrder; window.sendOrder=sendOrder; window.renderSearch=renderSearch; window.clearSearch=clearSearch; window.pickTier=pickTier; window.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); }); render(); boot();
</script>
</body>
</html>
