<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Alahram Co | تجارة جملة</title>
  <meta name="theme-color" content="#002366" />
  <meta name="description" content="تطبيق تجارة جملة متكامل لشركة Alahram Co" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#002366;
      --gold:#D4AF37;
      --gold-2:#f0d46c;
      --gold-3:#8a6b14;
      --bg:#f6f8fc;
      --card:#ffffff;
      --line:rgba(0,35,102,.10);
      --text:#0e1a2f;
      --muted:#5c6778;
      --success:#1f8b4c;
      --danger:#c0392b;
      --shadow:0 14px 38px rgba(0,35,102,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%, #f3f6fb 100%);
      color:var(--text);
      direction:rtl;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    img{max-width:100%;display:block}
    button,input,select,textarea{font:inherit}
    a{text-decoration:none;color:inherit}
    .shell{min-height:100%;padding-bottom:92px}
    .header{
      position:sticky;top:0;z-index:50;
      background:rgba(255,255,255,.80);
      backdrop-filter:blur(18px) saturate(170%);
      border-bottom:1px solid var(--line);
      box-shadow:0 10px 24px rgba(0,35,102,.05);
      overflow:hidden;
    }
    .header::before,
    .header::after{
      content:"";
      position:absolute;
      top:0;
      width:220px;
      height:84px;
      opacity:.9;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(212,175,55,.35), rgba(212,175,55,.06));
      clip-path:polygon(0 100%, 18% 62%, 33% 78%, 50% 34%, 66% 72%, 82% 46%, 100% 100%);
      filter:drop-shadow(0 6px 10px rgba(212,175,55,.18));
    }
    .header::before{right:-24px}
    .header::after{left:-24px;transform:scaleX(-1)}
    .brandBar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 14px 10px;position:relative;z-index:1;
    }
    .brandInfo{display:flex;align-items:center;gap:12px;min-width:0}
    .brandLogo{
      width:52px;height:52px;border-radius:18px;flex:0 0 auto;
      object-fit:cover;background:#fff;border:1px solid var(--line);
      box-shadow:0 8px 18px rgba(0,35,102,.08);
    }
    .brandText{min-width:0}
    .brandName{
      font-weight:900;font-size:18px;line-height:1.2;color:var(--navy);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .brandSub{font-size:12px;color:var(--muted);line-height:1.6}
    .brandActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .chip, .miniBtn{
      border:none;border-radius:999px;cursor:pointer;font-weight:800;
      transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease,background .2s ease;
    }
    .chip:active,.miniBtn:active,.btn:active{transform:scale(.99)}
    .chip{
      min-height:36px;padding:0 12px;background:#fff;border:1px solid var(--line);
      color:var(--navy);box-shadow:0 8px 18px rgba(0,35,102,.05)
    }
    .chip.gold{background:linear-gradient(135deg,#fff5d2,#e9d07b);border-color:rgba(212,175,55,.32)}
    .chip.green{background:linear-gradient(135deg,#e9fff1,#bdeacd);border-color:rgba(31,139,76,.18)}
    .chip.red{background:linear-gradient(135deg,#fff0ef,#ffd2cf);border-color:rgba(192,57,43,.18)}
    .ticker{
      margin:0 14px 12px;padding:10px 14px;border-radius:999px;
      background:linear-gradient(135deg,#fff7db,#f0d46c);
      border:1px solid rgba(212,175,55,.30);
      color:#4f3c00;font-weight:800;text-align:center;line-height:1.6;
      box-shadow:0 8px 18px rgba(212,175,55,.10);
      min-height:42px;display:flex;align-items:center;justify-content:center;
    }
    .topActions{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px;
    }
    .btn{
      border:none;border-radius:18px;min-height:48px;padding:0 12px;font-weight:900;
      cursor:pointer;box-shadow:0 10px 22px rgba(0,35,102,.08);
      transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease;
    }
    .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#352800}
    .btn.navy{background:linear-gradient(135deg,var(--navy),#113c9a);color:#fff}
    .btn.success{background:linear-gradient(135deg,#1f8b4c,#35b56b);color:#fff}
    .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
    .btn.danger{background:linear-gradient(135deg,#ff7a70,#c0392b);color:#fff}
    .navRow{
      display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px 14px;
    }
    .navRow .miniBtn{
      min-height:38px;padding:0 10px;background:#fff;border:1px solid var(--line);color:var(--navy);
      box-shadow:0 8px 18px rgba(0,35,102,.05);font-weight:900;font-size:12px;
    }
    .navRow .miniBtn.active{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#352800;border-color:transparent}
    .content{max-width:1160px;margin:0 auto;padding:12px 12px 0}
    .pageHead{
      background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);padding:14px;margin-bottom:12px;
    }
    .pageTitle{font-size:22px;font-weight:900;color:var(--navy);margin:0 0 6px}
    .pageSub{margin:0;color:var(--muted);font-size:13px;line-height:1.7}
    .searchBox{
      display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px;
      background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;
      box-shadow:0 8px 20px rgba(0,35,102,.04);
    }
    .searchInput,.field,.select{
      width:100%;min-height:46px;border-radius:14px;border:1px solid rgba(0,35,102,.12);
      padding:0 12px;background:#fff;outline:none;color:var(--text);
    }
    .searchInput:focus,.field:focus,.select:focus{border-color:rgba(212,175,55,.9);box-shadow:0 0 0 4px rgba(212,175,55,.14)}
    .section{margin-top:12px}
    .sectionHeader{
      display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;
    }
    .sectionTitle{margin:0;font-size:16px;font-weight:900;color:var(--navy)}
    .sectionHint{font-size:12px;color:var(--muted)}
    .filters{display:flex;gap:8px;overflow:auto;padding-bottom:4px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filterChip{
      white-space:nowrap;border:none;border-radius:999px;padding:8px 12px;
      background:#fff;border:1px solid var(--line);font-weight:900;color:var(--navy);cursor:pointer;
    }
    .filterChip.active{background:linear-gradient(135deg,var(--navy),#113c9a);color:#fff;border-color:transparent}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .card{
      background:rgba(255,255,255,.90);border:1px solid var(--line);border-radius:24px;
      box-shadow:var(--shadow);overflow:hidden;
    }
    .companyCard,.tierCard,.bundleCard,.productCard{transition:transform .2s ease,box-shadow .2s ease}
    .companyCard:hover,.tierCard:hover,.bundleCard:hover,.productCard:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(0,35,102,.10)}
    .companyCard{padding:12px;display:flex;flex-direction:column;gap:10px;text-align:center;min-height:122px;justify-content:center}
    .companyLogoBox,.productImage{
      width:100%;aspect-ratio:1/1;border-radius:18px;background:#f5f8fd;object-fit:contain;
      border:1px solid rgba(0,35,102,.05)
    }
    .companyNameCard,.productName{font-weight:900;line-height:1.5}
    .companyNameCard{font-size:14px;color:var(--navy)}
    .meta{font-size:12px;line-height:1.7;color:var(--muted)}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;
    }
    .badge.green{background:rgba(31,139,76,.10);color:var(--success)}
    .badge.red{background:rgba(192,57,43,.10);color:var(--danger)}
    .badge.gold{background:rgba(212,175,55,.16);color:#7b5d00}
    .productCard{padding:10px;display:flex;flex-direction:column;gap:10px}
    .productCard .topLine{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .productName{font-size:14px;color:var(--text)}
    .code{font-size:11px;color:var(--muted);font-weight:800}
    .price{font-size:15px;font-weight:900;color:#b77d00}
    .price del{color:#8c8c8c;font-weight:700;margin-left:6px}
    .productActions{display:grid;grid-template-columns:1fr;gap:8px}
    .productControls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .qtyBtn{
      min-height:40px;border:none;border-radius:12px;background:#eef3fa;color:var(--navy);font-weight:900
    }
    .qtyInput{text-align:center;font-weight:900;font-size:15px}
    .select{font-weight:800}
    .smallBtn{
      min-height:40px;border:none;border-radius:14px;cursor:pointer;font-weight:900;
    }
    .smallBtn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#352800}
    .smallBtn.navy{background:linear-gradient(135deg,var(--navy),#113c9a);color:#fff}
    .smallBtn.success{background:linear-gradient(135deg,#1f8b4c,#35b56b);color:#fff}
    .smallBtn.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
    .smallBtn.danger{background:linear-gradient(135deg,#ff7a70,#c0392b);color:#fff}
    .stack{display:flex;flex-direction:column;gap:8px}
    .noteBox{
      background:linear-gradient(180deg,#fffdf7,#fff);border:1px solid rgba(212,175,55,.22);
      border-radius:18px;padding:12px;box-shadow:0 8px 18px rgba(0,35,102,.04);
    }
    .list{display:flex;flex-direction:column;gap:10px}
    .bundleCard{padding:12px}
    .bundleTitle{font-size:16px;font-weight:900;color:var(--navy);margin:0 0 4px}
    .bundleDesc{margin:0 0 8px;color:var(--muted);font-size:13px;line-height:1.7}
    .bundlePrice{font-size:20px;font-weight:900;color:#b77d00}
    .bundleItems{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
    .pill{padding:6px 10px;border-radius:999px;background:#f5f8fd;border:1px solid rgba(0,35,102,.08);font-size:12px;font-weight:800;color:var(--navy)}
    .tall{min-height:100vh}
    .cartCard{padding:12px;margin-bottom:10px}
    .cartItem{padding:10px 0;border-bottom:1px solid rgba(0,35,102,.08)}
    .cartItem:last-child{border-bottom:none}
    .cartItemHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .cartItemTitle{font-weight:900;font-size:14px;line-height:1.5}
    .cartItemSub{font-size:12px;line-height:1.6;color:var(--muted)}
    .cartControls{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;margin-top:8px}
    .summary{display:grid;grid-template-columns:1fr;gap:8px}
    .summaryLine{display:flex;justify-content:space-between;gap:10px;font-weight:800}
    .summaryLine strong{font-weight:900}
    .reviewBox{background:linear-gradient(180deg,#fffdf5,#fff);border:1px solid rgba(212,175,55,.20);border-radius:18px;padding:12px}
    .formGrid{display:grid;grid-template-columns:1fr;gap:8px}
    .formLabel{font-size:12px;color:var(--muted);font-weight:800}
    .formGroup{display:flex;flex-direction:column;gap:6px}
    .actionsRow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .footer{
      position:fixed;left:12px;right:12px;bottom:12px;z-index:60;
      background:rgba(255,255,255,.86);backdrop-filter:blur(16px) saturate(180%);
      border:1px solid var(--line);border-radius:24px;box-shadow:0 16px 36px rgba(0,35,102,.12);
      padding:8px;
      display:grid;grid-template-columns:1fr auto 1fr;gap:8px;
    }
    .footerTotal{
      min-height:52px;display:flex;align-items:center;justify-content:center;
      border-radius:18px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--navy);padding:0 10px;text-align:center
    }
    .toast{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);
      z-index:999;padding:10px 14px;border-radius:999px;color:#fff;
      background:var(--navy);box-shadow:0 16px 32px rgba(0,0,0,.15);
      display:none;max-width:92vw;font-weight:900
    }
    .modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(10,16,24,.45);backdrop-filter:blur(4px)}
    .modal.show{display:flex}
    .modalCard{width:min(520px,100%);background:#fff;border-radius:28px;border:1px solid rgba(212,175,55,.26);box-shadow:0 28px 70px rgba(0,0,0,.22);padding:14px}
    .modalTitle{margin:0 0 6px;font-size:20px;font-weight:900;color:var(--navy)}
    .modalSub{margin:0 0 12px;font-size:13px;color:var(--muted);line-height:1.7}
    .modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    .hidden{display:none !important}
    .countdown{font-size:24px;font-weight:900;color:#b71c1c;letter-spacing:1px}
    @media (min-width:760px){
      .content{padding:16px 16px 0}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
    @media (min-width:1060px){
      .grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    }
    @media (max-width:760px){
      .brandBar{align-items:flex-start}
      .brandActions{justify-content:flex-start}
      .topActions{grid-template-columns:1fr;}
      .navRow{grid-template-columns:repeat(2,1fr)}
      .footer{left:8px;right:8px;bottom:8px}
      .modal{align-items:flex-end;padding:0}
      .modalCard{width:100%;border-radius:26px 26px 0 0;max-height:88vh;overflow:auto}
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="brandBar">
        <div class="brandInfo">
          <img id="brandLogo" class="brandLogo" alt="Alahram Co logo">
          <div class="brandText">
            <div class="brandName" id="companyName">Alahram Co</div>
            <div class="brandSub" id="companySub">تطبيق جملة احترافي لمنتجات العناية ومستحضرات التجميل</div>
          </div>
        </div>
        <div class="brandActions">
          <a class="chip" id="waChip" href="#" target="_blank" rel="noopener">واتساب</a>
          <button class="chip gold" type="button" onclick="gotoView('tiers')">الشرائح</button>
          <button class="chip green" type="button" onclick="gotoView('offers')">صفقة اليوم</button>
        </div>
      </div>
      <div class="ticker" id="ticker">جارٍ تحميل البيانات...</div>
      <div class="topActions" id="topActions"></div>
      <div class="navRow">
        <button class="miniBtn" id="navHome" type="button" onclick="gotoView('home')">الرئيسية</button>
        <button class="miniBtn" id="navCompanies" type="button" onclick="gotoView('companies')">الشركات</button>
        <button class="miniBtn" id="navLaqta" type="button" onclick="gotoView('laqta')">اللقطة</button>
        <button class="miniBtn" id="navCart" type="button" onclick="gotoView('cart')">السلة</button>
      </div>
    </header>

    <main class="content">
      <div id="app" class="tall"></div>
    </main>

    <footer class="footer">
      <button class="btn primary" type="button" onclick="gotoView('home')">تسوق الآن</button>
      <div class="footerTotal" id="footerTotal">0 EGP</div>
      <button class="btn success" type="button" onclick="gotoView('cart')">إتمام الطلب</button>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal" id="pinModal">
    <div class="modalCard">
      <h3 class="modalTitle">تفعيل الشريحة</h3>
      <p class="modalSub" id="pinPrompt">أدخل الرقم السري الخاص بالشريحة.</p>
      <input class="field" id="pinInput" type="password" placeholder="PIN / Password" autocomplete="off">
      <div class="modalActions">
        <button class="btn primary" type="button" onclick="submitTierPin()">تفعيل</button>
        <button class="btn ghost" type="button" onclick="closePinModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="modal" id="repModal">
    <div class="modalCard">
      <h3 class="modalTitle">دخول المندوب</h3>
      <p class="modalSub">أدخل كود المندوب وكلمة المرور.</p>
      <div class="formGrid">
        <input class="field" id="repIdInput" placeholder="Rep ID" autocomplete="off">
        <input class="field" id="repPassInput" type="password" placeholder="Password" autocomplete="off">
      </div>
      <div class="modalActions">
        <button class="btn navy" type="button" onclick="submitRepLogin()">دخول</button>
        <button class="btn ghost" type="button" onclick="closeRepModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <div class="modal" id="confirmModal">
    <div class="modalCard">
      <h3 class="modalTitle">تأكيد الطلب</h3>
      <p class="modalSub" id="confirmText">هل تريد إرسال الطلب الآن؟</p>
      <div class="modalActions">
        <button class="btn success" type="button" onclick="finalSendOrder()">تأكيد</button>
        <button class="btn ghost" type="button" onclick="closeConfirmModal()">رجوع</button>
      </div>
    </div>
  </div>

  <script>
  /* =========================================================
     (1) LocalStorage state management
     ========================================================= */
  const PRIMARY_API_URL = "https://script.google.com/macros/s/AKfycbyzVJ869sr0fznSXTEsUkNv_1M80mSjtf9-C6M_CagPzCDGhCLRvbkrzPGpJ91GRCTr/exec";
  const BACKUP_API_URL = "https://script.google.com/macros/s/AKfycbyDrSoY3oLkTt_2gJ-cHuzhqxGazRbxHaEzdYpJIW5uJVHXGARWoAB6qllZOXPJEgiP2A/exec";
  const STORAGE_KEYS = {
    cart: 'alahram_cart_v1',
    customer: 'alahram_customer_v1',
    tier: 'alahram_tier_v1',
    rep: 'alahram_rep_v1',
    page: 'alahram_page_v1',
    unlocks: 'alahram_tier_unlocks_v1',
    flashUnlocks: 'alahram_flash_unlocks_v1',
    bootCache: 'alahram_boot_cache_v1'

      .replace(/ى/g, 'ي')

  async function fetchWithTimeout(url, options = {}, ms = 9000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    try {
      const res = await fetch(url, {
        mode: 'cors',
        cache: 'no-store',
        credentials: 'omit',
        ...options,
        signal: controller.signal
      });
      return res;
    } finally {
      clearTimeout(timer);
    }
  }

  async function requestJson(url, options = {}) {
    const res = await fetchWithTimeout(url, options);
    const text = await res.text();
    let payload = null;
    try { payload = JSON.parse(text); } catch { payload = { raw: text }; }
    if (!res.ok && !payload?.success && !payload?.ok) {
      throw new Error(payload?.message || payload?.error || res.statusText || 'Request failed');
    }
    return payload;
  }

  async function apiBootstrap() {
    const attempts = [
      { url: PRIMARY_API_URL, options: { method: 'GET' } },
      { url: `${PRIMARY_API_URL}?action=bootstrap`, options: { method: 'GET' } },
      { url: `${PRIMARY_API_URL}?action=getData`, options: { method: 'GET' } },
      { url: PRIMARY_API_URL, options: { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'bootstrap' }) } },
      { url: BACKUP_API_URL, options: { method: 'GET' } },
      { url: `${BACKUP_API_URL}?action=bootstrap`, options: { method: 'GET' } },
      { url: BACKUP_API_URL, options: { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'bootstrap' }) } }
    ];

    for (const attempt of attempts) {
      try {
        const payload = await requestJson(attempt.url, attempt.options);
        const dataset = normalizeDataset(payload);
        if (dataset) return { payload, dataset, source: attempt.url };
      } catch (err) {
        console.warn('bootstrap attempt failed:', attempt.url, err.message);
      }
    }
    return null;
  }

    const attempts = [
      { url: PRIMARY_API_URL, options: {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'createOrder', ...orderPayload })
      }},
      { url: PRIMARY_API_URL, options: {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'saveOrder', ...orderPayload })
      }},
      { url: PRIMARY_API_URL + '?action=createOrder', options: {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderPayload)
      }},
      { url: BACKUP_API_URL, options: {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'createOrder', ...orderPayload })
      }}
    ];

    for (const attempt of attempts) {
      try {
        const payload = await requestJson(attempt.url, attempt.options);
        return payload;
      } catch (err) {

  function isRowMeaningful(row) {
    if (!row || typeof row !== 'object') return false;
    const values = Object.values(row).map(safe).filter(Boolean);
    return values.length >= 2 || Boolean(row.code || row.product_code || row.key || row.tier_id || row.company_name || row.offer_id || row.flash_id || row.rep_id || row.customer_id || row.order_id);
  }

  function normalizeSheet(raw) {
    if (!raw) return [];
    if (Array.isArray(raw)) {
      if (raw.length && Array.isArray(raw[0])) {
        const headers = raw[0].map(h => safe(h));
        return raw.slice(2).map((row) => {
          const obj = {};
          headers.forEach((h, i) => {
            if (h) obj[h] = row?.[i];
          });
          return obj;
        }).filter(isRowMeaningful);
      }
      return raw
        .map(row => {
          if (row && typeof row === 'object' && !Array.isArray(row)) return row;
          return null;
        })
        .filter(Boolean)
        .filter(isRowMeaningful);
    }
    if (typeof raw === 'object') {
      if (Array.isArray(raw.rows)) return normalizeSheet(raw.rows);
      if (Array.isArray(raw.data)) return normalizeSheet(raw.data);
      if (Array.isArray(raw.values)) return normalizeSheet(raw.values);
      if (Array.isArray(raw.items)) return normalizeSheet(raw.items);
      return [raw].filter(isRowMeaningful);
    }
    return [];
  }

  function findSheet(source, keys) {
    if (!source) return [];
    const keyList = Array.isArray(keys) ? keys : [keys];
    const allKeys = Object.keys(source);
    for (const wanted of keyList) {
      const exact = allKeys.find(k => normalizeText(k) === normalizeText(wanted));
      if (exact) return normalizeSheet(source[exact]);
    }
    // nested data/sheets
    if (source.data && typeof source.data === 'object') {
      const nested = findSheet(source.data, keyList);
      if (nested.length) return nested;
    }
    if (source.sheets && typeof source.sheets === 'object') {
      const nested = findSheet(source.sheets, keyList);
      if (nested.length) return nested;
    }
    // array-of-tables shape
    if (Array.isArray(source)) {
      for (const wanted of keyList) {
        const found = source.find(x => normalizeText(x?.sheet || x?.name || x?.table || x?.title || '') === normalizeText(wanted));
        if (found) return normalizeSheet(found.rows || found.data || found.values || found.items || found);
      }
    }
    return [];
  }

  function unitOptions(product) {

        const v = num(product[k]);

  function tierPrice(product, unit) {
    const tier = selectedTierObject();

  function productSearchIndex(product) {

  function productMatches(product, q) {

  function getCompanyImage(company) {

  function placeholderImage(label, tone = 'navy') {
    const safeLabel = escapeHtml(label || 'Alahram Co');

        <path d="M90 430 L180 320 L250 390 L325 260 L415 360 L500 300 L520 430 Z" fill="${fill}" opacity=".35"/>
        <circle cx="480" cy="120" r="64" fill="${fill}" opacity=".10"/>

  function imageForProduct(product) {

  function getActiveCompanies() {

  }
  function getActiveProducts() {

  }
  function getActiveOffers() {
    return (state.data.offers || []).filter(activeRow);

  function getActiveFlashOffers() {
    return (state.data.flashOffers || []).filter(activeRow);
  }
  function flashRange(flash) {
    const s = `${safe(flash.start_date)}T${safe(flash.start_time || '00:00')}:00`;
    const e = `${safe(flash.end_date)}T${safe(flash.end_time || '23:59')}:00`;

      start: new Date(s.replace(' ', 'T')),
      end: new Date(e.replace(' ', 'T'))

  function flashStatus(flash) {

  function countdownText(targetDate) {

    const sec = Math.floor(diff / 1000) % 60;
    const min = Math.floor(diff / 60000) % 60;
    const hr = Math.floor(diff / 3600000) % 24;
    const day = Math.floor(diff / 86400000);
    return `${day} يوم : ${String(hr).padStart(2,'0')} : ${String(min).padStart(2,'0')} : ${String(sec).padStart(2,'0')}`;
  }
  function cartKey(item) {
    if (item.type === 'product') return `product:${item.code}:${item.unit}`;
    if (item.type === 'offer') return `offer:${item.offer_id}`;
    if (item.type === 'flash') return `flash:${item.flash_id}`;
    return item.key || makeId('item');
  }
  function cartItemLabel(item) {
    if (item.type === 'product') return `${item.name} — ${item.unitLabel}`;
    return item.title;
  }
  function cartItems() {
    return Array.isArray(state.cart) ? state.cart : [];

  function cartHasSpecial() {

  }
  function cartHasTierIncompatible() {

  function cartProductsOnly() {
    return cartItems().filter(x => x.type === 'product');
  }
  function cartCompanies() {
    const set = new Set();
    for (const item of cartProductsOnly()) {
      const p = getActiveProducts().find(x => productCode(x) === item.code);
      if (p) set.add(productCompany(p));
      else if (item.company) set.add(item.company);

    return [...set].filter(Boolean);
  }
  function cartTotals() {
    let products = 0;
    let specials = 0;
    let offerCount = 0;
    let flashCount = 0;
    const companyTotals = new Map();

    for (const item of cartItems()) {
      if (item.type === 'product') {
        const p = getActiveProducts().find(x => productCode(x) === item.code);
        const unitPrice = p ? effectivePrice(p, item.unit) : num(item.price);
        const line = num(item.qty) * unitPrice;
        products += line;
        const comp = p ? productCompany(p) : safe(item.company);
        if (comp) companyTotals.set(comp, (companyTotals.get(comp) || 0) + line);
      } else if (item.type === 'offer') {
        specials += num(item.price);
        offerCount += 1;
      } else if (item.type === 'flash') {
        specials += num(item.price);

    const subtotal = products + specials;

  function tierChecks() {

    }
    const tierTarget = tierMin(tier);
    const maxCompany = tierTarget * 0.25;
    for (const [company, total] of totals.companyTotals.entries()) {
      if (total > maxCompany) {
        issues.push(`شركة "${company}" تجاوزت 25% من قيمة الشريحة المفعلة.`);
        break;
      }
    }
    if (totals.subtotal < tierTarget) {
      issues.push(`إجمالي الطلب أقل من الحد الأدنى للشريحة (${

  function checkoutChecks() {

  function addProduct(productCodeValue, unit, qty) {
    const product = state.productMap.get(productCodeValue);

      const byCompany = state.company === 'all' || normalizeText(productCompany(p)) === normalizeText(state.company);

            <div>

            <select class="select" id="unit-${escapeHtml(productCode(p))}">

        <h1 class="pageTitle">تجارة الجملة الذكية</h1>
        <p class="pageSub">ابحث بالاسم أو الكود أو الشركة. التسعير يلتزم بأولوية الشريحة ثم المندوب ثم السعر الأساسي.</p>
        <div class="searchBox">

        <article class="card bundleCard">

          <div class="bundleItems">

  function renderPage() {
    const map = settingsMap();
    const title = map.company_name || 'Alahram Co';
    const sub = map.hero_tagline || 'تطبيق جملة احترافي لمنتجات العناية ومستحضرات التجميل';
    let html = '';
    if (state.view === 'home' || state.view === 'companies') html = renderHomeLike(state.view);
    else if (state.view === 'offers') html = renderOffersPage();
    else if (state.view === 'laqta') html = renderLaqtaPage();
    else if (state.view === 'tiers') html = renderTiersPage();
    else if (state.view === 'cart') html = renderCartPage();
    else if (state.view === 'review') html = renderReviewPage();
    else html = renderHomeLike('home');

    els.app.innerHTML = html;
    renderTopActions();
    updateFooter();
    bindSearchInput();
  }

  function bindSearchInput() {
    const input = document.getElementById('searchInput');
    if (input) {
      input.addEventListener('input', (e) => {
        state.search = e.target.value;
        render();
      });
      input.focus?.();
    }
  }

  function filterByCompany(name) {
    state.company = name || 'all';
    state.view = 'home';
    render();
    showToast(name === 'all' ? 'تم إلغاء فلتر الشركة' : `تم التصفية على ${name}`, 'gold');
  }
  function filterByCategory(name) {
    state.category = name || 'all';
    render();
  }
  function clearSearch() {
    state.search = '';
    render();
  }
  function changeQtyField(id, delta) {
    const el = document.getElementById(id);
    if (!el) return;
    const next = Math.max(1, (parseInt(el.value || '1', 10) || 1) + delta);
    el.value = next;
  }
  function addProductFromUI(code) {
    const unitEl = document.getElementById(`unit-${code}`);
    const qtyEl = document.getElementById(`qty-${code}`);
    addProduct(code, unitEl?.value || 'piece', qtyEl?.value || 1);
  }
  function viewTierDetails(tierIdValue) {
    const tier = (state.data.tiers || []).find(t => tierId(t) === tierIdValue);
    if (!tier) return;
    const status = selectedTierObject() && tierId(selectedTierObject()) === tierIdValue ? 'الشريحة مفعلة بالفعل' : 'انقر على تفعيل لتشغيلها';
    showToast(`${tierLabel(tier)} • ${currency(tierMin(tier))} EGP • ${status}`, 'navy');
  }
  function syncCustomerForm() {
    const name = document.getElementById('custName')?.value || '';
    const phone = document.getElementById('custPhone')?.value || '';
    const address = document.getElementById('custAddress')?.value || '';
    const notes = document.getElementById('custNotes')?.value || '';
    state.customer = { name: safe(name), phone: safe(phone), address: safe(address), notes: safe(notes) };
    persist();
    showToast('تم حفظ بيانات العميل', 'success');
    render();
  }
  function openReview() {
    syncCustomerForm();
    const issues = checkoutChecks();
    if (issues.length) {
      showToast('هناك ملاحظات تمنع المراجعة', 'danger');
      return render();
    }
    state.view = 'review';
    persist();
    render();
    showToast('تم فتح صفحة المراجعة', 'success');
  }
  function openConfirmOrder() {
    const issues = checkoutChecks();
    if (issues.length) {
      showToast('لا يمكن التأكيد قبل معالجة الملاحظات', 'danger');
      return;
    }
    openConfirmModal('هل تريد إرسال الطلب النهائي إلى الـ API الآن؟');
  }
  function buildOrderPayload() {
    const orderId = makeId('ORD');
    const now = new Date();
    const tier = selectedTierObject();
    const rep = selectedRepObject();
    const lines = [];
    for (const item of cartItems()) {
      if (item.type === 'product') {
        const p = state.productMap.get(item.code);
        const unitPrice = p ? effectivePrice(p, item.unit) : num(item.price);
        lines.push({
          line_type: 'product',
          product_code: item.code,
          name: item.name,
          company: item.company,
          unit: item.unit,
          qty: num(item.qty),
          price: unitPrice,
          total: num(item.qty) * unitPrice,
          bundle_id: ''
        });
      } else if (item.type === 'offer' || item.type === 'flash') {
        lines.push({
          line_type: item.type,
          product_code: item.type === 'offer' ? item.offer_id : item.flash_id,
          name: item.title,
          company: item.type === 'offer' ? 'صفقة اليوم' : 'اللقطة',
          unit: '',
          qty: 1,
          price: num(item.price),
          total: num(item.price),
          bundle_id: item.type === 'offer' ? item.offer_id : item.flash_id
        });
      }
    }

    return {
      order: {
        order_id: orderId,
        date: todayDate(),
        time: timeNow(),
        customer_phone: safe(state.customer.phone),
        customer_name: safe(state.customer.name),
        rep_id: rep ? safe(rep.rep_id) : '',
        mode: tier ? 'tier' : rep ? 'rep' : 'normal',
        tier: tier ? safe(tier.tier_id || tier.tier_name) : '',
        total: cartTotals().grand,
        status: 'new',
        notes: safe(state.customer.notes || '')
      },
      customer: clone(state.customer),
      tier: tier ? normalizeRowObject(tier) : null,
      rep: rep ? normalizeRowObject(rep) : null,
      items: lines,
      sheets: {
        Orders: [{ 
          order_id: orderId,
          date: todayDate(),
          time: timeNow(),
          customer_phone: safe(state.customer.phone),
          customer_name: safe(state.customer.name),
          rep_id: rep ? safe(rep.rep_id) : '',
          mode: tier ? 'tier' : rep ? 'rep' : 'normal',
          tier: tier ? safe(tier.tier_id || tier.tier_name) : '',
          total: cartTotals().grand,
          status: 'new',
          pdf_link: '',
          whatsapp_status: 'pending',
          notes: safe(state.customer.notes || '')
        }],
        Order_Items: lines.map(line => ({
          order_id: orderId,
          line_type: line.line_type,
          product_code: line.product_code,
          name: line.name,
          company: line.company,
          unit: line.unit,
          qty: line.qty,
          price: line.price,
          total: line.total,
          bundle_id: line.bundle_id,
          notes: ''
        }))
      },
      meta: {
        source: 'Alahram Co Single File App',
        currency: setting('currency_label', 'EGP')
      }
    };
  }

  async function finalSendOrder() {
    closeConfirmModal();
    syncCustomerForm();
    const issues = checkoutChecks();
    if (issues.length) {
      showToast('لا يمكن الإرسال قبل إصلاح الملاحظات', 'danger');
      return render();
    }
    if (state.busy) return;
    state.busy = true;
    render();
    try {
      const payload = buildOrderPayload();
      const response = await apiPostOrder(payload);
      const success = response?.success !== false && response?.ok !== false;
      if (success) {
        showToast('تم إرسال الطلب بنجاح', 'success');
        clearCart();
        state.reviewMode = false;
        state.view = 'home';
        render();
      } else {
        throw new Error(response?.message || response?.error || 'فشل غير معروف');
      }
    } catch (err) {
      console.error(err);
      showToast(err.message || 'فشل إرسال الطلب', 'danger');
      // Keep the order draft so the user does not lose work.
    } finally {
      state.busy = false;
      render();
    }
  }

  async function boot() {
    try {
      const cached = loadJSON(STORAGE_KEYS.bootCache, null);
      if (cached) {
        state.data = cached;
        state.currentDataSource = 'cache';
        buildIndexes();
      } else {
        buildIndexes();
      }
      state.cart = loadJSON(STORAGE_KEYS.cart, []);
      state.view = loadJSON(STORAGE_KEYS.page, 'home');
      render();
      updateFooter();

      const remote = await apiBootstrap();
      if (remote?.dataset) {
        state.data = mergeDataset(FALLBACK_DATA, remote.dataset);
        state.currentDataSource = remote.source;
        saveJSON(STORAGE_KEYS.bootCache, state.data);
        buildIndexes();
        showToast('تم تحديث البيانات من الـ API', 'success');
      } else {
        state.data = clone(FALLBACK_DATA);
        state.currentDataSource = 'fallback';
        buildIndexes();
        showToast('تعذر الوصول إلى الـ API، تم تشغيل النسخة المحلية', 'gold');
      }
    } catch (err) {
      console.error(err);
      state.data = clone(FALLBACK_DATA);
      state.currentDataSource = 'fallback';
      buildIndexes();
      showToast('تم تشغيل النسخة المحلية الاحتياطية', 'gold');
    } finally {
      state.loading = false;
      state.liveClock = Date.now();
      render();
      tickTicker();
      setInterval(() => {
        state.liveClock = Date.now();
        updateLiveBits();
      }, 1000);
      setInterval(tickTicker, 4500);
      setTimeout(() => {
        const s = document.getElementById('searchInput');
        if (s) s.focus();
      }, 120);
    }
  }

  function mergeDataset(base, incoming) {
    const out = clone(base);
    const keys = Object.keys(out);
    for (const key of keys) {
      if (Array.isArray(incoming?.[key]) && incoming[key].length) out[key] = incoming[key];
    }
    return out;
  }

  function updateLiveBits() {
    updateFooter();
    const activeFlashEl = document.querySelector('[data-live-countdown]');
    if (activeFlashEl) {
      const flashId = activeFlashEl.getAttribute('data-live-countdown');
      const flash = state.flashMap?.get(flashId);
      if (flash) {
        const st = flashStatus(flash);
        const { start, end } = flashRange(flash);
        activeFlashEl.textContent = st === 'upcoming' ? countdownText(start) : st === 'active' ? countdownText(end) : 'انتهى العرض';
      }
    }
  }

  function render() {
    renderPage();
  }

  // Expose handlers to inline HTML.
  window.gotoView = gotoView;
  window.filterByCompany = filterByCompany;
  window.filterByCategory = filterByCategory;
  window.clearSearch = clearSearch;
  window.changeQtyField = changeQtyField;
  window.addProductFromUI = addProductFromUI;
  window.addOffer = addOffer;
  window.addFlash = addFlash;
  window.updateCartQty = updateCartQty;
  window.removeCart = removeCart;
  window.deactivateTier = deactivateTier;
  window.openRepModal = openRepModal;
  window.closeRepModal = closeRepModal;
  window.submitRepLogin = submitRepLogin;
  window.submitTierPin = submitTierPin;
  window.closePinModal = closePinModal;
  window.viewTierDetails = viewTierDetails;
  window.syncCustomerForm = syncCustomerForm;
  window.openReview = openReview;
  window.openConfirmOrder = openConfirmOrder;
  window.finalSendOrder = finalSendOrder;
  window.openConfirmModal = openConfirmModal;
  window.closeConfirmModal = closeConfirmModal;
  window.logoutRep = logoutRep;
  window.render = render;
  window.renderTopActions = renderTopActions;

  // Close dialogs on backdrop click
  els.pinModal.addEventListener('click', (e) => { if (e.target === els.pinModal) closePinModal(); });
  els.repModal.addEventListener('click', (e) => { if (e.target === els.repModal) closeRepModal(); });
  els.confirmModal.addEventListener('click', (e) => { if (e.target === els.confirmModal) closeConfirmModal(); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closePinModal();
      closeRepModal();
      closeConfirmModal();
    }
  });

  boot();
  </script>
</body>
</html>
